  <div class="gl-row"><span class="gl-dot" style="background:#80aaff"></span><b style="color:#aaa">GABA</b> — tłumiony przez GHB na interneuronach → odhamowanie DA</div>
  <div class="gl-row"><span class="gl-dot" style="background:#00ffaa"></span><b style="color:#aaa">Dopamina</b> — pulsatile release przez disinhibicję w VTA przy niskiej dawce</div>
</div>
<p>GHB aktywuje receptory GABA-B na interneuronach w VTA → ich aktywność spada → neurony DA odhamowane → pulsacyjny wzrost DA w NAc. Mechanizm identyczny jak przy opioidach i THC — deinhibicja, nie bezpośredni agonizm DA.</p>
<p><b>Biphasic effect:</b> Niska dawka = presynaptyczne GABA-B → DA wzrost (euforia). Wysoka dawka = postsynaptyczne GABA-B na neuronach DA → DA spadek (sedacja, utrata przytomności). To tłumaczy wąskie okno między dawką euforyczną a dawką powodującą utratę przytomności.</p>`,
    brain:`<p>GHB prezentuje <b>bifazowy profil DA/GABA</b> który zmienia się między fazami. VTA na onset jest niebieskie (GABA inhibicja interneuronów), na peaku staje się zielone (DA deinhibicja). To jedyna substancja w aplikacji gdzie jeden region zmienia NT między fazami.</p>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#5090ff;box-shadow:0 0 5px #5090ff"></div><div class="brain-region-name">VTA (onset)</div><div class="brain-region-desc">GABA-B aktywacja na interneuronach VTA (i:0.28) — inhibicja tych interneuronów paradoksalnie prowadzi do deinhibicji neuronów DA. Mechanizm pulsatile DA release.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">VTA (peak)</div><div class="brain-region-desc">Na peaku VTA przechodzi na DA (i:0.82) — deinhibicja w pełni aktywna. Kliknij Onset → Peak i obserwuj zmianę koloru VTA w animacji.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">NAc</div><div class="brain-region-desc">Centrum nagrody — silna DA (i:0.88). Subiektywna euforia, relaksacja, warmth GHB. Wysoka dawka zmienia charakter przez bezpośrednie GABA-B na neuronach DA.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#5090ff;box-shadow:0 0 5px #5090ff"></div><div class="brain-region-name">Amy</div><div class="brain-region-desc">GABA-B aktywacja (i:0.78) — efekt anksjolityczny i disinhibicja społeczna. Podobnie jak alkohol — Amy wyciszona przez GABA.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#5090ff;box-shadow:0 0 5px #5090ff"></div><div class="brain-region-name">Thal</div><div class="brain-region-desc">GABA-B inhibicja wzgórza (i:0.72) — sedacja, zmiana świadomości sensorycznej. Przy wysokich dawkach: przejście w sen.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#5090ff;box-shadow:0 0 5px #5090ff"></div><div class="brain-region-name">Hipp</div><div class="brain-region-desc">GABA-B inhibicja hipokampa (i:0.60) — amnezja anterograde. Mechanizm eksploatowany w DFSA (drug-facilitated sexual assault).</div></div>
<p><b>Kliknij kolejno fazę:</b> Obserwuj jak VTA zmienia kolor z niebieskiego (gaba) na zielony (da) w fazie Come-up/Peak.</p>
<p><b>Wąskie okno:</b> Różnica między euforycznym peakiem a utratą przytomności to kwestia ułamka grama — nie widoczna na mapie, ale istnieje.</p>`,
    brain_en:`<p>GHB presents a biphasic DA/GABA profile that changes between phases. VTA at onset is blue (GABA inhibition of interneurons), at peak becomes green (DA disinhibition). The only substance in the app where a single region changes NT between phases.</p>
<div class="brain-content">
<div class="brain-region-row"><div class="brain-region-dot" style="background:#5090ff;box-shadow:0 0 5px #5090ff"></div><div class="brain-region-name">VTA (onset)</div><div class="brain-region-desc">GABA-B activation on VTA interneurons (i:0.28) — inhibition of these interneurons paradoxically leads to disinhibition of DA neurons. Mechanism of pulsatile DA release.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">VTA (peak)</div><div class="brain-region-desc">At peak, VTA switches to DA (i:0.82) — disinhibition fully active. Click Onset → Peak and watch the VTA colour change in the animation.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">NAc</div><div class="brain-region-desc">Reward centre — pulsatile DA rise (i:0.70). The euphoria and prosocial effects of low-dose GHB. Rapidly tolerates.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#5090ff;box-shadow:0 0 5px #5090ff"></div><div class="brain-region-name">Hipp</div><div class="brain-region-desc">GABA-B hippocampal inhibition (i:0.60) — anterograde amnesia. The mechanism exploited in drug-facilitated assault.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#5090ff;box-shadow:0 0 5px #5090ff"></div><div class="brain-region-name">Thal</div><div class="brain-region-desc">GABA-B on thalamic neurons (i:0.58). Sedative-hypnotic component. At high doses: anaesthetic-level sedation.</div></div>
</div>`,
    guide_en:`<div class="guide-legend">
  <div class="guide-row"><span class="guide-dot" style="background:#a064ff"></span>GHB — purple particles; endogenous GABA-B ligand and GHB receptor</div>
  <div class="guide-row"><span class="guide-dot" style="background:#5090ff"></span>GABA — suppressed by GHB on interneurons → DA disinhibition</div>
  <div class="guide-row"><span class="guide-dot" style="background:#00ffaa"></span>Dopamine — pulsatile release via disinhibition in VTA at low dose</div>
</div>
<p>GHB activates <b>GABA-B receptors on interneurons in VTA</b> → their activity drops → DA neurons disinhibited → pulsatile DA rise in NAc. Mechanism identical to opioids and THC — disinhibition, not direct DA agonism.</p>
<p><b>Biphasic effect:</b></p>
<p>Low dose = presynaptic GABA-B on interneurons → DA rise (euphoria, sociability). The animation's "onset" phase shows interneurons dimming (blue), then DA neurons brightening (green).</p>
<p>High dose = postsynaptic GABA-B on DA neurons themselves → DA drops (sedation, loss of consciousness). The narrow window between euphoric dose and unconscious dose is a direct pharmacological consequence of this biphasic receptor distribution.</p>
<p>The animation is one of the most mechanistically complex in the app — observe the colour transition of VTA between phases.</p>`

// ── DISINHIBITION CIRCUIT (codeine) ──────────────────────────────────────────
function drawDisinhibition(canvas, sub) {
  const d = DATA[sub];
  const s = window.devicePixelRatio;
  const W = canvas.width = canvas.offsetWidth * s;
  const H = canvas.height = 250 * s;
  canvas.style.height = '250px';
  const ctx = canvas.getContext('2d');
  const cx = W/2;

  // Three neuron positions
  const neurons = [
    { x: cx - 80*s, y: 58*s,  r:24*s,  label:'μOR',   sublabel:'neuron opioidowy', col:'153,51,255',  role:'opioid'  },
    { x: cx,        y: 140*s, r:22*s,  label:'GABA',  sublabel:'interneuron',       col:'255,68,102',  role:'gaba'    },
    { x: cx + 80*s, y: 58*s,  r:24*s,  label:'DA',    sublabel:'neuron DA',          col:'0,255,170',   role:'da'      },
  ];

  // Drug particles approaching μOR
  const drugParticles = [];
  // DA signal particles leaving DA neuron
  const signalParticles = [];

  let t = 0, raf;
  // Animate progression: 0..120 = baseline, 120+ = drug effect
  let phase = 0; // 0=ramp-in, 1=drug-bound, cycles

  function spawnDrug() {
    if (drugParticles.length > 5) return;
    drugParticles.push({
      x: neurons[0].x - 55*s + (Math.random()-0.5)*10*s,
      y: neurons[0].y + (Math.random()-0.5)*15*s,
      vx: 0.55*s, vy: (Math.random()-0.5)*0.12*s,
      alpha: 0, bound: false, age: 0,
    });
  }

  function spawnSignal() {
    if (signalParticles.length > 8) return;
    signalParticles.push({
      x: neurons[2].x + neurons[2].r * 0.6,
      y: neurons[2].y + (Math.random()-0.5)*10*s,
      vx: 0.7*s + Math.random()*0.4*s,
      vy: (Math.random()-0.5)*0.3*s,
      alpha: 0.9, age: 0,
    });
  }

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  function drawNeuron(n, activation, drugBound) {
    // Outer glow
    if (activation > 0.1) {
      glow(`rgb(${n.col})`, 18*s*activation);
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r+4*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${n.col},${0.06*activation})`; ctx.fill(); noGlow();
    }
    // Body
    const g = ctx.createRadialGradient(n.x-n.r*0.3, n.y-n.r*0.3, 0, n.x, n.y, n.r);
    g.addColorStop(0, `rgba(${n.col},${0.28+activation*0.45})`);
    g.addColorStop(0.6, `rgba(${n.col},${0.12+activation*0.20})`);
    g.addColorStop(1, `rgba(${n.col},0.04)`);
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
    ctx.fillStyle = g;
    if (activation > 0.3) { glow(`rgb(${n.col})`, 10*s*activation); }
    ctx.fill(); noGlow();
    // Border
    ctx.strokeStyle = `rgba(${n.col},${0.3+activation*0.5})`;
    ctx.lineWidth = 1*s; ctx.stroke();
    // Label
    ctx.textAlign = 'center'; ctx.fillStyle = `rgba(255,255,255,${0.5+activation*0.4})`;
    ctx.font = `bold ${9*s}px Space Mono`;
    ctx.fillText(n.label, n.x, n.y+2*s);
    ctx.font = `${6.5*s}px Inter`;
    ctx.fillStyle = `rgba(${n.col},${0.5+activation*0.3})`;
    ctx.fillText(n.sublabel, n.x, n.y+n.r+11*s);
    // Drug bound indicator on μOR
    if (drugBound && n.role === 'opioid') {
      glow(`rgb(${n.col})`, 8*s);
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r*0.32, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,0.7)`; ctx.fill(); noGlow();
    }
  }

  function drawConnection(from, to, active, inhibitory, strength) {
    const dx = to.x-from.x, dy = to.y-from.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ux = dx/len, uy = dy/len;
    const x1 = from.x+ux*from.r, y1 = from.y+uy*from.r;
    const x2 = to.x-ux*to.r,   y2 = to.y-uy*to.r;
    const a = active ? 0.5+strength*0.4 : 0.12;
    ctx.strokeStyle = inhibitory ? `rgba(255,68,102,${a})` : `rgba(0,255,170,${a})`;
    ctx.lineWidth = (active ? 1.5+strength*1.5 : 0.8)*s;
    ctx.setLineDash(inhibitory ? [4*s,3*s] : []);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.setLineDash([]);
    // Arrowhead / flathead
    const mx = x2, my = y2;
    const px = -uy, py = ux;
    if (inhibitory) {
      ctx.strokeStyle = `rgba(255,68,102,${a})`;
      ctx.lineWidth = 2*s;
      ctx.beginPath();
      ctx.moveTo(mx+px*5*s, my+py*5*s);
      ctx.lineTo(mx-px*5*s, my-py*5*s);
      ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(0,255,170,${a})`;
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(mx-ux*7*s+px*4*s, my-uy*7*s+py*4*s);
      ctx.lineTo(mx-ux*7*s-px*4*s, my-uy*7*s-py*4*s);
      ctx.closePath(); ctx.fill();
    }
  }

  // State: how bound is μOR, how suppressed is GABA, how active is DA
  let muBound = 0, gabaAct = 1, daAct = 0.2;

  function draw() {
    ctx.clearRect(0,0,W,H);

    // Ramp up drug effect over time
    const targetBound = Math.min(1, t/160);
    muBound += (targetBound - muBound)*0.015;
    gabaAct += ((1 - muBound*0.85) - gabaAct)*0.02;
    daAct += ((0.2 + muBound*0.75) - daAct)*0.018;

    // Spawn
    if (t % 28 === 0) spawnDrug();
    if (muBound > 0.4 && t % 22 === 0) spawnSignal();

    // Background label
    ctx.textAlign = 'left'; ctx.fillStyle = 'rgba(80,80,110,0.5)';
    ctx.font = `${6.5*s}px Space Mono`;
    ctx.fillText(T('nacCircuit'), 8*s, H-8*s);

    // Connections
    drawConnection(neurons[0], neurons[1], muBound>0.1, true, muBound);      // μOR ⊣ GABA
    drawConnection(neurons[1], neurons[2], true, true, gabaAct);             // GABA ⊣ DA
    drawConnection(neurons[2], {x:neurons[2].x+80*s,y:neurons[2].y,r:0}, daAct>0.3, false, daAct); // DA → NAc

    // NAc label
    ctx.textAlign = 'center'; ctx.fillStyle = `rgba(0,255,170,${daAct*0.6})`;
    ctx.font = `${7*s}px Space Mono`; ctx.fillText('→ NAc', neurons[2].x+100*s, neurons[2].y+3*s);

    // Drug particles (kodeina approaching μOR)
    for (let i=drugParticles.length-1; i>=0; i--) {
      const p = drugParticles[i];
      p.age++;
      if (!p.bound) {
        p.x += p.vx; p.y += p.vy;
        p.alpha = Math.min(0.85, p.alpha+0.06);
        if (p.x > neurons[0].x - neurons[0].r - 3*s) {
          p.bound = true;
          if (Math.random() < 0.4) { drugParticles.splice(i,1); continue; }
        }
      } else {
        p.alpha -= 0.01;
        if (p.alpha <= 0) { drugParticles.splice(i,1); continue; }
      }
      glow('rgb(153,51,255)', 5*s);
      ctx.beginPath(); ctx.arc(p.x, p.y, 3*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(180,120,255,${p.alpha})`; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.2*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${p.alpha*0.6})`; ctx.fill();
      noGlow();
    }

    // Signal particles (DA signal)
    for (let i=signalParticles.length-1; i>=0; i--) {
      const p = signalParticles[i];
      p.age++; p.x += p.vx; p.y += p.vy;
      p.alpha -= 0.016;
      if (p.alpha <= 0 || p.x > W-5*s) { signalParticles.splice(i,1); continue; }
      glow('rgb(0,255,170)', 4*s);
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,255,170,${p.alpha})`; ctx.fill();
      noGlow();
    }

    // Neurons on top
    drawNeuron(neurons[0], 0.4 + muBound*0.5, muBound > 0.3);
    drawNeuron(neurons[1], gabaAct, false);
    drawNeuron(neurons[2], daAct, false);

    // State labels
    ctx.textAlign = 'center'; ctx.font = `${7*s}px Space Mono`;
    if (muBound > 0.15) {
      ctx.fillStyle = `rgba(153,51,255,0.7)`;
      ctx.fillText('← '+T('arrowCodeine'), neurons[0].x - 60*s, neurons[0].y);
    }
    if (muBound > 0.5) {
      ctx.fillStyle = 'rgba(255,68,102,0.6)';
      ctx.fillText(T('silenced'), neurons[1].x, neurons[1].y - neurons[1].r - 16*s);
    }
    if (daAct > 0.5) {
      ctx.fillStyle = 'rgba(0,255,170,0.7)';
      ctx.fillText(T('disinhibited'), neurons[2].x, neurons[2].y - neurons[2].r - 16*s);
    }

    t++;
    raf = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── NMDA CHANNEL (ketamine) ───────────────────────────────────────────────────
function drawNMDAChannel(canvas, sub) {
  const s = window.devicePixelRatio;
  const W = canvas.width = canvas.offsetWidth * s;
  const H = canvas.height = 250 * s;
  canvas.style.height = '250px';
  const ctx = canvas.getContext('2d');
  const cx = W/2;

  // Layout
  const memTop = H*0.38, memBot = H*0.58;
  const chanW = 28*s, chanH = memBot-memTop;
  const chanX = cx;

  // Ions & molecules
  const ions = [];
  const glutamates = [];
  let ketMol = null; // single ketamine molecule

  let t = 0, raf;
  let chanOpen = 0;      // 0=closed, 1=open
  let mgBlock = 1;       // 1=Mg blocking, 0=removed
  let ketBlock = 0;      // 0=free, 1=ketamine blocking
  let openTimer = 0;

  function spawnGlu() {
    if (glutamates.length > 3) return;
    const side = Math.random() < 0.5 ? -1 : 1;
    glutamates.push({
      x: chanX + side*(chanW*0.5 + 8*s + Math.random()*20*s),
      y: memTop - 25*s - Math.random()*20*s,
      vx: -side*0.25*s, vy: 0.3*s,
      alpha: 0, bound: false, age:0,
    });
  }

  function spawnIon() {
    if (ions.length > 10 || chanOpen < 0.7 || mgBlock > 0.3 || ketBlock > 0.6) return;
    ions.push({
      x: chanX + (Math.random()-0.5)*chanW*0.55,
      y: memTop + 2*s,
      vy: 0.5*s + Math.random()*0.35*s,
      col: Math.random()<0.6 ? '100,180,255' : '200,240,100',
      alpha: 0.9, age:0,
    });
  }

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  function draw() {
    ctx.clearRect(0,0,W,H);

    // State machine (slowed ×2.5 for readability)
    if (t < 200) { chanOpen += (0 - chanOpen)*0.05; mgBlock=1; }
    else if (t < 400) { chanOpen += (1 - chanOpen)*0.02; mgBlock -= 0.006; mgBlock=Math.max(0,mgBlock); }
    else if (t < 500) { /* open, ions flow */ openTimer++; }
    else if (t < 650) {
      // Ketamine enters
      if (!ketMol) ketMol = { x: chanX, y: memTop - 30*s, vy: 0.4*s, alpha:0, locked:false };
    }
    if (ketMol && !ketMol.locked) {
      ketMol.y += ketMol.vy; ketMol.alpha = Math.min(1, ketMol.alpha+0.03);
      if (ketMol.y > memTop + chanH*0.45) { ketMol.locked=true; ketMol.y=memTop+chanH*0.45; ketBlock=0; }
    }
    if (ketMol && ketMol.locked) { ketBlock = Math.min(1, ketBlock+0.01); }
    if (t > 950) { t = 0; ketMol=null; ketBlock=0; chanOpen=0; mgBlock=1; ions.length=0; glutamates.length=0; }

    // Extracellular space label
    ctx.fillStyle='rgba(60,60,90,0.4)'; ctx.font=`${7*s}px Space Mono`; ctx.textAlign='left';
    ctx.fillText(T('extracellular'), 8*s, memTop-8*s);
    ctx.fillText(T('intracellular'), 8*s, memBot+14*s);

    // Membrane
    for (let side of [-1,1]) {
      const mx = chanX + side*(chanW/2);
      const membGrad = ctx.createLinearGradient(mx, memTop, mx, memBot);
      membGrad.addColorStop(0,'rgba(30,30,60,0.95)');
      membGrad.addColorStop(1,'rgba(20,20,45,0.95)');
      ctx.fillStyle = membGrad;
      ctx.fillRect(mx + (side<0?-80*s:0), memTop, 80*s, chanH);
      ctx.strokeStyle='rgba(80,80,130,0.3)'; ctx.lineWidth=0.5*s;
      // Phospholipid heads — dots on membrane borders
      for (let i=0;i<12;i++) {
        const hy = memTop + i*(chanH/12);
        ctx.beginPath(); ctx.arc(mx + side*2*s, hy, 2.5*s, 0, Math.PI*2);
        ctx.fillStyle='rgba(100,100,160,0.4)'; ctx.fill();
      }
    }

    // Channel pore
    const poreGrad = ctx.createLinearGradient(chanX, memTop, chanX, memBot);
    poreGrad.addColorStop(0,`rgba(0,150,255,${0.04+chanOpen*0.12})`);
    poreGrad.addColorStop(0.5,`rgba(0,150,255,${0.08+chanOpen*0.18})`);
    poreGrad.addColorStop(1,`rgba(0,150,255,${0.04+chanOpen*0.12})`);
    ctx.fillStyle=poreGrad;
    ctx.fillRect(chanX-chanW/2, memTop, chanW, chanH);
    // Pore walls
    [[chanX-chanW/2,0],[chanX+chanW/2,0]].forEach(([px])=>{
      ctx.strokeStyle=`rgba(80,140,220,${0.2+chanOpen*0.4})`; ctx.lineWidth=1.2*s;
      ctx.beginPath(); ctx.moveTo(px,memTop); ctx.lineTo(px,memBot); ctx.stroke();
    });

    // Mg2+ block
    if (mgBlock > 0.05) {
      const mgY = memTop + chanH*0.5;
      glow('rgb(255,220,50)', 10*s*mgBlock);
      ctx.beginPath(); ctx.arc(chanX, mgY, 6*s, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,220,50,${mgBlock*0.9})`; ctx.fill(); noGlow();
      ctx.beginPath(); ctx.arc(chanX, mgY, 2*s, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${mgBlock*0.7})`; ctx.fill();
      ctx.textAlign='center'; ctx.fillStyle=`rgba(255,220,50,${mgBlock*0.8})`;
      ctx.font=`${7.5*s}px Space Mono`; ctx.fillText('Mg²⁺', chanX+16*s, mgY+3*s);
    }

    // Spawn
    if (t%45===0) spawnGlu();
    if (t%18===0) spawnIon();

    // Glutamate molecules
    for (let i=glutamates.length-1; i>=0; i--) {
      const g2 = glutamates[i];
      g2.age++;
      if (!g2.bound) {
        g2.x+=g2.vx; g2.y+=g2.vy; g2.alpha=Math.min(0.9,g2.alpha+0.06);
        if (g2.y>memTop-4*s) { g2.bound=true; chanOpen=Math.min(1,chanOpen+0.15); }
      } else { g2.alpha-=0.008; if(g2.alpha<=0){glutamates.splice(i,1);continue;} }
      glow('rgb(68,170,255)',5*s);
      ctx.beginPath(); ctx.arc(g2.x,g2.y,4*s,0,Math.PI*2);
      ctx.fillStyle=`rgba(68,170,255,${g2.alpha})`; ctx.fill();
      ctx.beginPath(); ctx.arc(g2.x,g2.y,1.5*s,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,230,255,${g2.alpha*0.7})`; ctx.fill();
      noGlow();
    }

    // Ion flow
    for (let i=ions.length-1; i>=0; i--) {
      const ion=ions[i]; ion.age++; ion.y+=ion.vy;
      ion.alpha-=0.012;
      if(ion.y>memBot+5*s||ion.alpha<=0){ions.splice(i,1);continue;}
      glow(`rgb(${ion.col})`,4*s);
      ctx.beginPath(); ctx.arc(ion.x,ion.y,2.8*s,0,Math.PI*2);
      ctx.fillStyle=`rgba(${ion.col},${ion.alpha})`; ctx.fill(); noGlow();
    }

    // Ketamine molecule
    if (ketMol) {
      const ky = ketMol.y, ka = ketMol.alpha;
      glow('rgb(0,153,255)', 10*s*ka);
      ctx.beginPath(); ctx.arc(chanX, ky, 7*s, 0, Math.PI*2);
      ctx.fillStyle=`rgba(0,153,255,${ka*0.85})`; ctx.fill();
      ctx.beginPath(); ctx.arc(chanX, ky, 2.5*s, 0, Math.PI*2);
      ctx.fillStyle=`rgba(200,240,255,${ka*0.8})`; ctx.fill();
      noGlow();
      ctx.textAlign='left'; ctx.fillStyle=`rgba(0,200,255,${ka*0.9})`;
      ctx.font=`${8*s}px Space Mono`;
      ctx.fillText(sub === 'dxm' ? 'DXM/DXO' : 'KET', chanX+12*s, ky+3*s);
      if (ketMol.locked && ketBlock>0.5) {
        ctx.strokeStyle=`rgba(0,153,255,0.5)`; ctx.lineWidth=1*s; ctx.setLineDash([3*s,3*s]);
        ctx.beginPath(); ctx.moveTo(chanX-chanW/2,ky); ctx.lineTo(chanX+chanW/2,ky); ctx.stroke();
        ctx.setLineDash([]);
        ctx.textAlign='center'; ctx.fillStyle='rgba(0,200,255,0.55)';
        ctx.font=`${6.5*s}px Space Mono`;
        ctx.fillText(T('channelBlocked'), chanX, memBot+28*s);
      }
    }

    // Phase label
    let phaseLabel=t<200?T('channelClosed'):t<400?T('glutBind'):t<650?T('ionFlow'):ketMol&&!ketMol.locked?(sub==='dxm'?T('dxmEnter'):T('ketEnter')):'OPEN CHANNEL BLOCK';
    ctx.textAlign='center'; ctx.fillStyle='rgba(0,153,255,0.45)';
    ctx.font=`${7*s}px Space Mono`; ctx.fillText(phaseLabel, cx, H-8*s);

    t++;
    raf = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── DMN NETWORK (psilocybin) ───────────────────────────────────────────────────
function drawDMNNetwork(canvas, sub) {
  const d = DATA[sub];
  const s = window.devicePixelRatio;
  const W = canvas.width = canvas.offsetWidth * s;
  const H = canvas.height = 250 * s;
  canvas.style.height = '250px';
  const ctx = canvas.getContext('2d');

  // Nodes: DMN (green) and non-DMN (grey)
  const nodes = [
    { x:0.50, y:0.18, label:'mPFC',  dmn:true  },
    { x:0.50, y:0.72, label:'PCC',   dmn:true  },
    { x:0.22, y:0.45, label:'AG-L',  dmn:true  },
    { x:0.78, y:0.45, label:'AG-R',  dmn:true  },
    { x:0.20, y:0.20, label:'VIS',   dmn:false },
    { x:0.80, y:0.20, label:'AUD',   dmn:false },
    { x:0.14, y:0.70, label:'SOM',   dmn:false },
    { x:0.86, y:0.70, label:'FPN',   dmn:false },
  ].map(n=>({...n, x:n.x*W, y:n.y*H, r:14*s, act:n.dmn?0.85:0.2, targetAct:n.dmn?0.85:0.2}));

  // Edges — DMN-internal and cross-network
  const edges = [];
  // DMN internal
  [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]].forEach(([a,b])=>edges.push({a,b,dmn:true,cross:false,w:0.7,targetW:0.7}));
  // Cross-network (appear under drug)
  [[0,4],[1,6],[2,7],[3,5],[4,6],[5,7],[0,6],[1,5]].forEach(([a,b])=>edges.push({a,b,dmn:false,cross:true,w:0.05,targetW:0.05}));

  let t=0, raf, drugLevel=0;
  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  function draw() {
    ctx.clearRect(0,0,W,H);

    // Drug ramps up over ~200 frames, holds, then resets
    if (t > 500) { t = 0; drugLevel = 0; edges.forEach(e=>{ e.w = e.dmn?0.7:0.05; }); nodes.forEach(n=>{ n.act=n.dmn?0.85:0.2; }); }
    const targetDrug = Math.min(1, t/200);
    drugLevel += (targetDrug - drugLevel)*0.01;

    // Update edge weights
    edges.forEach(e=>{
      if (e.dmn) e.targetW = 0.7 - drugLevel*0.58;
      if (e.cross) e.targetW = 0.04 + drugLevel*0.62;
      e.w += (e.targetW - e.w)*0.025;
    });
    // Update node activation
    nodes.forEach(n=>{
      if (n.dmn) n.targetAct = 0.85 - drugLevel*0.55;
      else n.targetAct = 0.2 + drugLevel*0.55;
      n.act += (n.targetAct - n.act)*0.02;
    });

    // Draw edges
    edges.forEach(e=>{
      if (e.w < 0.04) return;
      const na=nodes[e.a], nb=nodes[e.b];
      const pulse = 0.7+0.3*Math.sin(t*0.04 + e.a*0.7 + e.b*0.5);
      const col = e.dmn ? `68,255,120` : `180,100,255`;
      ctx.strokeStyle = `rgba(${col},${e.w*pulse})`;
      ctx.lineWidth = (e.w*3+0.4)*s;
      ctx.beginPath(); ctx.moveTo(na.x,na.y); ctx.lineTo(nb.x,nb.y); ctx.stroke();
    });

    // Draw nodes
    nodes.forEach(n=>{
      const col = n.dmn ? `68,220,100` : `170,170,200`;
      const pulse = 0.6+0.4*Math.sin(t*0.045+(n.dmn?0:Math.PI)+n.x*0.001);
      const gAlpha = n.act*pulse;
      glow(`rgb(${col})`, 14*s*n.act);
      const g2 = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g2.addColorStop(0,`rgba(${col},${gAlpha*0.9})`);
      g2.addColorStop(1,`rgba(${col},${gAlpha*0.15})`);
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=g2; ctx.fill(); noGlow();
      ctx.strokeStyle=`rgba(${col},${0.3+n.act*0.5})`; ctx.lineWidth=1*s; ctx.stroke();
      ctx.textAlign='center'; ctx.fillStyle=`rgba(255,255,255,${0.4+n.act*0.4})`;
      ctx.font=`bold ${8*s}px Space Mono`;
      ctx.fillText(n.label, n.x, n.y+3*s);
    });

    // Status
    const phase = drugLevel < 0.15 ? 'BASELINE — DMN AKTYWNY' : drugLevel < 0.5 ? 'PSYLOCYBINA — DISRUPCJA DMN' : 'NOWE POŁĄCZENIA CROSS-NETWORK';
    ctx.textAlign='left'; ctx.fillStyle=`rgba(68,220,100,${0.3+drugLevel*0.3})`;
    ctx.font=`${7*s}px Space Mono`; ctx.fillText(phase, 8*s, H-8*s);

    // Legend
    ctx.textAlign='right'; ctx.font=`${6.5*s}px Space Mono`;
    ctx.fillStyle='rgba(68,220,100,0.6)'; ctx.fillText('● '+T('dmnNodes'), W-8*s, H-20*s);
    ctx.fillStyle='rgba(170,170,200,0.5)'; ctx.fillText('● '+T('extNetworks'), W-8*s, H-8*s);

    t++;
    raf = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── RECEPTOR MAP (LSD) ───────────────────────────────────────────────────────
function drawReceptorMap(canvas, sub) {
  const d = DATA[sub];
  const s = window.devicePixelRatio;
  const W = canvas.width = canvas.offsetWidth * s;
  const H = canvas.height = 320 * s;
  canvas.style.height = '320px';
  const ctx = canvas.getContext('2d');

  // 2-column layout — left col nodes at x=0.14, right col at x=0.76
  // Labels: left col → right of node, right col → left of node. No center col = no collision.
  const receptorClasses = [
    // Left column
    { label:'5-HT2A', col:'255,60,255',  nx:0.14, ny:0.12, affinity:0.98, role:'psychedelik główny' },
    { label:'5-HT2B', col:'255,100,220', nx:0.14, ny:0.30, affinity:0.72, role:'kardiotoksyczność' },
    { label:'5-HT1A', col:'200,80,255',  nx:0.14, ny:0.48, affinity:0.55, role:'anksjoliza, empatia' },
    { label:'D2',     col:'0,255,170',   nx:0.14, ny:0.66, affinity:0.60, role:'stymulacja, myśli' },
    { label:'D1',     col:'0,220,140',   nx:0.14, ny:0.84, affinity:0.40, role:'aktywacja PFC' },
    // Right column
    { label:'α1B',    col:'255,140,30',  nx:0.76, ny:0.12, affinity:0.44, role:'tachykardia, źrenice' },
    { label:'α2A',    col:'255,170,50',  nx:0.76, ny:0.30, affinity:0.50, role:'układ autonomiczny' },
    { label:'H1',     col:'100,180,255', nx:0.76, ny:0.48, affinity:0.28, role:'sedacja' },
    { label:'σ1',     col:'180,220,255', nx:0.76, ny:0.66, affinity:0.22, role:'dysocjacja' },
  ].map(r=>({...r,
    x: r.nx*W, y: r.ny*H, r:11*s,
    isLeft: r.nx < 0.5,
    bound:false, bindTimer:0, lidClosed:false, lidProgress:0
  }));

  const lsdMols = [];
  let t=0, raf;

  function spawnLSD() {
    const unbound = receptorClasses.filter(r=>!r.bound && !r.lidClosed);
    if (unbound.length===0 || lsdMols.length>5) return;
    const tgt = unbound[Math.floor(Math.random()*unbound.length)];
    const startX = tgt.isLeft ? -10*s : W+10*s;
    const dirVx  = tgt.isLeft ?  (1.1*s+Math.random()*0.5*s) : -(1.1*s+Math.random()*0.5*s);
    lsdMols.push({ x:startX, y:tgt.y+(Math.random()-0.5)*12*s,
      vy:(Math.random()-0.5)*0.18*s, vx:dirVx, targetRec:tgt, alpha:0, bound:false });
  }

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  function draw() {
    ctx.clearRect(0,0,W,H);

    if (t%55===0) spawnLSD();
    if (t>0 && t%480===0) {
      receptorClasses.forEach(r=>{r.bound=false;r.bindTimer=0;r.lidClosed=false;r.lidProgress=0;});
      lsdMols.length=0;
    }

    // Column divider (subtle)
    ctx.strokeStyle='rgba(40,40,60,0.5)'; ctx.lineWidth=0.5*s; ctx.setLineDash([4*s,4*s]);
    ctx.beginPath(); ctx.moveTo(W*0.5,10*s); ctx.lineTo(W*0.5,H-20*s); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=`${6*s}px Space Mono`; ctx.textAlign='center'; ctx.fillStyle='rgba(60,60,90,0.45)';
    ctx.fillText('5-HT  ·  DA', W*0.27, H-6*s);
    ctx.fillText('α  ·  H1  ·  σ1', W*0.77, H-6*s);

    // LSD molecules
    for (let i=lsdMols.length-1; i>=0; i--) {
      const m=lsdMols[i]; m.alpha=Math.min(1,m.alpha+0.05);
      if (!m.bound) {
        m.x+=m.vx; m.y+=m.vy;
        const dist=Math.hypot(m.x-m.targetRec.x, m.y-m.targetRec.y);
        if (dist < m.targetRec.r+4*s) { m.bound=true; m.targetRec.bound=true; m.targetRec.bindTimer=0; }
      } else {
        const tg=m.targetRec;
        m.x+=(tg.x-m.x)*0.2; m.y+=(tg.y-m.y)*0.2;
        tg.bindTimer++;
        if (tg.bindTimer>40 && !tg.lidClosed) tg.lidClosed=true;
        if (tg.lidClosed) tg.lidProgress=Math.min(1,tg.lidProgress+0.025);
        m.alpha-=0.007;
        if (m.alpha<=0){lsdMols.splice(i,1);}
      }
      if (m.alpha>0.05) {
        glow('rgb(255,60,255)',5*s);
        ctx.beginPath(); ctx.arc(m.x,m.y,4*s,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,100,255,${m.alpha})`; ctx.fill();
        ctx.beginPath(); ctx.arc(m.x,m.y,1.5*s,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${m.alpha*0.7})`; ctx.fill();
        noGlow();
      }
    }

    // Receptors
    receptorClasses.forEach((rec,i)=>{
      const pulse = rec.bound ? 0.5+0.5*Math.sin(t*0.07+i) : 0.15+0.15*Math.sin(t*0.03+i);
      const brightness = rec.lidClosed ? 0.5+rec.lidProgress*0.4 : (rec.bound?0.6+pulse*0.3:0.15+pulse);
      const r2 = rec.r*(1+rec.lidProgress*0.3);

      if (rec.bound || rec.lidClosed) glow(`rgb(${rec.col})`,r2*(3+rec.lidProgress*4));
      const rg=ctx.createRadialGradient(rec.x,rec.y,0,rec.x,rec.y,r2);
      rg.addColorStop(0,`rgba(${rec.col},${brightness*0.9})`);
      rg.addColorStop(1,`rgba(${rec.col},${brightness*0.1})`);
      ctx.beginPath(); ctx.arc(rec.x,rec.y,r2,0,Math.PI*2);
      ctx.fillStyle=rg; ctx.fill(); noGlow();
      ctx.strokeStyle=`rgba(${rec.col},${0.25+brightness*0.5})`; ctx.lineWidth=0.8*s; ctx.stroke();

      // Lid arc
      if (rec.lidClosed && rec.lidProgress>0) {
        ctx.strokeStyle=`rgba(${rec.col},${rec.lidProgress*0.8})`; ctx.lineWidth=1.5*s;
        ctx.beginPath();
        ctx.arc(rec.x,rec.y,r2+5*s,-Math.PI*rec.lidProgress,Math.PI*rec.lidProgress,false);
        ctx.stroke();
      }

      // Labels — left col: text starts right of node; right col: text ends left of node
      const GAP = 9*s;
      const labelX  = rec.isLeft ? rec.x+r2+GAP : rec.x-r2-GAP;
      const align    = rec.isLeft ? 'left' : 'right';
      const baseY    = rec.y - 4*s;

      ctx.textAlign=align;
      // Name
      ctx.font=`bold ${9*s}px Space Mono`;
      ctx.fillStyle=`rgba(${rec.col},${0.6+brightness*0.3})`;
      ctx.fillText(rec.label, labelX, baseY);
      // Role
      ctx.font=`${6.5*s}px Inter`;
      ctx.fillStyle=`rgba(${rec.col},0.40)`;
      ctx.fillText(rec.role, labelX, baseY+12*s);
      // Affinity bar
      const BAR=22*s;
      const bx = rec.isLeft ? labelX : labelX-BAR;
      ctx.fillStyle=`rgba(${rec.col},0.10)`; ctx.fillRect(bx, baseY+16*s, BAR, 2.5*s);
      ctx.fillStyle=`rgba(${rec.col},${0.3+brightness*0.3})`; ctx.fillRect(bx, baseY+16*s, BAR*rec.affinity, 2.5*s);
      // Locked — below affinity bar
      if (rec.lidClosed && rec.lidProgress>0.6) {
        ctx.font=`${6*s}px Space Mono`; ctx.fillStyle=`rgba(${rec.col},0.65)`;
        ctx.fillText('⬡ locked', labelX, baseY+28*s);
      }
    });

    ctx.textAlign='left'; ctx.fillStyle='rgba(255,60,255,0.3)';
    ctx.font=`${6.5*s}px Space Mono`;
    ctx.fillText(T('lsdMap'), 8*s, H-8*s);

    t++;
    raf=requestAnimationFrame(draw);
  }
  draw();
  return ()=>cancelAnimationFrame(raf);
}

// ── PSILOCYBIN 5-HT2A SYNAPSE ────────────────────────────────────────────────
function drawPsilocybinSynapse(canvas) {
  const s = window.devicePixelRatio;
  const W = canvas.width = canvas.offsetWidth * s;
  const H = canvas.height = 240 * s;
  canvas.style.height = '240px';
  const ctx = canvas.getContext('2d');
  const cx = W/2;

  const termW=220*s, tLeft=cx-termW/2, tRight=cx+termW/2;
  const preY=10*s, preH=56*s;
  const cleftY=preY+preH, cleftH=28*s;
  const postY=cleftY+cleftH, postH=58*s;

  // Particles
  const particles = [];
  // Gq cascade signals
  const cascadeSignals = [];
  let t=0, raf;
  let boundPsilocin=0; // count of psilocin bound to receptors

  const RECS = Array.from({length:6},(_,i)=>({
    x: tLeft+22*s+i*(termW-44*s)/5,
    bound:false, boundTimer:0, type:'5HT2A'
  }));

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  function spawnParticle(isPsilocin) {
    if(particles.length>28) return;
    const vx=(Math.random()-0.5)*0.3*s;
    const vy=0.5*s+Math.random()*0.3*s;
    particles.push({
      x: tLeft+10*s+Math.random()*(termW-20*s),
      y: preY+preH-4*s,
      vx, vy,
      isPsilocin,
      col: isPsilocin ? '200,80,255' : '255,80,180',
      size: isPsilocin ? (2.2+Math.random()*0.8)*s : (1.5+Math.random()*0.7)*s,
      alpha:0, state:'falling',
      targetX:0, targetY:0, dwellTimer:0,
    });
  }

  function spawnCascade(x) {
    cascadeSignals.push({
      x, y: postY+postH*0.4,
      vy: 0.6*s, alpha:1, age:0,
    });
  }

  function draw() {
    ctx.clearRect(0,0,W,H);

    // Spawn: serotonin always, psilocin ramps up
    const psiRate = Math.min(1, t/300);
    if(t%12===0) spawnParticle(false); // 5-HT
    if(t%14===0 && Math.random()<psiRate) spawnParticle(true); // psilocin

    // PRE terminal
    const preGrad=ctx.createLinearGradient(cx,preY,cx,preY+preH);
    preGrad.addColorStop(0,'rgba(200,80,255,0.18)'); preGrad.addColorStop(1,'rgba(200,80,255,0.02)');
    ctx.beginPath(); ctx.roundRect(tLeft,preY,termW,preH,[12*s,12*s,0,0]);
    ctx.fillStyle=preGrad; ctx.fill();
    ctx.strokeStyle='rgba(200,80,255,0.35)'; ctx.lineWidth=1*s; ctx.stroke();
    ctx.font=`${7*s}px Space Mono`; ctx.fillStyle='rgba(200,80,255,0.3)';
    ctx.textAlign='left'; ctx.fillText(T('seroSyn'), tLeft+10*s, preY+14*s);

    // Cleft
    ctx.fillStyle='rgba(4,4,8,0.97)';
    ctx.fillRect(tLeft-1*s,cleftY,termW+2*s,cleftH);
    ctx.fillStyle='rgba(60,60,90,0.4)'; ctx.font=`${6*s}px Space Mono`; ctx.textAlign='center';
    ctx.fillText(T('synapticCleft'), cx, cleftY+cleftH/2+2*s);

    // POST terminal
    const postGrad=ctx.createLinearGradient(cx,postY,cx,postY+postH);
    postGrad.addColorStop(0,'rgba(200,80,255,0.02)'); postGrad.addColorStop(1,'rgba(200,80,255,0.14)');
    ctx.beginPath(); ctx.roundRect(tLeft,postY,termW,postH,[0,0,12*s,12*s]);
    ctx.fillStyle=postGrad; ctx.fill();
    ctx.strokeStyle='rgba(200,80,255,0.25)'; ctx.lineWidth=1*s; ctx.stroke();
    ctx.font=`${7*s}px Space Mono`; ctx.fillStyle='rgba(200,80,255,0.28)';
    ctx.textAlign='left'; ctx.fillText(T('pyrSyn'), tLeft+10*s, postY+postH-10*s);

    // Receptors 5-HT2A
    boundPsilocin=0;
    RECS.forEach((rec,i)=>{
      const active=rec.bound;
      if(active) boundPsilocin++;
      const pulse=active?0.5+0.5*Math.sin(t*0.08+i*0.9):0.1+0.1*Math.sin(t*0.03+i);
      const recH=26*s, recW=12*s;
      ctx.beginPath(); ctx.roundRect(rec.x-recW/2, postY+3*s, recW, recH, recW/2);
      if(active){
        const rg=ctx.createLinearGradient(rec.x,postY,rec.x,postY+recH);
        rg.addColorStop(0,'rgba(200,80,255,0.9)'); rg.addColorStop(1,'rgba(200,80,255,0.4)');
        ctx.fillStyle=rg; glow('rgb(200,80,255)',12*s);
      } else {
        ctx.fillStyle=`rgba(100,40,160,${0.15+pulse*0.2})`;
      }
      ctx.fill(); noGlow();
      ctx.strokeStyle=active?'rgba(200,80,255,0.9)':`rgba(100,40,160,${0.3+pulse*0.3})`;
      ctx.lineWidth=0.8*s; ctx.stroke();
      // Label
      if(i===0){
        ctx.font=`${6*s}px Space Mono`; ctx.fillStyle='rgba(200,80,255,0.5)';
        ctx.textAlign='left'; ctx.fillText('5-HT2A', tLeft, postY+recH+12*s);
      }
      // Gq activation arrow when bound
      if(active && rec.bound && rec.boundTimer>20){
        const arrowY=postY+recH+6*s;
        ctx.strokeStyle=`rgba(200,80,255,${0.3+pulse*0.4})`; ctx.lineWidth=1.2*s;
        ctx.beginPath(); ctx.moveTo(rec.x,arrowY); ctx.lineTo(rec.x,arrowY+14*s); ctx.stroke();
        ctx.fillStyle=`rgba(200,80,255,${0.3+pulse*0.4})`;
        ctx.beginPath(); ctx.moveTo(rec.x,arrowY+18*s); ctx.lineTo(rec.x-4*s,arrowY+12*s); ctx.lineTo(rec.x+4*s,arrowY+12*s); ctx.closePath(); ctx.fill();
      }
      rec.boundTimer = rec.bound ? rec.boundTimer+1 : 0;
      if(rec.bound && rec.boundTimer>90){ rec.bound=false; rec.boundTimer=0; }
    });

    // Gq cascade label
    if(boundPsilocin>=2){
      const gqAlpha=Math.min(1,(boundPsilocin-1)/4)*0.7;
      ctx.font=`${7*s}px Space Mono`; ctx.textAlign='center';
      ctx.fillStyle=`rgba(255,150,255,${gqAlpha})`;
      ctx.fillText(T('gqCascade',boundPsilocin), cx, postY+postH-22*s);
    }

    // Particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.age++;
      if(p.state==='falling'){
        p.x+=p.vx; p.y+=p.vy; p.alpha=Math.min(1,p.alpha+0.1);
        if(p.y>cleftY+4*s){
          // Psilocin prefers 5-HT2A — try to bind
          if(p.isPsilocin){
            const free=RECS.filter(r=>!r.bound);
            if(free.length>0&&Math.random()<0.5){
              const tgt=free[Math.floor(Math.random()*free.length)];
              tgt.bound=true; tgt.boundTimer=0;
              p.state='binding'; p.targetX=tgt.x; p.targetY=postY+10*s;
            } else { p.state='dwelling'; p.vy=(Math.random()-0.5)*0.25*s; p.vx=(Math.random()-0.5)*0.35*s; }
          } else {
            // 5-HT rarely binds (psilocin outcompetes)
            const free=RECS.filter(r=>!r.bound);
            if(free.length>0&&Math.random()<0.15){
              const tgt=free[Math.floor(Math.random()*free.length)];
              tgt.bound=true; tgt.boundTimer=0;
              p.state='binding'; p.targetX=tgt.x; p.targetY=postY+10*s;
            } else { p.state='recycling'; p.vy=-0.8*s-Math.random()*0.4*s; p.vx=(Math.random()-0.5)*0.3*s; p.targetX=p.x; }
          }
        }
      } else if(p.state==='dwelling'){
        p.vx+=(Math.random()-0.5)*0.06*s; p.vy+=(Math.random()-0.5)*0.04*s;
        p.vx*=0.88; p.vy*=0.88; p.x+=p.vx; p.y+=p.vy;
        if(p.x<tLeft+3*s){p.x=tLeft+3*s;p.vx=Math.abs(p.vx);}
        if(p.x>tRight-3*s){p.x=tRight-3*s;p.vx=-Math.abs(p.vx);}
        if(p.y<cleftY+2*s){p.y=cleftY+2*s;p.vy=Math.abs(p.vy);}
        if(p.y>cleftY+cleftH-2*s){p.y=cleftY+cleftH-2*s;p.vy=-Math.abs(p.vy);}
        p.dwellTimer++;
        if(p.dwellTimer>60){ p.state='dying'; }
      } else if(p.state==='recycling'){
        p.y+=p.vy; p.alpha-=0.018;
        if(p.y<preY+preH-6*s||p.alpha<=0){particles.splice(i,1);continue;}
      } else if(p.state==='binding'){
        p.x+=(p.targetX-p.x)*0.14; p.y+=(p.targetY-p.y)*0.14;
        if(Math.abs(p.x-p.targetX)<2*s&&Math.abs(p.y-p.targetY)<2*s){p.state='bound';p.age=0;}
      } else if(p.state==='bound'){
        p.x=p.targetX; p.y=p.targetY;
        p.alpha=0.7+0.3*Math.sin(p.age*0.15);
        if(p.age>70){p.state='dying';}
      } else if(p.state==='dying'){
        p.alpha-=0.025; if(p.alpha<=0){particles.splice(i,1);continue;}
      }
      if(p.alpha>0.02){
        glow(`rgb(${p.col})`,p.isPsilocin?6*s:4*s);
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=`rgba(${p.col},${Math.max(0,Math.min(1,p.alpha))})`; ctx.fill();
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.38,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${p.alpha*0.45})`; ctx.fill();
        noGlow();
      }
    }

    // Legend
    ctx.font=`${7*s}px Space Mono`;
    glow('rgb(200,80,255)',4*s);
    ctx.beginPath(); ctx.arc(tRight+14*s, cleftY+8*s, 4*s,0,Math.PI*2);
    ctx.fillStyle='rgba(200,80,255,0.9)'; ctx.fill(); noGlow();
    ctx.fillStyle='rgba(200,80,255,0.7)'; ctx.textAlign='left'; ctx.fillText(T('psilocinLabel'), tRight+22*s, cleftY+11*s);
    glow('rgb(255,80,180)',3*s);
    ctx.beginPath(); ctx.arc(tRight+14*s, cleftY+24*s, 3*s,0,Math.PI*2);
    ctx.fillStyle='rgba(255,80,180,0.9)'; ctx.fill(); noGlow();
    ctx.fillStyle='rgba(255,80,180,0.5)'; ctx.fillText(T('htLabel'), tRight+22*s, cleftY+27*s);

    // Phase label
    const phase=psiRate<0.3?'BASELINE — NORMALNA SEROTONINA':psiRate<0.7?'PSILOCYNA WCHODZI DO SYNAPSY':'KOMPETYCJA — PSILOCYNA DOMINUJE 5-HT2A';
    ctx.textAlign='left'; ctx.fillStyle='rgba(200,80,255,0.4)';
    ctx.font=`${6.5*s}px Space Mono`; ctx.fillText(phase, tLeft, H-6*s);

    t++;
    raf=requestAnimationFrame(draw);
  }
  draw();
  return ()=>cancelAnimationFrame(raf);
}

// ── LSD KINETICS — receptor occupancy timeline ──────────────────────────────
function drawLSDKinetics(canvas) {
  const s = window.devicePixelRatio;
  const W = canvas.width = canvas.offsetWidth * s;
  const H = canvas.height = 260 * s;
  canvas.style.height = '260px';
  const ctx = canvas.getContext('2d');

  const RECS = [
    { label:'5-HT2A', col:'255,60,255',  affinity:0.98 },
    { label:'5-HT1A', col:'200,80,255',  affinity:0.55 },
    { label:'D2',     col:'0,255,170',   affinity:0.60 },
    { label:'α2A',    col:'255,170,50',  affinity:0.50 },
    { label:'α1B',    col:'255,140,30',  affinity:0.44 },
    { label:'H1',     col:'100,180,255', affinity:0.28 },
  ];

  // Deterministic bindFrames — sorted by affinity desc, evenly spaced so ALL receptors get bound
  const sortedByAffinity = [...RECS].sort((a,b)=>b.affinity-a.affinity);
  const state = RECS.map(r=>{
    const rank = sortedByAffinity.findIndex(x=>x.label===r.label);
    return { lsdOcc:0, normalOcc:0, lidClosed:false, lidProgress:0,
             bindFrame: 60 + rank*55 }; // evenly spaced, highest affinity first
  });

  let t=0, raf;

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  function normalOccCurve(t, affinity) {
    return affinity * 0.65 * (0.5 + 0.5*Math.sin(t*0.018));
  }

  function draw() {
    ctx.clearRect(0,0,W,H);

    // Layout: legend header (28px) + 6 rows
    const LEGEND_H = 28*s;
    const barAreaX = 80*s;
    const BAR_RIGHT_PAD = 32*s; // room for dot + lock after bar
    const barW = W - barAreaX - BAR_RIGHT_PAD;
    const rowH = 32*s;
    const startY = LEGEND_H + 8*s;

    // ── Legend header (above bars, never overlaps) ──
    ctx.font=`${6.5*s}px Space Mono`;
    // LSD line sample
    ctx.fillStyle='rgba(255,60,255,0.7)';
    ctx.fillRect(barAreaX, 10*s, 16*s, 3*s);
    ctx.fillStyle='rgba(255,60,255,0.6)';
    ctx.textAlign='left'; ctx.fillText(T('lidKinetics'), barAreaX+20*s, 15*s);
    // 5-HT dashed sample
    ctx.setLineDash([3*s,3*s]);
    ctx.strokeStyle='rgba(180,180,180,0.5)'; ctx.lineWidth=1.2*s;
    ctx.beginPath(); ctx.moveTo(barAreaX, 24*s); ctx.lineTo(barAreaX+16*s, 24*s); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(160,160,160,0.55)';
    ctx.fillText(T('htNormal'), barAreaX+20*s, 27*s);

    RECS.forEach((rec,i)=>{
      const st=state[i];
      const y = startY + i*rowH + 10*s;

      // Update LSD occupancy
      if(t >= st.bindFrame) {
        const bp = Math.min(1,(t-st.bindFrame)/100);
        st.lsdOcc = Math.min(rec.affinity, st.lsdOcc + 0.004*(rec.affinity - st.lsdOcc + 0.008));
        if(bp > 0.45 && !st.lidClosed) st.lidClosed=true;
        if(st.lidClosed) st.lidProgress=Math.min(1,st.lidProgress+0.007);
      }
      st.normalOcc = normalOccCurve(t, rec.affinity);

      // Row bg
      ctx.fillStyle='rgba(255,255,255,0.02)';
      ctx.fillRect(barAreaX-2*s, y-8*s, barW+BAR_RIGHT_PAD, rowH-6*s);

      // Label
      ctx.font=`bold ${8*s}px Space Mono`;
      ctx.fillStyle=`rgba(${rec.col},0.8)`;
      ctx.textAlign='right'; ctx.fillText(rec.label, barAreaX-8*s, y+3*s);

      // Track
      ctx.fillStyle='rgba(255,255,255,0.04)';
      ctx.fillRect(barAreaX, y-3*s, barW, 5*s);

      // 5-HT dashed line
      const normalX = barAreaX + st.normalOcc * barW;
      ctx.setLineDash([3*s,3*s]);
      ctx.strokeStyle=`rgba(180,180,180,0.3)`; ctx.lineWidth=1*s;
      ctx.beginPath(); ctx.moveTo(barAreaX, y-0.5*s); ctx.lineTo(normalX, y-0.5*s); ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(normalX, y-0.5*s, 2.5*s,0,Math.PI*2);
      ctx.fillStyle='rgba(180,180,180,0.4)'; ctx.fill();

      // LSD bar
      const lsdX = barAreaX + st.lsdOcc * barW;
      if(st.lsdOcc > 0.01) {
        const barGrad = ctx.createLinearGradient(barAreaX, y+2*s, lsdX, y+2*s);
        barGrad.addColorStop(0, `rgba(${rec.col},0.12)`);
        barGrad.addColorStop(1, st.lidClosed ? `rgba(${rec.col},0.88)` : `rgba(${rec.col},0.55)`);
        ctx.fillStyle=barGrad;
        ctx.fillRect(barAreaX, y+1*s, lsdX-barAreaX, 3*s);
        // Endpoint dot
        glow(`rgb(${rec.col})`, st.lidClosed ? 8*s : 3*s);
        ctx.beginPath(); ctx.arc(lsdX, y+2.5*s, st.lidClosed ? 5*s : 2.5*s, 0, Math.PI*2);
        ctx.fillStyle=`rgba(${rec.col},${0.5+st.lidProgress*0.45})`; ctx.fill(); noGlow();
        // Lock icon follows dot — drawn right after it, always inside canvas
        if(st.lidClosed && st.lidProgress>0.65) {
          ctx.font=`${10*s}px sans-serif`; ctx.textAlign='left';
          ctx.fillText('🔒', Math.min(lsdX+8*s, W-18*s), y+6*s);
        }
      }

      // Ki — small, left of track start
      ctx.font=`${5.5*s}px Space Mono`; ctx.textAlign='right';
      ctx.fillStyle=`rgba(${rec.col},0.22)`;
      ctx.fillText(`${(rec.affinity*10).toFixed(1)} nM`, barAreaX-8*s, y+16*s);
    });

    // Bottom note
    ctx.font=`${6.5*s}px Space Mono`; ctx.textAlign='left';
    ctx.fillStyle='rgba(255,60,255,0.3)';
    const lockedCount = state.filter(s=>s.lidClosed&&s.lidProgress>0.5).length;
    ctx.fillText(T('lsdKinetics',lockedCount,RECS.length), 8*s, H-8*s);

    t++;
    raf=requestAnimationFrame(draw);
  }
  draw();
  return ()=>cancelAnimationFrame(raf);
}

// Synapse Canvas — dispatcher
function drawSynapse(canvas, sub) {
  const syn = SYN[sub];
  if (syn && syn.vizType === 'disinhibition')  return drawDisinhibition(canvas, sub);
  if (syn && syn.vizType === 'nmda_channel')   return drawNMDAChannel(canvas, sub);
  if (syn && syn.vizType === 'dmn_network')    return drawDMNNetwork(canvas, sub);
  if (syn && syn.vizType === 'receptor_map')   return drawReceptorMap(canvas, sub);
  if (syn && syn.vizType === 'cb1_retrograde') return drawCB1Retrograde(canvas, sub);
  if (syn && syn.vizType === 'cbd_multitarget')return drawCBDMultiTarget(canvas, sub);
  if (syn && syn.vizType === 'dmt_flood')      return drawDMTFlood(canvas);
  if (syn && syn.vizType === 'gabaa_channel')  return drawGABAAChannel(canvas);
  if (syn && syn.vizType === 'ghb_circuit')    return drawGHBCircuit(canvas);
  // Default: monoamine synapse
  const d = DATA[sub];
  const s = window.devicePixelRatio;
  const W = canvas.width = canvas.offsetWidth * s;
  const H = canvas.height = 250 * s;
  canvas.style.height = '250px';
  const ctx = canvas.getContext('2d');

  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }
  const [cr,cg,cb] = hexToRgb(d.color);
  const cRgb = `${cr},${cg},${cb}`;
  const NT_COL = { DA:[0,255,170], HT:[255,68,255], NE:[255,170,68] };
  const NT_KEYS = ['DA','HT','NE'];
  const SYN_KEYS = ['da','ht','ne'];

  // ── Layout ────────────────────────────────────────────────────────────────
  const cx = W / 2;
  const termW = 242 * s;
  const tLeft  = cx - termW/2;
  const tRight = cx + termW/2;
  const preY = 12*s, preH = 62*s;
  const cleftY = preY + preH;          // 74*s
  const cleftH = 32*s;
  const postY  = cleftY + cleftH;      // 106*s
  const postH  = 62*s;

  // ── Transporters (pre-synaptic bottom) ──────────────────────────────────
  const TRANS_N = 7;
  const transports = Array.from({length:TRANS_N}, (_,i) => ({
    x: tLeft + (i+0.5)*(termW/TRANS_N),
    y: cleftY,
  }));
  // How many blocked: weighted average of block × NT activity
  const totalNtSum = d.nt.da + d.nt.ht + d.nt.ne || 1;
  const wtdBlock = SYN_KEYS.reduce((sum,k,i)=>
    sum + syn[k].block * [d.nt.da,d.nt.ht,d.nt.ne][i]/totalNtSum, 0);
  const blockedN = Math.round(TRANS_N * Math.min(wtdBlock * 1.15, 1));

  // ── Receptors (post-synaptic top) ────────────────────────────────────────
  const REC_N = 8;
  const receptors = Array.from({length:REC_N}, (_,i) => ({
    x: tLeft + (i+0.5)*(termW/REC_N),
    bound: false,
    boundTimer: 0,
  }));

  // ── Vesicles ─────────────────────────────────────────────────────────────
  const avgSpawn = (syn.da.spawn + syn.ht.spawn + syn.ne.spawn)/3;
  const vesicles = Array.from({length:7}, (_,i) => ({
    x: tLeft + 18*s + i*(termW-36*s)/6,
    y: preY + preH*0.44,
    r: (4.5 + Math.random()*2)*s,
    phase: Math.random()*Math.PI*2,
  }));

  // ── Particle pool ────────────────────────────────────────────────────────
  const MAX_P = 36;
  const particles = [];

  function spawnParticle(ntKey) {
    if (particles.length >= MAX_P) return;
    const [r,g,b] = NT_COL[ntKey];
    const si = SYN_KEYS[NT_KEYS.indexOf(ntKey)];
    // Spawn from a random active vesicle position, mostly vertical fall
    const ves = vesicles[Math.floor(Math.random()*vesicles.length)];
    particles.push({
      x: ves.x + (Math.random()-0.5)*10*s,
      y: preY + preH - 4*s,
      vx: (Math.random()-0.5)*0.25*s,   // tight horizontal
      vy: 0.55*s + Math.random()*0.35*s, // consistent downward
      nt: ntKey, col:`${r},${g},${b}`,
      state:'falling', age:0,
      size: (1.5+Math.random()*1.0)*s,
      alpha:0,
      dwellTimer:0,
      maxDwell: 80 + syn[si].block * 280,
      targetX:0, targetY:0,
    });
  }

  let t = 0, raf;
  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  // ── Particle update ───────────────────────────────────────────────────────
  function updateParticles() {
    // Spawn
    NT_KEYS.forEach((ntKey,ki) => {
      const si = SYN_KEYS[ki];
      if (syn[si].spawn > 0 && Math.random() < syn[si].spawn) spawnParticle(ntKey);
    });

    for (let i=particles.length-1; i>=0; i--) {
      const p = particles[i];
      p.age++;

      if (p.state === 'falling') {
        p.x += p.vx; p.y += p.vy;
        p.alpha = Math.min(1, p.alpha+0.09);
        if (p.y > cleftY + 5*s) {
          const si = SYN_KEYS[NT_KEYS.indexOf(p.nt)];
          const r = Math.random();
          if (r < 0.18) {
            // Try to bind to receptor
            const free = receptors.filter(rc=>!rc.bound);
            if (free.length > 0) {
              const tgt = free[Math.floor(Math.random()*free.length)];
              tgt.bound = true; tgt.boundTimer = 0;
              p.state='binding'; p.targetX=tgt.x; p.targetY=postY+8*s;
            } else {
              p.state = Math.random()<syn[si].block ? 'dwelling' : 'recycling';
              if (p.state==='recycling') setRecycleTarget(p);
              else { p.vy=(Math.random()-0.5)*0.3*s; p.vx=(Math.random()-0.5)*0.4*s; }
            }
          } else if (r < syn[si].block + 0.18) {
            p.state='dwelling';
            p.vy=(Math.random()-0.5)*0.3*s; p.vx=(Math.random()-0.5)*0.4*s;
          } else {
            p.state='recycling';
            setRecycleTarget(p);
          }
        }
      }

      else if (p.state === 'dwelling') {
        // Gentle Brownian in cleft — less jittery
        p.vx += (Math.random()-0.5)*0.07*s;
        p.vy += (Math.random()-0.5)*0.05*s;
        p.vx *= 0.87; p.vy *= 0.87;
        p.x += p.vx; p.y += p.vy;
        if (p.x < tLeft+4*s)  { p.x=tLeft+4*s;  p.vx= Math.abs(p.vx); }
        if (p.x > tRight-4*s) { p.x=tRight-4*s; p.vx=-Math.abs(p.vx); }
        if (p.y < cleftY+2*s)       { p.y=cleftY+2*s;       p.vy= Math.abs(p.vy); }
        if (p.y > cleftY+cleftH-2*s){ p.y=cleftY+cleftH-2*s;p.vy=-Math.abs(p.vy); }
        p.alpha = Math.min(0.96, p.alpha+0.04);
        p.dwellTimer++;
        if (p.dwellTimer > p.maxDwell) p.state='dying';
      }

      else if (p.state === 'recycling') {
        p.x += (p.targetX - p.x)*0.11;
        p.y += p.vy;
        p.vy -= 0.02*s;
        p.alpha -= 0.014;
        if (p.y < preY+preH-8*s || p.alpha<=0) { particles.splice(i,1); continue; }
      }

      else if (p.state === 'binding') {
        p.x += (p.targetX-p.x)*0.14; p.y += (p.targetY-p.y)*0.14;
        p.alpha = Math.min(1, p.alpha+0.06);
        if (Math.abs(p.x-p.targetX)<3*s && Math.abs(p.y-p.targetY)<3*s) {
          p.state='bound'; p.age=0;
        }
      }

      else if (p.state === 'bound') {
        p.x=p.targetX; p.y=p.targetY;
        p.alpha = 0.7+0.3*Math.sin(p.age*0.16);
        if (p.age>50) {
          p.state='dying';
          const rec=receptors.find(rc=>rc.bound && Math.abs(rc.x-p.targetX)<4*s);
          if (rec) rec.bound=false;
        }
      }

      else if (p.state === 'dying') {
        p.alpha -= 0.022; p.x+=p.vx; p.y+=p.vy;
        if (p.alpha<=0) { particles.splice(i,1); continue; }
      }
    }
  }

  function setRecycleTarget(p) {
    // Aim at a free (unblocked) transporter
    const freeStart = blockedN < TRANS_N ? blockedN : 0;
    const tr = transports[freeStart + Math.floor(Math.random()*(TRANS_N-freeStart))];
    p.targetX = tr.x; p.targetY = cleftY - 10*s;
    p.vx = (p.targetX - p.x)*0.08;
    p.vy = -0.9*s - Math.random()*0.4*s;
  }

  // ── Drawing ───────────────────────────────────────────────────────────────
  function drawFrame() {
    ctx.clearRect(0,0,W,H);

    // PRE-SYNAPTIC BODY
    const preGrad = ctx.createLinearGradient(cx, preY, cx, preY+preH);
    preGrad.addColorStop(0, `rgba(${cRgb},0.20)`);
    preGrad.addColorStop(0.6, `rgba(${cRgb},0.09)`);
    preGrad.addColorStop(1, `rgba(${cRgb},0.02)`);
    ctx.beginPath(); ctx.roundRect(tLeft,preY,termW,preH,[14*s,14*s,0,0]);
    ctx.fillStyle=preGrad; ctx.fill();
    const preBord = ctx.createLinearGradient(cx,preY,cx,preY+preH);
    preBord.addColorStop(0,`rgba(${cRgb},0.55)`); preBord.addColorStop(1,`rgba(${cRgb},0.08)`);
    ctx.strokeStyle=preBord; ctx.lineWidth=1*s; ctx.stroke();
    ctx.font=`${7.5*s}px Space Mono`; ctx.fillStyle=`rgba(${cRgb},0.32)`;
    ctx.textAlign='left';  ctx.fillText('PRE',      tLeft+10*s,  preY+13*s);
    ctx.textAlign='right'; ctx.fillText('SYNAPTIC', tRight-10*s, preY+13*s);

    // VESICLES
    vesicles.forEach(v => {
      const vy = v.y + Math.sin(t*0.018+v.phase)*2.5*s;
      const vg = ctx.createRadialGradient(v.x-v.r*0.3, vy-v.r*0.3, 0, v.x, vy, v.r*1.1);
      if (avgSpawn > 0.012) {
        vg.addColorStop(0,`rgba(${cRgb},0.90)`); vg.addColorStop(0.5,`rgba(${cRgb},0.50)`); vg.addColorStop(1,`rgba(${cRgb},0.10)`);
        glow(`rgb(${cRgb})`,v.r*2);
      } else {
        vg.addColorStop(0,'rgba(38,38,58,0.75)'); vg.addColorStop(1,'rgba(16,16,28,0.45)');
      }
      ctx.beginPath(); ctx.arc(v.x,vy,v.r,0,Math.PI*2);
      ctx.fillStyle=vg; ctx.fill(); noGlow();
      if (avgSpawn > 0.012) {
        ctx.beginPath(); ctx.arc(v.x-v.r*0.25,vy-v.r*0.28,v.r*0.32,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
      }
    });

    // TRANSPORTER PROTEINS on pre membrane
    transports.forEach((tr,i) => {
      const blocked = i < blockedN;
      const tw=9*s, th=11*s;
      ctx.beginPath();
      // U-shape opening downward into cleft
      ctx.moveTo(tr.x-tw/2, tr.y-th);
      ctx.lineTo(tr.x-tw/2, tr.y-1*s);
      ctx.moveTo(tr.x+tw/2, tr.y-th);
      ctx.lineTo(tr.x+tw/2, tr.y-1*s);
      ctx.moveTo(tr.x-tw/2, tr.y-th);
      ctx.lineTo(tr.x+tw/2, tr.y-th);
      ctx.strokeStyle = blocked ? `rgba(${cRgb},0.78)` : 'rgba(160,160,200,0.18)';
      ctx.lineWidth=1.4*s; ctx.stroke();
      if (blocked) {
        // Drug molecule blocking the transporter
        glow(`rgb(${cRgb})`,5*s);
        ctx.beginPath(); ctx.arc(tr.x, tr.y-th/2, 2.6*s, 0, Math.PI*2);
        ctx.fillStyle=`rgba(${cRgb},0.95)`; ctx.fill(); noGlow();
      } else {
        // Active: pulsing reuptake arrow
        const pulse = 0.35+0.35*Math.sin(t*0.07+i*1.2);
        ctx.fillStyle=`rgba(255,255,255,${pulse*0.28})`;
        ctx.textAlign='center'; ctx.font=`${8*s}px sans-serif`;
        ctx.fillText('↑', tr.x, tr.y-th*0.3);
      }
    });

    // CLEFT background
    ctx.fillStyle='rgba(4,4,8,0.97)';
    ctx.fillRect(tLeft-1*s, cleftY, termW+2*s, cleftH);

    // Dwelling particles create an ambient glow in the cleft
    const dwellingN = particles.filter(p=>p.state==='dwelling').length;
    if (dwellingN > 0) {
      const a = Math.min(dwellingN/14, 0.32);
      const ag = ctx.createLinearGradient(cx,cleftY,cx,cleftY+cleftH);
      ag.addColorStop(0,`rgba(${cRgb},${a*0.25})`);
      ag.addColorStop(0.5,`rgba(${cRgb},${a})`);
      ag.addColorStop(1,`rgba(${cRgb},${a*0.25})`);
      ctx.fillStyle=ag; ctx.fillRect(tLeft,cleftY,termW,cleftH);
    }

    // Cleft border lines
    [cleftY, cleftY+cleftH].forEach(y=>{
      const lg=ctx.createLinearGradient(tLeft,y,tRight,y);
      lg.addColorStop(0,'transparent'); lg.addColorStop(0.2,`rgba(${cRgb},0.22)`);
      lg.addColorStop(0.8,`rgba(${cRgb},0.22)`); lg.addColorStop(1,'transparent');
      ctx.strokeStyle=lg; ctx.lineWidth=0.7*s;
      ctx.beginPath(); ctx.moveTo(tLeft,y); ctx.lineTo(tRight,y); ctx.stroke();
    });
    ctx.textAlign='center'; ctx.fillStyle='rgba(65,65,95,0.5)';
    ctx.font=`${6.5*s}px Space Mono`;
    ctx.fillText('· · ·  '+T('synapticCleft')+'  · · ·', cx, cleftY+cleftH/2+2.5*s);

    // PARTICLES
    particles.forEach(p=>{
      if(p.alpha<=0) return;
      const sz = p.state==='bound' ? p.size*1.5 : p.size;
      glow(`rgb(${p.col})`, sz*3.5);
      ctx.beginPath(); ctx.arc(p.x,p.y,sz,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col},${Math.max(0,Math.min(1,p.alpha))})`;
      ctx.fill();
      ctx.beginPath(); ctx.arc(p.x,p.y,sz*0.38,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.alpha*0.48})`; ctx.fill();
      noGlow();
    });

    // POST-SYNAPTIC BODY
    const postGrad = ctx.createLinearGradient(cx,postY,cx,postY+postH);
    postGrad.addColorStop(0,`rgba(${cRgb},0.02)`);
    postGrad.addColorStop(0.5,`rgba(${cRgb},0.08)`);
    postGrad.addColorStop(1,`rgba(${cRgb},0.17)`);
    ctx.beginPath(); ctx.roundRect(tLeft,postY,termW,postH,[0,0,14*s,14*s]);
    ctx.fillStyle=postGrad; ctx.fill();
    const postBord=ctx.createLinearGradient(cx,postY,cx,postY+postH);
    postBord.addColorStop(0,`rgba(${cRgb},0.08)`); postBord.addColorStop(1,`rgba(${cRgb},0.50)`);
    ctx.strokeStyle=postBord; ctx.lineWidth=1*s; ctx.stroke();
    ctx.font=`${7.5*s}px Space Mono`; ctx.fillStyle=`rgba(${cRgb},0.32)`;
    ctx.textAlign='left';  ctx.fillText('POST',     tLeft+10*s,  postY+postH-9*s);
    ctx.textAlign='right'; ctx.fillText('SYNAPTIC', tRight-10*s, postY+postH-9*s);

    // RECEPTOR CHANNELS
    const recBaseY=postY+3*s, recH=30*s, recW=13*s;
    const activeRecN=Math.round(REC_N*((d.nt.da*0.5+d.nt.ht*0.5)/100));
    receptors.forEach((rec,i)=>{
      const isActive=i<activeRecN, isBound=rec.bound;
      const pulse=isActive ? 0.45+0.45*Math.sin(t*0.05+i*0.72) : 0;
      ctx.beginPath(); ctx.roundRect(rec.x-recW/2,recBaseY,recW,recH,recW/2);
      if (isBound) {
        const rg=ctx.createLinearGradient(rec.x,recBaseY,rec.x,recBaseY+recH);
        rg.addColorStop(0,`rgba(${cRgb},0.85)`); rg.addColorStop(0.5,`rgba(${cRgb},1.0)`); rg.addColorStop(1,`rgba(${cRgb},0.60)`);
        ctx.fillStyle=rg; glow(`rgb(${cRgb})`,11*s);
      } else if(isActive){
        const rg=ctx.createLinearGradient(rec.x,recBaseY,rec.x,recBaseY+recH);
        rg.addColorStop(0,`rgba(${cRgb},${0.10+pulse*0.16})`); rg.addColorStop(0.5,`rgba(${cRgb},${0.32+pulse*0.24})`); rg.addColorStop(1,`rgba(${cRgb},${0.08+pulse*0.10})`);
        ctx.fillStyle=rg; glow(`rgb(${cRgb})`,5*s*pulse);
      } else { ctx.fillStyle='rgba(11,11,20,0.8)'; }
      ctx.fill(); noGlow();
      ctx.strokeStyle=isBound?`rgba(${cRgb},0.9)`:isActive?`rgba(${cRgb},${0.28+pulse*0.36})`:'rgba(32,32,50,0.38)';
      ctx.lineWidth=0.8*s; ctx.stroke();
      if(isActive||isBound){
        ctx.strokeStyle=`rgba(255,255,255,${isBound?0.28:0.07+pulse*0.09})`;
        ctx.lineWidth=1*s; ctx.beginPath();
        ctx.moveTo(rec.x,recBaseY+4*s); ctx.lineTo(rec.x,recBaseY+recH-4*s); ctx.stroke();
      }
    });

    // NT LEGEND right of terminals
    const lgX = tRight + 16*s;
    [
      {k:'DA',  sk:'da',  col:'0,255,170'},
      {k:'5-HT',sk:'ht',  col:'255,68,255'},
      {k:'NE',  sk:'ne',  col:'255,170,68'},
    ].forEach((item,i)=>{
      const ly = cleftY - 12*s + i*26*s;
      glow(`rgb(${item.col})`,5*s);
      ctx.beginPath(); ctx.arc(lgX+5*s,ly,4*s,0,Math.PI*2);
      ctx.fillStyle=`rgba(${item.col},0.9)`; ctx.fill(); noGlow();
      ctx.textAlign='left'; ctx.fillStyle=`rgba(${item.col},0.82)`;
      ctx.font=`${8*s}px Space Mono`; ctx.fillText(item.k, lgX+14*s, ly+3*s);
      // Spawn bar (release)
      const sp=Math.min(syn[item.sk].spawn/0.095,1);
      const bl=syn[item.sk].block;
      ctx.fillStyle=`rgba(${item.col},0.18)`; ctx.fillRect(lgX+13*s,ly+7*s,24*s,2*s);
      ctx.fillStyle=`rgba(${item.col},0.75)`; ctx.fillRect(lgX+13*s,ly+7*s,sp*24*s,2*s);
      // Block bar (dwell)
      ctx.fillStyle=`rgba(${item.col},0.12)`; ctx.fillRect(lgX+13*s,ly+11*s,24*s,2*s);
      ctx.fillStyle=`rgba(${item.col},0.50)`; ctx.fillRect(lgX+13*s,ly+11*s,bl*24*s,2*s);
    });
    // Bar labels
    ctx.font=`${6*s}px Space Mono`;
    ctx.fillStyle='rgba(100,100,130,0.5)'; ctx.textAlign='left';
    ctx.fillText('↑ wyrzut', lgX+13*s, cleftY+cleftH+5*s);
    ctx.fillText('↑ blokada', lgX+13*s, cleftY+cleftH+13*s);

    // Mechanism label at bottom
    ctx.textAlign='left'; ctx.fillStyle=`rgba(${cRgb},0.38)`;
    ctx.font=`${7*s}px Space Mono`;
    ctx.fillText(syn.label, tLeft, postY+postH+15*s);

    updateParticles();
    t++;
    raf = requestAnimationFrame(drawFrame);
  }
  drawFrame();
  return () => cancelAnimationFrame(raf);
}








// ── CB1 RETROGRADE (THC — canvas 1) ──────────────────────────────────────────
function drawCB1Retrograde(canvas) {
  const s = window.devicePixelRatio;
  const W = canvas.width  = canvas.offsetWidth * s;
  const H = canvas.height = 310 * s;
  canvas.style.height = '310px';
  const ctx = canvas.getContext('2d');

  const cx = W/2;
  const LEGEND_H = 28*s;                          // reserved top strip for legend
  const preY   = LEGEND_H + 8*s;
  const preH   = 52*s;
  const cleftY = preY + preH;
  const cleftH = 44*s;
  const postY  = cleftY + cleftH;
  const postH  = 52*s;
  const tLeft  = cx - 110*s, tRight = cx + 110*s, termW = 220*s;

  // CB1 receptors on PRE membrane (bottom of presynaptic terminal)
  const cb1Recs = [
    { x: cx - 64*s }, { x: cx - 20*s }, { x: cx + 24*s }, { x: cx + 68*s }
  ].map(r => ({ ...r, y: cleftY - 3*s, bound: false, boundTimer: 0, activation: 0 }));

  // Particles
  const particles = [];
  let thcLevel = 0, t = 0, raf;

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  function spawnNT() {
    // NT from pre→post, frequency decreases when CB1 active
    const suppression = cb1Recs.filter(r=>r.activation>0.3).length / cb1Recs.length;
    if (Math.random() < 0.014 * (1 - suppression*0.7)) {  // było 0.025
      particles.push({ x: tLeft+30*s + Math.random()*(termW-60*s), y: cleftY,
        vy: 0.4*s + Math.random()*0.2*s, vx: (Math.random()-0.5)*0.2*s,  // było 0.7/0.3
        type: 'nt', alpha: 0.9, age: 0 });
    }
  }

  function spawnECB() {
    // Endocannabinoids from post, go UP
    if (Math.random() < 0.010) {  // było 0.018
      particles.push({ x: tLeft+40*s + Math.random()*(termW-80*s), y: postY,
        vy: -(0.35*s + Math.random()*0.2*s), vx: (Math.random()-0.5)*0.18*s,  // było 0.6/0.3
        type: 'ecb', alpha: 0.85, age: 0 });
    }
  }

  function spawnTHC() {
    if (thcLevel > 0.15 && Math.random() < 0.007 * thcLevel) {  // było 0.012
      const side = Math.random() < 0.5;
      particles.push({ x: side ? tLeft - 8*s : tRight + 8*s,
        y: cleftY + Math.random()*cleftH,
        vy: (Math.random()-0.5)*0.12*s,       // było 0.2
        vx: side ? 0.55*s : -0.55*s,          // było 0.9
        type: 'thc', alpha: 0, age: 0 });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    thcLevel = Math.min(1, thcLevel + 0.0008);

    // ── Legend strip at top (never overlaps animation) ──
    ctx.font=`${6.5*s}px Space Mono`; ctx.textAlign='right';
    ctx.fillStyle='rgba(80,232,144,0.70)';  ctx.fillText('● THC',           W-8*s, 14*s);
    ctx.fillStyle='rgba(128,255,176,0.55)'; ctx.fillText('● ECB (AEA/2-AG)',W-8*s, 24*s);
    ctx.fillStyle='rgba(160,160,200,0.45)'; ctx.fillText('● NT (Glu/GABA)', W-8*s, 34*s);
    // THC level bar in legend area
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(tLeft, 6*s, termW, 4*s);
    ctx.fillStyle='rgba(80,232,144,0.35)';  ctx.fillRect(tLeft, 6*s, termW*thcLevel, 4*s);
    ctx.font=`${5.5*s}px Space Mono`; ctx.textAlign='left';
    ctx.fillStyle='rgba(80,232,144,0.25)';
    ctx.fillText(`THC ${Math.round(thcLevel*100)}%`, tLeft, 18*s);

    // PRE terminal
    const preGrad = ctx.createLinearGradient(cx, preY, cx, preY+preH);
    preGrad.addColorStop(0, 'rgba(80,232,144,0.04)'); preGrad.addColorStop(1, 'rgba(80,232,144,0.12)');
    ctx.beginPath(); ctx.roundRect(tLeft, preY, termW, preH, [12*s,12*s,0,0]);
    ctx.fillStyle = preGrad; ctx.fill();
    ctx.strokeStyle = 'rgba(80,232,144,0.22)'; ctx.lineWidth = 0.8*s; ctx.stroke();
    ctx.font=`${6.5*s}px Space Mono`; ctx.fillStyle='rgba(80,232,144,0.3)';
    ctx.textAlign='left'; ctx.fillText('PRE — NEURON (aksona z CB1)', tLeft+10*s, preY+14*s);

    // CB1 receptors on bottom of PRE
    cb1Recs.forEach((r, i) => {
      // Check if any ecb/thc particle nearby
      const nearby = particles.filter(p => (p.type==='ecb'||p.type==='thc') &&
        Math.hypot(p.x-r.x, p.y-r.y) < 14*s);
      if (nearby.length && !r.bound) { r.bound=true; r.boundTimer=0; }
      if (r.bound) {
        r.boundTimer++;
        r.activation = Math.min(1, r.activation + 0.04);
        if (r.boundTimer > 80) { r.bound=false; r.activation=Math.max(0,r.activation-0.02); }
      } else {
        r.activation = Math.max(0, r.activation - 0.008);
      }
      const a = 0.2 + r.activation * 0.7;
      if (r.activation > 0.1) glow('rgb(80,232,144)', r.activation*10*s);
      ctx.beginPath();
      ctx.roundRect(r.x - 7*s, r.y - 14*s, 14*s, 14*s, 3*s);
      ctx.fillStyle = `rgba(80,232,144,${a*0.25})`; ctx.fill();
      ctx.strokeStyle = `rgba(80,232,144,${a})`; ctx.lineWidth = 1*s; ctx.stroke();
      noGlow();
      if (i===0) {
        ctx.font=`${5.5*s}px Space Mono`; ctx.fillStyle='rgba(80,232,144,0.4)';
        ctx.textAlign='left'; ctx.fillText('CB1', tLeft, r.y+6*s);
      }
    });

    // Suppression indicator — centre of PRE box, well above CB1 squares at bottom
    const suppAmt = cb1Recs.reduce((s,r)=>s+r.activation,0)/cb1Recs.length;
    if (suppAmt > 0.1) {
      ctx.font=`${7*s}px Space Mono`; ctx.textAlign='center';
      ctx.fillStyle=`rgba(80,232,144,${suppAmt*0.75})`;
      ctx.fillText(`↓ wyrzut NT −${Math.round(suppAmt*70)}%`, cx, preY+preH*0.52);
    }

    // CLEFT
    ctx.fillStyle='rgba(4,4,8,0.97)';
    ctx.fillRect(tLeft-1*s, cleftY, termW+2*s, cleftH);
    ctx.font=`${6*s}px Space Mono`; ctx.fillStyle='rgba(55,55,80,0.5)'; ctx.textAlign='center';
    ctx.fillText('· · ·  SZCZELINA SYNAPTYCZNA  · · ·', cx, cleftY+cleftH/2+2.5*s);
    ctx.font=`${5.5*s}px Space Mono`; ctx.fillStyle='rgba(80,232,144,0.22)'; ctx.textAlign='center';
    ctx.fillText('↑ RETROGRADE — endokannabinoidy lecą pod prąd', cx, cleftY+10*s);

    // POST terminal
    const postGrad = ctx.createLinearGradient(cx, postY, cx, postY+postH);
    postGrad.addColorStop(0,'rgba(80,232,144,0.1)'); postGrad.addColorStop(1,'rgba(80,232,144,0.02)');
    ctx.beginPath(); ctx.roundRect(tLeft, postY, termW, postH, [0,0,12*s,12*s]);
    ctx.fillStyle=postGrad; ctx.fill();
    ctx.strokeStyle='rgba(80,232,144,0.18)'; ctx.lineWidth=0.8*s; ctx.stroke();
    ctx.font=`${6.5*s}px Space Mono`; ctx.fillStyle='rgba(80,232,144,0.3)'; ctx.textAlign='left';
    ctx.fillText('POST — produkuje AEA/2-AG on-demand', tLeft+10*s, postY+postH-12*s);

    // Spawn & update particles
    spawnNT(); spawnECB(); spawnTHC();

    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.age++; p.x += p.vx; p.y += p.vy;
      if (p.type==='thc') p.alpha = Math.min(0.9, p.alpha+0.04);
      if (p.age > 160 || p.y < preY-10*s || p.y > postY+postH+10*s ||
          p.x < tLeft-20*s || p.x > tRight+20*s) {
        particles.splice(i,1); continue;
      }
      // NT: fade when reaching post
      if (p.type==='nt' && p.y > postY) p.alpha -= 0.06;
      // ECB: fade when reaching pre
      if (p.type==='ecb' && p.y < cleftY) p.alpha -= 0.05;
      if (p.alpha <= 0) { particles.splice(i,1); continue; }

      const sz = p.type==='thc' ? 5*s : p.type==='ecb' ? 3.5*s : 2.8*s;
      const col = p.type==='thc' ? '80,232,144' : p.type==='ecb' ? '128,255,176' : '160,160,200';
      glow(`rgb(${col})`, p.type==='thc' ? 7*s : 4*s);
      ctx.beginPath(); ctx.arc(p.x, p.y, sz, 0, Math.PI*2);
      ctx.fillStyle=`rgba(${col},${p.alpha})`; ctx.fill();
      if (p.type==='thc') {
        ctx.beginPath(); ctx.arc(p.x,p.y,sz*0.4,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${p.alpha*0.5})`; ctx.fill();
      }
      noGlow();
    }

    t++; raf = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── THC VTA DISINHIBITION (canvas 2) ─────────────────────────────────────────
function drawTHCDisinhibition(canvas) {
  // Reuse disinhibition layout: CB1(VTA GABA) → release DA neuron
  const s = window.devicePixelRatio;
  const W = canvas.width  = canvas.offsetWidth * s;
  const H = canvas.height = 260 * s;
  canvas.style.height = '260px';
  const ctx = canvas.getContext('2d');

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  const nodes = [
    { x: W*0.18, y: H*0.42, r:24*s, label:'CB1',  sublabel:'GABA interneuron\n(VTA)',   col:'80,232,144',  role:'cannabinoid' },
    { x: W*0.50, y: H*0.42, r:24*s, label:'GABA', sublabel:'Interneuron\nhamujący',     col:'100,180,100', role:'gaba' },
    { x: W*0.82, y: H*0.42, r:24*s, label:'DA',   sublabel:'Neuron DA\n(NAc)',          col:'0,255,170',   role:'da' },
  ];

  let t = 0, raf;
  let drugActive = 0;
  const particles = [];

  function spawnParticle(from, to, col, type) {
    const angle = Math.atan2(to.y - from.y, to.x - from.x);
    const dist = Math.hypot(to.x - from.x, to.y - from.y);
    particles.push({ x: from.x, y: from.y, tx: to.x, ty: to.y, col, type,
      progress: 0, speed: 0.8*s / dist, alpha: 0.9 });  // było 1.4
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drugActive = Math.min(1, drugActive + 0.0007);  // było 0.0015

    // Title
    ctx.font=`${7*s}px Space Mono`; ctx.textAlign='center';
    ctx.fillStyle='rgba(80,232,144,0.35)';
    ctx.fillText('VTA — OBWÓD DEINHIBICJI DOPAMINY', W/2, 18*s);

    // Phase label
    const phase = drugActive < 0.3 ? 'BASELINE — GABA hamuje DA' :
                  drugActive < 0.65 ? 'THC aktywuje CB1 → tłumi GABA' :
                                      'DA odhamowana → euforia';
    ctx.font=`${6.5*s}px Space Mono`; ctx.textAlign='center';
    ctx.fillStyle=`rgba(80,232,144,${0.2+drugActive*0.5})`;
    ctx.fillText(phase, W/2, H-10*s);

    // Arrows between nodes
    const arrowPairs = [
      { from: nodes[0], to: nodes[1], col: '80,232,144', inhibits: true },
      { from: nodes[1], to: nodes[2], col: '100,180,100', inhibits: true },
    ];
    arrowPairs.forEach(({from, to, col, inhibits}) => {
      const dx = to.x-from.x, dy = to.y-from.y;
      const dist = Math.hypot(dx,dy);
      const ux = dx/dist, uy = dy/dist;
      const sx = from.x + ux*from.r, sy = from.y + uy*from.r;
      const ex = to.x - ux*to.r,    ey = to.y - uy*to.r;

      // CB1→GABA: suppressed when drugActive high
      let alpha = 0.25;
      if (col === '80,232,144') alpha = drugActive < 0.3 ? 0.25 : Math.max(0.05, 0.25 - drugActive*0.3);
      if (col === '100,180,100') alpha = drugActive < 0.3 ? 0.5 : Math.max(0.05, 0.5 - drugActive*0.6);

      ctx.strokeStyle=`rgba(${col},${alpha})`; ctx.lineWidth=1.5*s;
      ctx.setLineDash(inhibits?[5*s,4*s]:[]);
      ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.setLineDash([]);

      // Inhibition symbol ⊣
      const mx=(sx+ex)/2, my=(sy+ey)/2;
      ctx.strokeStyle=`rgba(${col},${alpha+0.15})`; ctx.lineWidth=1.5*s;
      const perp = Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(mx+Math.cos(Math.atan2(dy,dx)+perp)*6*s, my+Math.sin(Math.atan2(dy,dx)+perp)*6*s);
      ctx.lineTo(mx-Math.cos(Math.atan2(dy,dx)+perp)*6*s, my-Math.sin(Math.atan2(dy,dx)+perp)*6*s);
      ctx.stroke();
    });

    // DA output arrow
    if (drugActive > 0.5) {
      const da = nodes[2];
      const outAlpha = (drugActive - 0.5) * 1.8;
      const arrowLen = Math.min(22*s, W - (da.x+da.r) - 6*s); // clamp to canvas
      glow('rgb(0,255,170)', 8*s);
      ctx.strokeStyle=`rgba(0,255,170,${outAlpha*0.7})`; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.moveTo(da.x+da.r, da.y); ctx.lineTo(da.x+da.r+arrowLen, da.y); ctx.stroke();
      ctx.fillStyle=`rgba(0,255,170,${outAlpha*0.7})`;
      ctx.beginPath();
      ctx.moveTo(da.x+da.r+arrowLen,   da.y-5*s);
      ctx.lineTo(da.x+da.r+arrowLen+8*s, da.y);
      ctx.lineTo(da.x+da.r+arrowLen,   da.y+5*s);
      ctx.fill(); noGlow();
      if (arrowLen > 10*s) {
        ctx.font=`${6*s}px Space Mono`; ctx.textAlign='center';
        ctx.fillStyle=`rgba(0,255,170,${outAlpha*0.6})`;
        ctx.fillText('→ NAc', da.x+da.r+arrowLen/2, da.y-8*s);
      }
    }

    // Spawn particles
    if (t % 70 === 0 && drugActive < 0.4) spawnParticle(nodes[0], nodes[1], '80,232,144', 'inhibit');   // było 45
    if (t % 55 === 0 && drugActive < 0.5) spawnParticle(nodes[1], nodes[2], '100,180,100', 'inhibit');  // było 35
    if (t % 50 === 0 && drugActive > 0.55) spawnParticle(nodes[2], {x:nodes[2].x+50*s, y:nodes[2].y}, '0,255,170', 'da'); // było 30

    // Update particles
    for (let i=particles.length-1; i>=0; i--) {
      const p=particles[i];
      p.progress = Math.min(1, p.progress + p.speed);
      p.x = p.x + (p.tx-p.x)*p.speed*8;
      p.y = p.y + (p.ty-p.y)*p.speed*8;
      if (p.progress > 0.95) { particles.splice(i,1); continue; }
      glow(`rgb(${p.col})`,5*s);
      ctx.beginPath(); ctx.arc(p.x,p.y,3.5*s,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col},${p.alpha*(1-p.progress)})`; ctx.fill(); noGlow();
    }

    // Nodes
    nodes.forEach(n => {
      let act = 0.15;
      if (n.role==='cannabinoid') act = 0.15 + drugActive*0.6;
      if (n.role==='gaba') act = drugActive < 0.4 ? 0.5 : Math.max(0.08, 0.5-drugActive*0.55);
      if (n.role==='da') act = drugActive < 0.5 ? 0.15 : 0.15 + (drugActive-0.5)*1.2;

      if (act > 0.4) glow(`rgb(${n.col})`, n.r*(0.5+act));
      const rg=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      rg.addColorStop(0,`rgba(${n.col},${act*0.85})`);
      rg.addColorStop(1,`rgba(${n.col},${act*0.08})`);
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=rg; ctx.fill(); noGlow();
      ctx.strokeStyle=`rgba(${n.col},${0.2+act*0.5})`; ctx.lineWidth=1*s; ctx.stroke();

      ctx.textAlign='center'; ctx.fillStyle=`rgba(${n.col},${0.5+act*0.4})`;
      ctx.font=`bold ${9*s}px Space Mono`; ctx.fillText(n.label, n.x, n.y+2*s);
      ctx.font=`${6*s}px Inter`; ctx.fillStyle=`rgba(${n.col},0.38)`;
      n.sublabel.split('\n').forEach((line,li) => ctx.fillText(line, n.x, n.y+n.r+12*s+li*11*s));
    });

    t++; raf = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── CBD MULTI-TARGET MAP (canvas 1) ──────────────────────────────────────────
function drawCBDMultiTarget(canvas) {
  const s = window.devicePixelRatio;
  const W = canvas.width  = canvas.offsetWidth * s;
  const H = canvas.height = 300 * s;
  canvas.style.height = '300px';
  const ctx = canvas.getContext('2d');

  // 2-column layout, same pattern as LSD receptor map
  const TARGETS = [
    // Left col
    { label:'CB1',    col:'80,232,144',  nx:0.15, ny:0.13, affinity:0.65, role:'allosteryczny\n(brak aktivacji)', allosteric:true },
    { label:'5-HT1A', col:'255,136,204', nx:0.15, ny:0.35, affinity:0.80, role:'partial agonista\nanksjoliza', allosteric:false },
    { label:'TRPV1',  col:'255,170,68',  nx:0.15, ny:0.57, affinity:0.55, role:'agonista→desens.\nnocycepcja', allosteric:false },
    { label:'GPR55',  col:'100,200,255', nx:0.15, ny:0.79, affinity:0.40, role:'antagonista\nzapalenie', allosteric:false },
    // Right col
    { label:'FAAH',   col:'180,220,255', nx:0.76, ny:0.20, affinity:0.70, role:'inhibitor enzymu\n↑ anandamid', allosteric:false },
    { label:'5-HT3',  col:'255,100,180', nx:0.76, ny:0.42, affinity:0.45, role:'antagonista\nenuzevy (p/wym.)', allosteric:false },
    { label:'GlyR',   col:'140,180,255', nx:0.76, ny:0.64, affinity:0.35, role:'allosteryczny\nbóle neuropat.', allosteric:true },
    { label:'σ1',     col:'200,200,255', nx:0.76, ny:0.84, affinity:0.30, role:'antagonista\nneuroprotekcja', allosteric:false },
  ].map(r => ({ ...r, x:r.nx*W, y:r.ny*H, radius:10*s, isLeft:r.nx<0.5,
    bound:false, bindTimer:0, lidClosed:false, lidProgress:0 }));

  const mols = [];
  let t = 0, raf;

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  function spawnCBD() {
    const unbound = TARGETS.filter(r => !r.bound && !r.lidClosed);
    if (!unbound.length || mols.length > 6) return;
