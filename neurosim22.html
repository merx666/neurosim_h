    const tgt = unbound[Math.floor(Math.random()*unbound.length)];
    const sx = tgt.isLeft ? -10*s : W+10*s;
    const vx = tgt.isLeft ? 0.55*s+Math.random()*0.25*s : -(0.55*s+Math.random()*0.25*s);  // było 0.9/0.4
    mols.push({ x:sx, y:tgt.y+(Math.random()-0.5)*10*s, vx, vy:(Math.random()-0.5)*0.15*s,
      target:tgt, alpha:0, bound:false });
  }

  function draw() {
    ctx.clearRect(0,0,W,H);

    if (t%80===0) spawnCBD();   // było 60
    if (t>0 && t%600===0) {     // było 500
      TARGETS.forEach(r=>{r.bound=false;r.bindTimer=0;r.lidClosed=false;r.lidProgress=0;});
      mols.length=0;
    }

    // Divider
    ctx.strokeStyle='rgba(40,40,60,0.45)'; ctx.lineWidth=0.5*s; ctx.setLineDash([4*s,4*s]);
    ctx.beginPath(); ctx.moveTo(W*0.5,10*s); ctx.lineTo(W*0.5,H-18*s); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=`${5.5*s}px Space Mono`; ctx.textAlign='center'; ctx.fillStyle='rgba(60,60,90,0.4)';
    ctx.fillText('CB1 · 5-HT1A · TRPV1 · GPR55', W*0.26, H-6*s);
    ctx.fillText('FAAH · 5-HT3 · GlyR · σ1', W*0.76, H-6*s);

    // CBD molecules
    for (let i=mols.length-1; i>=0; i--) {
      const m=mols[i]; m.alpha=Math.min(0.9,m.alpha+0.05);
      if (!m.bound) {
        m.x+=m.vx; m.y+=m.vy;
        if (Math.hypot(m.x-m.target.x, m.y-m.target.y) < m.target.radius+5*s) {
          m.bound=true; m.target.bound=true; m.target.bindTimer=0;
        }
      } else {
        m.x+=(m.target.x-m.x)*0.2; m.y+=(m.target.y-m.y)*0.2;
        m.target.bindTimer++;
        if (!m.target.allosteric) {
          if (m.target.bindTimer>50 && !m.target.lidClosed) m.target.lidClosed=true;
          if (m.target.lidClosed) m.target.lidProgress=Math.min(1,m.target.lidProgress+0.02);
        }
        m.alpha-=0.008;
        if (m.alpha<=0){mols.splice(i,1);}
      }
      if (m.alpha>0.05) {
        glow('rgb(100,200,255)', 5*s);
        ctx.beginPath(); ctx.arc(m.x,m.y,4.5*s,0,Math.PI*2);
        ctx.fillStyle=`rgba(100,200,255,${m.alpha})`; ctx.fill();
        ctx.beginPath(); ctx.arc(m.x,m.y,1.8*s,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${m.alpha*0.6})`; ctx.fill();
        noGlow();
      }
    }

    // Receptors
    TARGETS.forEach((rec,i) => {
      const pulse = rec.bound ? 0.4+0.4*Math.sin(t*0.07+i) : 0.1+0.1*Math.sin(t*0.03+i);
      // Allosteric = no activation glow even when bound
      const brightness = rec.allosteric
        ? (rec.bound ? 0.18+pulse*0.1 : 0.1+pulse*0.08)
        : (rec.lidClosed ? 0.4+rec.lidProgress*0.45 : (rec.bound?0.5+pulse*0.3:0.1+pulse));

      if (!rec.allosteric && (rec.bound||rec.lidClosed)) glow(`rgb(${rec.col})`,rec.radius*(2+rec.lidProgress*3));
      const r2 = rec.radius*(1+rec.lidProgress*0.25);
      const rg=ctx.createRadialGradient(rec.x,rec.y,0,rec.x,rec.y,r2);
      rg.addColorStop(0,`rgba(${rec.col},${brightness*0.9})`);
      rg.addColorStop(1,`rgba(${rec.col},${brightness*0.08})`);
      ctx.beginPath(); ctx.arc(rec.x,rec.y,r2,0,Math.PI*2);
      ctx.fillStyle=rg; ctx.fill(); noGlow();
      ctx.strokeStyle=`rgba(${rec.col},${rec.allosteric?0.18:0.2+brightness*0.5})`; ctx.lineWidth=0.8*s; ctx.stroke();

      // Allosteric: dashed border to signal "not active"
      if (rec.allosteric && rec.bound) {
        ctx.setLineDash([3*s,3*s]);
        ctx.strokeStyle=`rgba(${rec.col},0.35)`; ctx.lineWidth=1*s;
        ctx.beginPath(); ctx.arc(rec.x,rec.y,r2+5*s,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
      }
      // Lid arc for non-allosteric
      if (!rec.allosteric && rec.lidClosed && rec.lidProgress>0) {
        ctx.strokeStyle=`rgba(${rec.col},${rec.lidProgress*0.7})`; ctx.lineWidth=1.5*s;
        ctx.beginPath(); ctx.arc(rec.x,rec.y,r2+5*s,-Math.PI*rec.lidProgress,Math.PI*rec.lidProgress,false);
        ctx.stroke();
      }

      const GAP=9*s;
      const labelX = rec.isLeft ? rec.x+r2+GAP : rec.x-r2-GAP;
      const align   = rec.isLeft ? 'left' : 'right';
      const baseY   = rec.y-4*s;
      ctx.textAlign=align;
      ctx.font=`bold ${8.5*s}px Space Mono`;
      ctx.fillStyle=`rgba(${rec.col},${0.55+brightness*0.3})`;
      ctx.fillText(rec.label, labelX, baseY);
      ctx.font=`${6*s}px Inter`; ctx.fillStyle=`rgba(${rec.col},0.38)`;
      rec.role.split('\n').forEach((line,li)=>ctx.fillText(line, labelX, baseY+11*s+li*10*s));
      // Allosteric badge
      if (rec.allosteric && rec.bound) {
        ctx.font=`${5.5*s}px Space Mono`; ctx.fillStyle=`rgba(${rec.col},0.5)`;
        ctx.fillText('allosteryczny', labelX, baseY+32*s);
      }
      // Affinity bar
      const BAR=20*s; const bx=rec.isLeft?labelX:labelX-BAR;
      ctx.fillStyle=`rgba(${rec.col},0.09)`; ctx.fillRect(bx,baseY+34*s,BAR,2*s);
      ctx.fillStyle=`rgba(${rec.col},${0.3+brightness*0.25})`; ctx.fillRect(bx,baseY+34*s,BAR*rec.affinity,2*s);
    });

    ctx.font=`${6.5*s}px Space Mono`; ctx.textAlign='left'; ctx.fillStyle='rgba(100,200,255,0.28)';
    ctx.fillText('MAPA TARGETÓW — CBD (brak psychoaktywności przez brak agonizmu CB1)', 8*s, H-8*s);

    t++; raf=requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── CBD ALLOSTERIC MODULATION of CB1 (canvas 2) ──────────────────────────────
function drawCBDAllosteric(canvas) {
  const s = window.devicePixelRatio;
  const W = canvas.width  = canvas.offsetWidth * s;
  const H = canvas.height = 280 * s;
  canvas.style.height = '280px';
  const ctx = canvas.getContext('2d');

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  // Single large CB1 receptor in center, two binding sites
  const cx=W/2, cy=H*0.44;
  const recR=38*s;
  // Orthosteric (THC/endo) site — bottom of receptor
  const orthoSite = { x:cx, y:cy+recR*0.55, r:9*s, occupied:false, mol:null };
  // Allosteric (CBD) site — top-right of receptor
  const alloSite  = { x:cx+recR*0.62, y:cy-recR*0.5, r:8*s, occupied:false, mol:null };

  const mols = [];
  let t=0, raf, thcLevel=0, cbdLevel=0;

  function spawnMol(type) {
    const site = type==='thc' ? orthoSite : alloSite;
    if (site.occupied) return;
    const sy = type==='thc' ? H+10*s : -10*s;
    const tx = site.x + (Math.random()-0.5)*8*s;
    mols.push({ x: cx+(Math.random()-0.5)*60*s, y:sy,
      tx, ty:site.y, type, alpha:0, arriving:true, site });
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    thcLevel = Math.min(1, thcLevel+0.0010);          // było 0.0018
    if (t>180) cbdLevel = Math.min(1, cbdLevel+0.0008); // było t>120, 0.0014

    // Title
    ctx.font=`${7*s}px Space Mono`; ctx.textAlign='center';
    ctx.fillStyle='rgba(100,200,255,0.35)'; ctx.fillText('ALLOSTERYCZNA MODULACJA CB1', cx, 16*s);

    // CB1 receptor body
    const cbdInfluence = cbdLevel * (alloSite.occupied ? 1 : 0.3);
    const baseCol = `rgba(80,232,144,${0.08+cbdInfluence*0.04})`;
    const ringCol = `rgba(80,232,144,${0.2+thcLevel*0.15 - cbdInfluence*0.08})`;
    if (thcLevel > 0.3 && orthoSite.occupied) glow('rgb(80,232,144)', recR*(0.3+thcLevel*0.4 - cbdInfluence*0.3));
    ctx.beginPath(); ctx.arc(cx,cy,recR,0,Math.PI*2);
    ctx.fillStyle=baseCol; ctx.fill(); noGlow();
    ctx.strokeStyle=ringCol; ctx.lineWidth=2*s; ctx.stroke();
    ctx.font=`${8*s}px Space Mono`; ctx.textAlign='center'; ctx.fillStyle='rgba(80,232,144,0.4)';
    ctx.fillText('CB1', cx, cy+3*s);

    // Conformational change indicator when CBD is present
    if (cbdLevel > 0.2) {
      ctx.font=`${6*s}px Space Mono`; ctx.fillStyle=`rgba(100,200,255,${cbdLevel*0.55})`;
      ctx.fillText('konformacja zmieniona', cx, cy+recR+16*s);
      // Distortion arc
      ctx.strokeStyle=`rgba(100,200,255,${cbdLevel*0.3})`; ctx.lineWidth=1*s;
      ctx.setLineDash([3*s,3*s]);
      ctx.beginPath(); ctx.arc(cx,cy,recR+4*s,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Sites
    [[orthoSite,'ORTHO\n(THC/AEA)','80,232,144'],[alloSite,'ALLO\n(CBD)','100,200,255']].forEach(([site,label,col])=>{
      ctx.beginPath(); ctx.arc(site.x,site.y,site.r,0,Math.PI*2);
      ctx.fillStyle=site.occupied?`rgba(${col},0.45)`:`rgba(${col},0.1)`;
      ctx.fill();
      ctx.strokeStyle=`rgba(${col},${site.occupied?0.8:0.3})`; ctx.lineWidth=1.2*s; ctx.stroke();
      ctx.font=`${5.5*s}px Space Mono`; ctx.textAlign='center'; ctx.fillStyle=`rgba(${col},0.45)`;
      label.split('\n').forEach((line,li)=>ctx.fillText(line, site.x, site.y+site.r+9*s+li*9*s));
    });

    // ── Fixed bottom strip: legend ──
    const BOTTOM = H - 8*s;
    ctx.font=`${6.5*s}px Space Mono`; ctx.textAlign='left';
    ctx.fillStyle='rgba(80,232,144,0.65)';  ctx.fillText('● THC / AEA', 8*s, BOTTOM);
    ctx.fillStyle='rgba(100,200,255,0.65)'; ctx.fillText('● CBD',        8*s, BOTTOM-14*s);

    // Activation bar — fixed zone above legend
    const rawAct = orthoSite.occupied ? 0.9 : 0.1;
    const cbdMod = alloSite.occupied ? 0.45 : 0;
    const finalAct = Math.max(0, rawAct - cbdMod);
    const barW=120*s, barX=cx-barW/2, barY=BOTTOM-52*s;
    ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.fillRect(barX, barY, barW, 8*s);
    const actCol = finalAct>0.6?'80,232,144':finalAct>0.3?'200,200,100':'100,200,255';
    glow(`rgb(${actCol})`,6*s);
    ctx.fillStyle=`rgba(${actCol},0.7)`; ctx.fillRect(barX, barY, barW*finalAct, 8*s); noGlow();
    ctx.font=`${6.5*s}px Space Mono`; ctx.textAlign='center';
    ctx.fillStyle=`rgba(${actCol},0.55)`;
    ctx.fillText(`Aktywacja CB1: ${Math.round(finalAct*100)}%`, cx, barY-7*s);
    ctx.fillStyle='rgba(100,100,130,0.45)';
    ctx.fillText(alloSite.occupied?'CBD redukuje aktywację CB1 przez THC':'(CBD nieobecny)', cx, barY+20*s);

    // Spawn molecules
    if (t%110===0) spawnMol('thc');               // było 80
    if (t>180 && t%130===0) spawnMol('cbd');      // było t>120, 95

    // Update molecules
    for (let i=mols.length-1;i>=0;i--) {
      const m=mols[i]; m.alpha=Math.min(0.9,m.alpha+0.04);
      if (m.arriving) {
        m.x+=(m.tx-m.x)*0.035; m.y+=(m.ty-m.y)*0.035;  // było 0.06
        if (Math.hypot(m.x-m.tx,m.y-m.ty)<3*s) {
          m.arriving=false; m.site.occupied=true; m.site.mol=m;
          setTimeout(()=>{m.site.occupied=false;m.site.mol=null;mols.splice(mols.indexOf(m),1);},2200);
        }
      }
      if (m.alpha<=0){mols.splice(i,1);continue;}
      const col=m.type==='thc'?'80,232,144':'100,200,255';
      const sz=m.type==='thc'?5*s:4.5*s;
      glow(`rgb(${col})`,7*s);
      ctx.beginPath(); ctx.arc(m.x,m.y,sz,0,Math.PI*2);
      ctx.fillStyle=`rgba(${col},${m.alpha})`; ctx.fill();
      ctx.beginPath(); ctx.arc(m.x,m.y,sz*0.4,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${m.alpha*0.55})`; ctx.fill(); noGlow();
    }

    t++; raf=requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── REUPTAKE COMPARISON (all stimulants) ─────────────────────────────────────
function drawReuptakeComparison(canvas, id) {
  const s  = window.devicePixelRatio;
  const W  = canvas.width  = canvas.offsetWidth * s;
  const H  = canvas.height = 240 * s;
  canvas.style.height = '240px';
  const ctx = canvas.getContext('2d');

  // Per-substance config
  // nts: list of {col, block (0-1), label} — reflects actual block % per transporter
  // spawnRate: relative NT release rate (releaser > inhibitor)
  // type label shown in header
  const CFG = {
    mephedrone:  {
      nts: [{col:'255,68,255',block:0.70,label:'SERT'},{col:'0,255,170',block:0.60,label:'DAT'}],
      spawnRate: 0.055, typeLabel:'releasing agent'
    },
    '3cmc': {
      nts: [{col:'0,255,170',block:0.82,label:'DAT'},{col:'255,170,68',block:0.78,label:'NET'}],
      spawnRate: 0.028, typeLabel:'inhibitor reuptake'
    },
    alpvp: {
      nts: [{col:'0,255,170',block:0.95,label:'DAT'},{col:'255,170,68',block:0.88,label:'NET'}],
      spawnRate: 0.024, typeLabel:'selektywny inhibitor DAT'
    },
    mdma: {
      nts: [{col:'255,68,255',block:0.80,label:'SERT'},{col:'0,255,170',block:0.54,label:'DAT'}],
      spawnRate: 0.080, typeLabel:'releasing agent (SERT>>DAT)'
    },
    cocaine: {
      nts: [{col:'0,255,170',block:0.88,label:'DAT'},{col:'255,170,68',block:0.80,label:'NET'},{col:'255,68,255',block:0.52,label:'SERT'}],
      spawnRate: 0.030, typeLabel:'inhibitor — blokada od zewnątrz'
    },
    amphetamine: {
      nts: [{col:'0,255,170',block:0.62,label:'DAT'},{col:'255,170,68',block:0.66,label:'NET'}],
      spawnRate: 0.075, typeLabel:'releasing agent (VMAT2)'
    },
    dxm: {
      nts: [{col:'255,68,255',block:0.58,label:'SERT'}],
      spawnRate: 0.022, typeLabel:'inhibitor SERT (+ antagonista NMDA — panel 1)'
    },
  };
  const cfg = CFG[id] || CFG['cocaine'];

  // Layout
  const MID    = W / 2;
  const PAD    = 12*s;
  const termW  = MID - PAD*2;

  // Vertical zones (same for both panels, coordinate relative to full canvas)
  const preY   = 44*s;
  const preH   = 16*s;
  const cleftY = preY + preH;
  const cleftH = 106*s;
  const postY  = cleftY + cleftH;
  const postH  = 16*s;

  // Transporter positions per panel (computed after we know panel cx)
  function transpX(panelCx, i, total) {
    return panelCx - termW*0.38 + (termW*0.76/(total-1||1))*i;
  }

  // Particle pools — one per panel
  const pools = [[], []];
  let t = 0, raf;

  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  // Spawn a NT particle from PRE for a given panel
  function spawnNT(pi, panelCx, blocked) {
    if (pools[pi].length > 34) return;
    // Weight NT by proportion (first NT slightly more likely)
    const weights = cfg.nts.map((_,i)=>1/(i+1));
    const wsum = weights.reduce((a,b)=>a+b,0);
    let r = Math.random()*wsum, ntIdx=0;
    for (let i=0;i<weights.length;i++){r-=weights[i]; if(r<=0){ntIdx=i;break;}}
    const nt = cfg.nts[ntIdx];

    pools[pi].push({
      x: panelCx - termW*0.3 + Math.random()*termW*0.6,
      y: cleftY + 2*s,
      vx: (Math.random()-0.5)*0.3*s,
      vy: 0.38*s + Math.random()*0.22*s,
      col: nt.col,
      ntLabel: nt.label,
      block: nt.block,      // THIS particle's reuptake block probability
      blocked,              // which panel
      size: 3*s,
      state: 'falling',     // falling | dwelling | reuptaking | fading
      alpha: 0.95,
      age: 0,
    });
  }

  function drawPanel(pi, panelCx, blocked) {
    const pool = pools[pi];
    const tLeft  = panelCx - termW/2;
    const tRight = panelCx + termW/2;
    const nTrans = cfg.nts.length;

    // Panel title
    ctx.textAlign='center'; ctx.font=`bold ${8*s}px Space Mono`;
    ctx.fillStyle = blocked ? 'rgba(255,100,80,0.65)' : 'rgba(100,210,120,0.65)';
    ctx.fillText(blocked ? 'ZABLOKOWANY' : 'NORMALNY', panelCx, 36*s);

    // PRE terminal
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(tLeft, preY, termW, preH);
    ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=0.5*s;
    ctx.strokeRect(tLeft, preY, termW, preH);
    ctx.font=`${5*s}px Space Mono`; ctx.textAlign='center'; ctx.fillStyle='rgba(140,140,160,0.3)';
    ctx.fillText('PRE', panelCx, preY+preH-3*s);

    // CLEFT
    ctx.fillStyle='rgba(2,2,6,0.94)';
    ctx.fillRect(tLeft, cleftY, termW, cleftH);

    // POST terminal
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(tLeft, postY, termW, postH);
    ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=0.5*s;
    ctx.strokeRect(tLeft, postY, termW, postH);
    ctx.font=`${5*s}px Space Mono`; ctx.textAlign='center'; ctx.fillStyle='rgba(140,140,160,0.3)';
    ctx.fillText('POST', panelCx, postY+postH-3*s);

    // Transporter proteins at top of cleft (pre membrane bottom)
    cfg.nts.forEach((nt, ti) => {
      const tx = transpX(panelCx, ti, nTrans);
      const ty = cleftY + 1*s;
      const tw=7*s, th=9*s;

      if (blocked) {
        // Transporter blocked — drug molecule inside, glowing
        ctx.strokeStyle=`rgba(${nt.col},0.65)`; ctx.lineWidth=1.1*s;
        ctx.beginPath();
        ctx.moveTo(tx-tw/2, ty+th); ctx.lineTo(tx-tw/2, ty+3*s);
        ctx.arc(tx, ty+3*s, tw/2, Math.PI, 0);
        ctx.lineTo(tx+tw/2, ty+th); ctx.stroke();
        glow(`rgb(${nt.col})`, 6*s);
        ctx.beginPath(); ctx.arc(tx, ty+th/2, 2.5*s, 0, Math.PI*2);
        ctx.fillStyle=`rgba(${nt.col},0.88)`; ctx.fill(); noGlow();
        // Block % label
        ctx.font=`${5*s}px Space Mono`; ctx.textAlign='center';
        ctx.fillStyle=`rgba(${nt.col},0.50)`;
        ctx.fillText(`${Math.round(nt.block*100)}%`, tx, ty+th+9*s);
      } else {
        // Active transporter — pulsing ↑ arrow
        ctx.strokeStyle=`rgba(140,140,180,0.22)`; ctx.lineWidth=1.1*s;
        ctx.beginPath();
        ctx.moveTo(tx-tw/2, ty+th); ctx.lineTo(tx-tw/2, ty+3*s);
        ctx.arc(tx, ty+3*s, tw/2, Math.PI, 0);
        ctx.lineTo(tx+tw/2, ty+th); ctx.stroke();
        const pulse = 0.35 + 0.35*Math.sin(t*0.09 + ti*1.8);
        ctx.fillStyle=`rgba(140,200,140,${pulse})`;
        ctx.font=`${8*s}px sans-serif`; ctx.textAlign='center';
        ctx.fillText('↑', tx, ty+th*0.62);
      }
      // Transporter name
      ctx.font=`${4.8*s}px Space Mono`; ctx.textAlign='center';
      ctx.fillStyle=`rgba(${nt.col},${blocked?0.40:0.18})`;
      ctx.fillText(nt.label, tx, ty+th+(blocked?18:9)*s);
    });

    // Ambient cleft glow from dwelling particles
    const dwelling = pool.filter(p=>p.state==='dwelling');
    if (dwelling.length > 1) {
      const col = cfg.nts[0].col;
      const a = Math.min(dwelling.length / 16, 0.35);
      const ag = ctx.createLinearGradient(tLeft, cleftY, tLeft, postY);
      ag.addColorStop(0, `rgba(${col},0)`);
      ag.addColorStop(0.4, `rgba(${col},${a})`);
      ag.addColorStop(1, `rgba(${col},${a*0.4})`);
      ctx.fillStyle=ag; ctx.fillRect(tLeft, cleftY, termW, cleftH);
    }

    // Update & draw particles
    for (let i = pool.length-1; i >= 0; i--) {
      const p = pool[i]; p.age++;

      if (p.state === 'falling') {
        p.x += p.vx; p.y += p.vy;
        if (p.x < tLeft+2*s) { p.x = tLeft+2*s; p.vx = Math.abs(p.vx); }
        if (p.x > tRight-2*s) { p.x = tRight-2*s; p.vx = -Math.abs(p.vx); }
        if (p.y >= postY - p.size) {
          p.y = postY - p.size; p.vy = 0; p.vx *= 0.7; p.state = 'dwelling';
        }

        // Reuptake check while FALLING — particle near top of cleft?
        if (p.y < cleftY + cleftH * 0.45) {
          // Reuptake probability per frame: high if transporter free, near zero if blocked
          const reuptakeChance = blocked
            ? (1 - p.block) * 0.012   // blocked: very low
            : (1 - p.block) * 0.12;   // normal: ~10x higher
          if (Math.random() < reuptakeChance) {
            p.state = 'reuptaking'; p.vy = -0.8*s; p.vx *= 0.3;
          }
        }

      } else if (p.state === 'dwelling') {
        // Brownian drift in cleft
        p.x += p.vx * 0.5 + (Math.random()-0.5)*0.12*s;
        p.y += (Math.random()-0.5)*0.15*s;
        if (p.x < tLeft+2*s) p.vx=Math.abs(p.vx)*0.5;
        if (p.x > tRight-2*s) p.vx=-Math.abs(p.vx)*0.5;
        p.y = Math.max(cleftY+4*s, Math.min(postY-p.size, p.y));

        // Reuptake from dwelling state
        const reuptakeChance = blocked
          ? (1 - p.block) * 0.004
          : (1 - p.block) * 0.045;
        if (Math.random() < reuptakeChance) {
          p.state = 'reuptaking'; p.vy = -0.7*s; p.vx *= 0.2;
        }

        // Max dwell time (failsafe) — longer when blocked
        const maxDwell = blocked ? 420 : 60;
        if (p.age > maxDwell) p.state = 'fading';

      } else if (p.state === 'reuptaking') {
        p.y += p.vy; p.vy -= 0.04*s; // decelerate
        p.alpha -= 0.07;
        if (p.y < cleftY - 4*s || p.alpha <= 0) {
          pool.splice(i, 1); continue;
        }

      } else if (p.state === 'fading') {
        p.alpha -= 0.025;
        if (p.alpha <= 0) { pool.splice(i, 1); continue; }
      }

      const a = Math.max(0, Math.min(1, p.alpha));
      if (a <= 0) continue;
      glow(`rgb(${p.col})`, p.size * 2.5);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle=`rgba(${p.col},${a})`; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.38, 0, Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a*0.45})`; ctx.fill();
      noGlow();
    }

    // Cleft stats label
    const inCleft = pool.filter(p=>p.state==='dwelling'||p.state==='falling').length;
    ctx.font=`${5.5*s}px Space Mono`; ctx.textAlign='center';
    ctx.fillStyle = blocked ? `rgba(255,120,80,0.45)` : `rgba(100,200,100,0.40)`;
    ctx.fillText(
      blocked ? `akumulacja: ${inCleft} cząst.` : `szybki powrót: ${inCleft} cząst.`,
      panelCx, postY - 5*s
    );
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Header
    ctx.font=`${6*s}px Space Mono`; ctx.textAlign='left'; ctx.fillStyle='rgba(150,150,180,0.32)';
    ctx.fillText('REUPTAKE — ' + cfg.typeLabel.toUpperCase(), PAD, 14*s);

    // Divider
    ctx.strokeStyle='rgba(55,55,75,0.55)'; ctx.lineWidth=0.6*s;
    ctx.setLineDash([4*s,4*s]);
    ctx.beginPath(); ctx.moveTo(MID, 20*s); ctx.lineTo(MID, H-18*s); ctx.stroke();
    ctx.setLineDash([]);

    // Draw both panels
    drawPanel(0, MID*0.5,       false);
    drawPanel(1, MID + MID*0.5, true);

    // Spawn — same rate both sides (same NT production), different fate
    if (Math.random() < cfg.spawnRate) spawnNT(0, MID*0.5,       false);
    if (Math.random() < cfg.spawnRate) spawnNT(1, MID + MID*0.5, true);

    // NT legend — bottom strip
    const legY = H - 5*s;
    let legX = PAD;
    cfg.nts.forEach(nt => {
      glow(`rgb(${nt.col})`, 3*s);
      ctx.beginPath(); ctx.arc(legX+3.5*s, legY-3.5*s, 3*s, 0, Math.PI*2);
      ctx.fillStyle=`rgba(${nt.col},0.75)`; ctx.fill(); noGlow();
      ctx.font=`${6*s}px Space Mono`; ctx.textAlign='left';
      ctx.fillStyle=`rgba(${nt.col},0.55)`;
      ctx.fillText(`${nt.label} ${Math.round(nt.block*100)}%`, legX+9*s, legY);
      legX += 56*s;
    });

    t++; raf = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── DMT FLOOD ─────────────────────────────────────────────────────────────────
function drawDMTFlood(canvas) {
  const s=window.devicePixelRatio;
  const W=canvas.width=canvas.offsetWidth*s;
  const H=canvas.height=300*s; canvas.style.height='300px';
  const ctx=canvas.getContext('2d');
  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  const cx=W/2,preY=38*s,preH=18*s,cleftY=preY+preH,cleftH=100*s,postY=cleftY+cleftH,postH=18*s;

  // 7 receptor sites — evenly spaced, fast cycling (no lid-closure unlike LSD)
  const SITE_FX=[0.13,0.25,0.37,0.50,0.63,0.75,0.87];
  const SITES=SITE_FX.map(fx=>({x:W*fx,y:postY,r:7.5*s,occ:false,timer:0}));

  // sigma-1 site — secondary target, top-right
  const SIG1={x:W*0.85,y:cleftY+cleftH*0.35,r:6*s,occ:false,timer:0};

  const particles=[]; let t=0,raf,flood=0;

  function spawnDMT(){
    if(particles.length>32)return;
    const side=Math.random()<0.5;
    particles.push({x:side?-8*s:W+8*s,y:cleftY+8*s+Math.random()*cleftH*0.75,
      tx:W*(0.10+Math.random()*0.78),ty:postY-4*s,
      col:'255,44,200',sz:3.8*s,alpha:0.9,arriving:true,bound:false,boundTimer:0,sigma:false});
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    flood=Math.min(1,flood+0.003);

    ctx.font=`${6.5*s}px Space Mono`;ctx.textAlign='center';
    ctx.fillStyle='rgba(255,80,210,0.32)';
    ctx.fillText('5-HT2A FLOOD — AKTYWACJA WZIEWNA DMT',cx,18*s);
    ctx.textAlign='right';ctx.fillStyle=`rgba(255,44,200,${0.2+flood*0.45})`;
    ctx.fillText('onset <2 min',W-8*s,30*s);

    // PRE
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(W*0.06,preY,W*0.88,preH);
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5*s;
    ctx.strokeRect(W*0.06,preY,W*0.88,preH);
    ctx.font=`${5*s}px Space Mono`;ctx.textAlign='left';ctx.fillStyle='rgba(140,140,160,0.25)';
    ctx.fillText('PRE — aksona serotoninergiczna',W*0.08,preY+preH-4*s);

    // Cleft
    ctx.fillStyle='rgba(2,2,6,0.94)';ctx.fillRect(W*0.06,cleftY,W*0.88,cleftH);
    const occ=SITES.filter(r=>r.occ).length;
    if(occ>0){
      const ag=ctx.createLinearGradient(W*0.06,cleftY,W*0.06,postY);
      ag.addColorStop(0,'rgba(255,44,200,0)');
      ag.addColorStop(0.5,`rgba(255,44,200,${occ*0.035})`);
      ag.addColorStop(1,`rgba(255,44,200,${occ*0.07})`);
      ctx.fillStyle=ag;ctx.fillRect(W*0.06,cleftY,W*0.88,cleftH);
    }

    // POST
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(W*0.06,postY,W*0.88,postH);
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5*s;
    ctx.strokeRect(W*0.06,postY,W*0.88,postH);
    ctx.font=`${5*s}px Space Mono`;ctx.textAlign='left';ctx.fillStyle='rgba(140,140,160,0.25)';
    ctx.fillText('POST — receptory 5-HT2A',W*0.08,postY+postH-4*s);

    // Fast-cycling receptor sites (timer ~75 — brak lid-closure, szybkie off-rate)
    SITES.forEach((r,i)=>{
      if(r.occ){r.timer++;if(r.timer>75){r.occ=false;r.timer=0;}} // ~75 vs LSD nigdy
      const a=r.occ?0.80+0.20*Math.sin(t*0.10+i):0.16;
      glow('rgb(255,44,200)',r.occ?10*s:2.5*s);
      ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,44,200,${a*0.25})`;ctx.fill();
      ctx.strokeStyle=`rgba(255,44,200,${a})`;ctx.lineWidth=1.2*s;ctx.stroke();noGlow();
      ctx.font=`${4.8*s}px Space Mono`;ctx.textAlign='center';
      ctx.fillStyle=`rgba(255,100,220,${0.25+r.occ*0.45})`;
      ctx.fillText('5-HT2A',r.x,r.y+r.r+9*s);
      // Szybkie off — cząsteczka "wyskakuje" (brak ✓ lock, tylko krótki flash)
      if(r.occ&&r.timer<18){
        ctx.font=`${7*s}px sans-serif`;ctx.fillStyle='rgba(255,200,255,0.80)';
        ctx.fillText('✦',r.x,r.y+3*s);
      }
    });

    // sigma-1 receptor — drugorzędny target (pojawia się gdy flood > 0.55)
    if(flood>0.40){
      const sig1A=Math.min(1,(flood-0.40)*2.5);
      if(SIG1.occ){SIG1.timer++;if(SIG1.timer>110){SIG1.occ=false;SIG1.timer=0;}}
      const sa=SIG1.occ?0.85:0.22+sig1A*0.18;
      glow('rgb(200,100,255)',SIG1.occ?9*s:3*s);
      ctx.beginPath();ctx.arc(SIG1.x,SIG1.y,SIG1.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,100,255,${sa*0.22})`;ctx.fill();
      ctx.strokeStyle=`rgba(200,100,255,${sa})`;ctx.lineWidth=1*s;
      ctx.setLineDash([2.5*s,2.5*s]);ctx.stroke();ctx.setLineDash([]);noGlow();
      ctx.font=`${4.8*s}px Space Mono`;ctx.textAlign='center';
      ctx.fillStyle=`rgba(200,100,255,${sa*0.80})`;
      ctx.fillText('σ-1',SIG1.x,SIG1.y-SIG1.r-4*s);
      ctx.font=`${4.2*s}px Space Mono`;
      ctx.fillStyle=`rgba(200,100,255,${sa*0.50})`;
      ctx.fillText('(wtórny)',SIG1.x,SIG1.y+SIG1.r+8*s);
    }

    // Kinetics note — pojawia się gdy flood > 0.70
    if(flood>0.65){
      const noteA=Math.min(1,(flood-0.65)*3.0);
      ctx.font=`${5.2*s}px Space Mono`;ctx.textAlign='left';
      ctx.fillStyle=`rgba(255,140,230,${noteA*0.55})`;
      ctx.fillText('↻ szybki off-rate — brak lid closure (vs LSD)',W*0.06,cleftY+cleftH*0.18);
      ctx.fillStyle=`rgba(255,140,230,${noteA*0.38})`;
      ctx.fillText('→ efekt 15 min zamiast 8-12h',W*0.06,cleftY+cleftH*0.18+8*s);
    }

    // Spawn
    const spawnInterval=Math.max(5,13-Math.round(flood*8));
    if(t%spawnInterval===0)spawnDMT();

    // Particles — część leci do sigma-1 gdy flood wysoki
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      if(p.arriving){
        p.x+=(p.tx-p.x)*0.065;p.y+=(p.ty-p.y)*0.065;
        // Szansa na sigma-1 binding gdy flood > 0.55
        if(flood>0.55&&!SIG1.occ&&Math.hypot(p.x-SIG1.x,p.y-SIG1.y)<22*s&&Math.random()<0.08){
          SIG1.occ=true;SIG1.timer=0;p.arriving=false;p.bound=true;
          p.tx=SIG1.x;p.ty=SIG1.y;p.col='200,100,255';p.sigma=true;
        } else {
          const near=SITES.find(r=>!r.occ&&Math.hypot(p.x-r.x,p.y-r.y)<16*s);
          if(near){near.occ=true;near.timer=0;p.arriving=false;p.bound=true;p.tx=near.x;p.ty=near.y;}
        }
      } else if(p.bound){
        // Szybkie odbinding — krótszy czas życia na receptorze
        const maxBound=p.sigma?100:55;
        p.boundTimer++;if(p.boundTimer>maxBound)p.alpha-=0.045;
      }
      if(p.alpha<=0){particles.splice(i,1);continue;}
      glow(`rgb(${p.col})`,7*s);
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col},${p.alpha})`;ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*0.35,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.alpha*0.5})`;ctx.fill();noGlow();
    }

    const nOcc=SITES.filter(r=>r.occ).length;
    ctx.font=`${6.5*s}px Space Mono`;ctx.textAlign='center';
    ctx.fillStyle=`rgba(255,44,200,${0.22+nOcc*0.10})`;
    ctx.fillText(T('activeSites',nOcc),cx,postY-6*s);

    ctx.font=`${6*s}px Space Mono`;ctx.textAlign='left';
    ctx.fillStyle='rgba(255,44,200,0.65)';ctx.fillText('● DMT → 5-HT2A',8*s,H-8*s);
    ctx.fillStyle='rgba(200,100,255,0.55)';ctx.fillText('● DMT → σ-1',W*0.40,H-8*s);
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

// ── GABA-A CHANNEL (diazepam) — state machine, NMDA-style ────────────────────
function drawGABAAChannel(canvas) {
  const s  = window.devicePixelRatio;
  const W  = canvas.width  = canvas.offsetWidth * s;
  const H  = canvas.height = 250 * s;
  canvas.style.height = '250px';
  const ctx = canvas.getContext('2d');
  const cx = W / 2;
  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  const memTop = H * 0.34;
  const memBot = H * 0.60;
  const chanH  = memBot - memTop;
  const chanW  = 30 * s;

  const SUB_W  = 13 * s;
  const SUB_H  = chanH * 1.1;
  const SUB_Y  = memTop - chanH * 0.05;
  const SUB_COLS  = ['50,100,210','65,148,110','140,62,205','65,148,110','50,100,210'];
  const SUB_LAB   = ['α','β','γ','β','α'];
  const SUB_XS = [
    cx - chanW/2 - SUB_W*4.0,
    cx - chanW/2 - SUB_W*2.8,
    cx - chanW/2 - SUB_W*1.6,
    cx + chanW/2 + SUB_W*0.6,
    cx + chanW/2 + SUB_W*1.8,
  ];

  const T_BZD_IN    = 220;
  const T_BZD_BOUND = 380;
  const T_RESET     = 760;

  let t = 0, raf;
  let chanOpen = 0;
  let openCount = 0;
  let bzdBound  = 0;

  const gabaMols  = [];
  const clIons    = [];
  let bzdMol = null;

  const gabaL = { x: cx - chanW/2 - SUB_W*0.85, y: memTop - 8*s, occ: false, timer: 0 };
  const gabaR = { x: cx + chanW/2 + SUB_W*0.85, y: memTop - 8*s, occ: false, timer: 0 };
  const bzdSite = { x: cx - chanW/2 - SUB_W * 2.0, y: memTop - 6*s };

  function spawnGABA() {
    if (gabaMols.length > 5) return;
    const side = Math.random() < 0.5 ? -1 : 1;
    const target = side < 0 ? gabaL : gabaR;
    gabaMols.push({
      x: target.x + (Math.random()-0.5)*20*s,
      y: memTop - 45*s - Math.random()*20*s,
      vx: (Math.random()-0.5)*0.18*s,
      vy: 0.32*s + Math.random()*0.14*s,
      alpha: 0, bound: false, boundTimer: 0, target,
    });
  }

  function spawnCl() {
    if (clIons.length > 14) return;
    clIons.push({
      x: cx + (Math.random()-0.5)*chanW*0.7,
      y: memTop + 2*s,
      vy: (0.48 + Math.random()*0.36)*s,
      alpha: 0.88,
    });
  }

  function drawMembraneSide(side) {
    const x0 = side < 0 ? 0 : cx + chanW/2;
    const mw  = side < 0 ? cx - chanW/2 : W - (cx + chanW/2);
    const mg = ctx.createLinearGradient(0, memTop, 0, memBot);
    mg.addColorStop(0,  'rgba(22,28,65,0.96)');
    mg.addColorStop(1,  'rgba(14,18,48,0.96)');
    ctx.fillStyle = mg;
    ctx.fillRect(x0, memTop, mw, chanH);
    const edgeX = side < 0 ? cx - chanW/2 - 1*s : cx + chanW/2 + 1*s;
    for (let i = 0; i < 10; i++) {
      const hy = memTop + i * (chanH / 10) + chanH/20;
      ctx.beginPath(); ctx.arc(edgeX + side*2.5*s, hy, 2.2*s, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(95,95,155,0.38)'; ctx.fill();
    }
  }

  function drawPore(open, bzdB) {
    const baseA = 0.05 + open * 0.18 + bzdB * 0.08;
    const poreGrad = ctx.createLinearGradient(cx, memTop, cx, memBot);
    poreGrad.addColorStop(0,   `rgba(70,130,255,${baseA})`);
    poreGrad.addColorStop(0.5, `rgba(70,130,255,${baseA + open * 0.12})`);
    poreGrad.addColorStop(1,   `rgba(70,130,255,${baseA})`);
    ctx.fillStyle = poreGrad;
    ctx.fillRect(cx - chanW/2, memTop, chanW, chanH);
    const wallA = 0.18 + open * 0.55 + bzdB * 0.15;
    if (open > 0.3) { glow('rgb(70,130,255)', 8*s * open); }
    [[cx - chanW/2],[cx + chanW/2]].forEach(([px]) => {
      ctx.strokeStyle = `rgba(80,150,255,${wallA})`;
      ctx.lineWidth = 1.2*s;
      ctx.beginPath(); ctx.moveTo(px, memTop); ctx.lineTo(px, memBot); ctx.stroke();
    });
    noGlow();
  }

  function drawSubunits(open) {
    SUB_XS.forEach((sx, i) => {
      const col = SUB_COLS[i];
      const a = open > 0.3 ? 0.30 + i*0.02 : 0.12 + i*0.01;
      const g = ctx.createLinearGradient(sx, SUB_Y, sx + SUB_W, SUB_Y + SUB_H);
      g.addColorStop(0, `rgba(${col},${a * 1.4})`);
      g.addColorStop(1, `rgba(${col},${a * 0.6})`);
      ctx.fillStyle = g;
      ctx.fillRect(sx, SUB_Y, SUB_W, SUB_H);
      ctx.strokeStyle = `rgba(${col},${open > 0.3 ? 0.55 : 0.22})`;
      ctx.lineWidth = 0.8*s; ctx.strokeRect(sx, SUB_Y, SUB_W, SUB_H);
      ctx.font = `bold ${7*s}px Space Mono`;
      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(${col},${open > 0.3 ? 0.85 : 0.40})`;
      ctx.fillText(SUB_LAB[i], sx + SUB_W/2, SUB_Y + SUB_H/2 + 2.5*s);
      ctx.font = `${5*s}px Space Mono`;
      ctx.fillStyle = `rgba(${col},0.30)`;
      ctx.fillText(i===2?'2':i===0||i===4?'1':'2', sx + SUB_W/2, SUB_Y + SUB_H/2 + 11*s);
    });
  }

  function drawGABASites() {
    [gabaL, gabaR].forEach(g => {
      const a = g.occ ? 0.92 : 0.28;
      glow('rgb(110,175,255)', g.occ ? 8*s : 3*s);
      ctx.beginPath(); ctx.arc(g.x, g.y, 4.5*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(110,175,255,${a})`; ctx.fill(); noGlow();
      ctx.font = `${5*s}px Space Mono`; ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(110,175,255,${a * 0.85})`;
      ctx.fillText('GABA', g.x, g.y - 9*s);
    });
  }

  function drawBZDSite(bzdB) {
    const a = 0.22 + bzdB * 0.70;
    glow('rgb(85,150,255)', (4 + bzdB * 10)*s);
    ctx.beginPath(); ctx.arc(bzdSite.x, bzdSite.y, 5.5*s, 0, Math.PI*2);
    ctx.fillStyle = `rgba(85,150,255,${a})`; ctx.fill(); noGlow();
    ctx.setLineDash([2.5*s, 2.5*s]);
    ctx.strokeStyle = `rgba(85,150,255,${a * 0.60})`;
    ctx.lineWidth = 0.9*s;
    ctx.beginPath(); ctx.arc(bzdSite.x, bzdSite.y, 9.5*s, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font = `bold ${5.5*s}px Space Mono`; ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(85,150,255,${a})`;
    ctx.fillText('BZD', bzdSite.x, bzdSite.y - 14*s);
    ctx.font = `${4.2*s}px Space Mono`;
    ctx.fillStyle = `rgba(85,150,255,${a * 0.55})`;
    ctx.fillText('α/γ allost.', bzdSite.x, bzdSite.y + 13*s);
    if (bzdB > 0.4) {
      const lineA = (bzdB - 0.4) * 1.2;
      const grad = ctx.createLinearGradient(bzdSite.x, bzdSite.y, cx - chanW/2, memTop);
      grad.addColorStop(0, `rgba(85,150,255,${lineA * 0.55})`);
      grad.addColorStop(1, `rgba(85,150,255,0.02)`);
      ctx.strokeStyle = grad; ctx.lineWidth = 1*s; ctx.setLineDash([3*s,4*s]);
      ctx.beginPath(); ctx.moveTo(bzdSite.x + 9*s, bzdSite.y); ctx.lineTo(cx - chanW/2, memTop + 4*s); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    const phase = t < T_BZD_IN ? 0 : t < T_BZD_BOUND ? 1 : t < T_RESET ? 2 : 3;
    const bindRate = phase < 2 ? 0.009 : 0.026;
    const bzdTarget = phase >= 2 ? 1 : 0;
    bzdBound += (bzdTarget - bzdBound) * 0.018;

    if (!gabaL.occ && Math.random() < bindRate) { gabaL.occ = true; gabaL.timer = 0; }
    if (!gabaR.occ && Math.random() < bindRate) { gabaR.occ = true; gabaR.timer = 0; }
    if (gabaL.occ) { gabaL.timer++; if (gabaL.timer > 115) { gabaL.occ = false; gabaL.timer = 0; } }
    if (gabaR.occ) { gabaR.timer++; if (gabaR.timer > 115) { gabaR.occ = false; gabaR.timer = 0; } }

    const isOpen = gabaL.occ && gabaR.occ;
    chanOpen += ((isOpen ? 1 : 0) - chanOpen) * 0.12;
    if (isOpen && chanOpen > 0.75) {
      if (t % 6 === 0) spawnCl();
      if (chanOpen > 0.9 && t % 30 === 0) openCount++;
    }

    if (phase === 1 && !bzdMol) {
      bzdMol = { x: bzdSite.x + 30*s, y: memTop - 55*s, vx: -0.22*s, vy: 0.30*s, alpha: 0, locked: false };
    }
    if (bzdMol && !bzdMol.locked) {
      bzdMol.x += bzdMol.vx; bzdMol.y += bzdMol.vy;
      bzdMol.alpha = Math.min(1, bzdMol.alpha + 0.04);
      const dx = bzdMol.x - bzdSite.x, dy = bzdMol.y - bzdSite.y;
      if (Math.sqrt(dx*dx+dy*dy) < 8*s) { bzdMol.locked = true; bzdMol.x = bzdSite.x; bzdMol.y = bzdSite.y; }
    }
    if (phase === 3) {
      bzdMol = null; t = 0; openCount = 0;
      gabaL.occ = false; gabaR.occ = false;
      gabaMols.length = 0; clIons.length = 0;
      chanOpen = 0; bzdBound = 0;
    }

    if (t % 38 === 0) spawnGABA();

    for (let i = gabaMols.length-1; i >= 0; i--) {
      const m = gabaMols[i]; m.alpha = Math.min(0.88, m.alpha + 0.05);
      if (!m.bound) {
        m.x += m.vx; m.y += m.vy;
        const dx = m.x - m.target.x, dy = m.y - m.target.y;
        if (Math.sqrt(dx*dx+dy*dy) < 6*s) { m.bound = true; m.boundTimer = 0; }
      } else { m.boundTimer++; m.alpha -= 0.008; if (m.alpha <= 0) { gabaMols.splice(i,1); continue; } }
    }

    for (let i = clIons.length-1; i >= 0; i--) {
      const c = clIons[i]; c.y += c.vy; c.alpha -= 0.011;
      if (c.y > memBot + 10*s || c.alpha <= 0) clIons.splice(i, 1);
    }

    // Extracellular / intracellular labels
    ctx.fillStyle = 'rgba(60,65,100,0.40)'; ctx.font = `${7*s}px Space Mono`; ctx.textAlign = 'left';
    ctx.fillText('ZEWNĄTRZKOMÓRKOWE', 8*s, memTop - 10*s);
    ctx.fillText('WEWNĄTRZKOMÓRKOWE', 8*s, memBot + 16*s);

    drawMembraneSide(-1);
    drawMembraneSide(1);
    drawPore(chanOpen, bzdBound);
    drawSubunits(chanOpen);

    // GABA in transit
    for (const m of gabaMols) {
      if (m.bound) continue;
      glow('rgb(110,175,255)', 5*s);
      ctx.beginPath(); ctx.arc(m.x, m.y, 4*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(110,175,255,${m.alpha})`; ctx.fill();
      ctx.beginPath(); ctx.arc(m.x, m.y, 1.5*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,230,255,${m.alpha*0.65})`; ctx.fill();
      noGlow();
    }

    // BZD approaching
    if (bzdMol && !bzdMol.locked) {
      glow('rgb(85,150,255)', 9*s * bzdMol.alpha);
      ctx.beginPath(); ctx.arc(bzdMol.x, bzdMol.y, 5.5*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(85,150,255,${bzdMol.alpha * 0.85})`; ctx.fill();
      ctx.beginPath(); ctx.arc(bzdMol.x, bzdMol.y, 2*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,220,255,${bzdMol.alpha * 0.8})`; ctx.fill();
      noGlow();
      ctx.font = `${8*s}px Space Mono`; ctx.textAlign = 'left';
      ctx.fillStyle = `rgba(85,150,255,${bzdMol.alpha * 0.9})`;
      ctx.fillText('DZP', bzdMol.x + 9*s, bzdMol.y + 3*s);
    }

    drawGABASites();
    drawBZDSite(bzdBound);

    // Cl- ions
    for (const c of clIons) {
      glow('rgb(130,210,255)', 5*s);
      ctx.beginPath(); ctx.arc(c.x, c.y, 2.8*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(130,210,255,${c.alpha})`; ctx.fill();
      ctx.beginPath(); ctx.arc(c.x, c.y, 1.1*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(220,240,255,${c.alpha * 0.6})`; ctx.fill();
      noGlow();
    }

    // Open count
    ctx.font = `${6*s}px Space Mono`; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(100,180,100,0.60)';
    ctx.fillText(`otwarcia kanału: ${openCount}×`, cx + 55*s, 16*s);

    // Phase label
    const phaseLabel =
      phase === 0 ? T('gabaBind') :
      phase === 1 ? T('dzpApproach') :
                   T('freqUp');
    ctx.font = `${7*s}px Space Mono`; ctx.textAlign = 'center';
    ctx.fillStyle = phase === 2
      ? `rgba(85,150,255,${0.35 + bzdBound * 0.35})`
      : 'rgba(85,150,255,0.38)';
    ctx.fillText(phaseLabel, cx, H - 8*s);

    // Legend
    const legItems = [
      { col:'110,175,255', label:'GABA (α/β)' },
      { col:'85,150,255',  label:'Diazepam (α/γ)' },
      { col:'130,210,255', label:'Cl⁻' },
    ];
    legItems.forEach((it, i) => {
      const lx = W * (i + 1) / (legItems.length + 1);
      glow(`rgb(${it.col})`, 3*s);
      ctx.beginPath(); ctx.arc(lx - 20*s, H - 22*s, 2.8*s, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${it.col},0.72)`; ctx.fill(); noGlow();
      ctx.font = `${5.5*s}px Space Mono`; ctx.textAlign = 'left';
      ctx.fillStyle = `rgba(${it.col},0.52)`;
      ctx.fillText(it.label, lx - 13*s, H - 19*s);
    });

    t++; raf = requestAnimationFrame(draw);
  }
  draw();
  return () => cancelAnimationFrame(raf);
}

// ── GHB CIRCUIT ───────────────────────────────────────────────────────────────
function drawGHBCircuit(canvas) {
  const s=window.devicePixelRatio;
  const W=canvas.width=canvas.offsetWidth*s;
  const H=canvas.height=300*s;canvas.style.height='300px';
  const ctx=canvas.getContext('2d');
  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  // Trzy węzły: GABA interneuron (VTA) | Neuron DA | + etykieta GABA-B vs GHBr
  const nGABA={x:W*0.22,y:H*0.44,r:25*s,col:'80,140,255'};
  const nDA={x:W*0.78,y:H*0.44,r:25*s,col:'0,255,170'};
  const particles=[];let t=0,raf,drug=0,daTimer=0;

  // Biphasic state — niskie dawki DA↑, wysokie dawki DA↓
  // drug 0→0.5 = low dose (disinhibition); drug 0.5→1.0 = high dose (direct inhibition DA)
  let dosePhase='low'; // 'low' | 'high'
  let phaseSwitched=false;
  const PHASE_SWITCH=0.68; // drug level przy którym przełącza się na high-dose

  function spawnGHB(){
    particles.push({type:'ghb',x:W*0.50,y:-10*s,tx:nGABA.x,ty:nGABA.y-nGABA.r,
      col:'136,102,255',sz:4*s,alpha:0.9,arriving:true,bound:false,bTimer:0});
  }
  function spawnDA(){
    const a=Math.random()*Math.PI*2;
    particles.push({type:'da',x:nDA.x,y:nDA.y,
      tx:nDA.x+Math.cos(a)*58*s,ty:nDA.y+Math.sin(a)*48*s,
      col:'0,255,170',sz:3*s,alpha:0.88,arriving:true,life:60});
  }
  // High-dose: GHB leci bezpośrednio do neuronu DA (postsynaptyczne GABA-B)
  function spawnDirectInhibit(){
    particles.push({type:'ghb_direct',x:W*0.50,y:-10*s,tx:nDA.x,ty:nDA.y-nDA.r,
      col:'180,80,255',sz:3.5*s,alpha:0.9,arriving:true,bound:false,bTimer:0});
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drug=Math.min(1,drug+0.0007);
    dosePhase=drug<PHASE_SWITCH?'low':'high';
    if(drug>PHASE_SWITCH-0.01&&!phaseSwitched)phaseSwitched=true;

    // Tytuł
    ctx.font=`${6.5*s}px Space Mono`;ctx.textAlign='center';
    ctx.fillStyle='rgba(136,102,255,0.30)';
    ctx.fillText('OBWÓD VTA — GHB → GABA-B / GHBr',W/2,16*s);

    // Faza
    const phaseLabel=drug<0.28?'BASELINE — GABA hamuje DA':
      drug<PHASE_SWITCH?'NISKA DAWKA — GHB→GABA-B → disinhibicja DA↑':
      drug<0.82?'WYSOKA DAWKA — GHB→GABA-B postsynaptycznie → DA↓':
      'WYSOKA DAWKA — bezpośrednia inhibicja neuronu DA';
    ctx.font=`${5.2*s}px Space Mono`;
    const phaseCol=dosePhase==='low'?'136,102,255':'200,80,255';
    ctx.fillStyle=`rgba(${phaseCol},${0.30+drug*0.30})`;
    ctx.fillText(phaseLabel,W/2,H-10*s);

    // Linia inhibicyjna GABA→DA — znika w low dose, zostaje w high dose
    const lowDoseA=dosePhase==='low'?Math.max(0,0.55*(1-Math.max(0,drug-0.30)*2.5)):0.0;
    const highDoseA=dosePhase==='high'?(drug-PHASE_SWITCH)*1.8:0.0;

    // Low-dose inhibitory arrow (zanika)
    if(lowDoseA>0.01){
      ctx.strokeStyle=`rgba(80,140,255,${lowDoseA})`;ctx.lineWidth=2*s;
      ctx.setLineDash([6*s,4*s]);
      ctx.beginPath();ctx.moveTo(nGABA.x+nGABA.r,nGABA.y);ctx.lineTo(nDA.x-nDA.r,nDA.y);ctx.stroke();
      ctx.setLineDash([]);
      const mx=(nGABA.x+nDA.x)/2;
      ctx.strokeStyle=`rgba(80,140,255,${lowDoseA})`;ctx.lineWidth=2*s;
      ctx.beginPath();ctx.moveTo(mx,nGABA.y-9*s);ctx.lineTo(mx,nGABA.y+9*s);ctx.stroke();
    }

    // High-dose: strzałka bezpośrednia GHB → DA neuron (postsynaptyczna inhibicja)
    if(highDoseA>0.01){
      ctx.strokeStyle=`rgba(200,80,255,${Math.min(0.7,highDoseA)})`;ctx.lineWidth=1.5*s;
      ctx.setLineDash([4*s,3*s]);
      ctx.beginPath();
      ctx.moveTo(W*0.50,H*0.18);
      ctx.quadraticCurveTo(nDA.x,H*0.18,nDA.x,nDA.y-nDA.r);
      ctx.stroke();ctx.setLineDash([]);
      // ⊣ na neuronie DA
      ctx.strokeStyle=`rgba(200,80,255,${Math.min(0.8,highDoseA)})`;ctx.lineWidth=2*s;
      ctx.beginPath();ctx.moveTo(nDA.x-10*s,nDA.y-nDA.r-4*s);ctx.lineTo(nDA.x+10*s,nDA.y-nDA.r-4*s);ctx.stroke();
      ctx.font=`${5*s}px Space Mono`;ctx.textAlign='center';
      ctx.fillStyle=`rgba(200,80,255,${Math.min(0.7,highDoseA)})`;
      ctx.fillText('GABA-B postsynaptyczne',nDA.x,nDA.y-nDA.r-14*s);
    }

    // DA output arrow — tylko w low dose, przy high zanika
    const daOutA=dosePhase==='low'?Math.max(0,(drug-0.35)*1.6):Math.max(0,0.55-(drug-PHASE_SWITCH)*2.0);
    if(daOutA>0.01){
      const da=nDA;
      glow('rgb(0,255,170)',6*s);
      ctx.strokeStyle=`rgba(0,255,170,${daOutA*0.70})`;ctx.lineWidth=2*s;
      ctx.beginPath();ctx.moveTo(da.x+da.r,da.y);ctx.lineTo(da.x+da.r+28*s,da.y);ctx.stroke();
      ctx.fillStyle=`rgba(0,255,170,${daOutA*0.70})`;
      ctx.beginPath();
      ctx.moveTo(da.x+da.r+28*s,da.y-6*s);
      ctx.lineTo(da.x+da.r+38*s,da.y);
      ctx.lineTo(da.x+da.r+28*s,da.y+6*s);ctx.fill();noGlow();
      ctx.font=`${5*s}px Space Mono`;ctx.textAlign='center';
      ctx.fillStyle=`rgba(0,255,170,${daOutA*0.55})`;
      ctx.fillText('→ NAc',da.x+da.r+18*s,da.y-9*s);
    }

    // Węzły
    [nGABA,nDA].forEach((n,ni)=>{
      let active;
      if(ni===0) active=drug<0.55; // GABA aktywny tylko w baseline / low dose
      else active=dosePhase==='low'&&drug>0.38; // DA aktywny tylko w low dose
      const inhibited=ni===1&&dosePhase==='high'&&drug>PHASE_SWITCH+0.08;
      const pulse=active?0.70+0.30*Math.sin(t*0.07+ni*2.1):inhibited?0.12:0.18;
      glow(`rgb(${n.col})`,active?13*s:inhibited?2*s:4*s);
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(${n.col},${pulse*0.20})`;ctx.fill();
      ctx.strokeStyle=`rgba(${n.col},${inhibited?0.15:pulse})`;ctx.lineWidth=2*s;ctx.stroke();noGlow();
      ctx.font=`bold ${7.5*s}px Space Mono`;ctx.textAlign='center';
      ctx.fillStyle=`rgba(${n.col},${inhibited?0.20:0.48+pulse*0.32})`;
      const lines=ni===0?['GABA','Interneuron','(VTA)']:['Neuron DA','(VTA→NAc)'];
      lines.forEach((l,li)=>ctx.fillText(l,n.x,n.y+(li-lines.length/2+0.5)*11*s));
      // GABA-B + GHBr label na interneuronie
      if(ni===0){
        ctx.font=`${5*s}px Space Mono`;ctx.textAlign='center';
        ctx.fillStyle=`rgba(136,102,255,${0.30+drug*0.40})`;
        ctx.fillText('GABA-B · GHBr',n.x,n.y+n.r+10*s);
      }
      // DA inhibited marker
      if(inhibited){
        ctx.font=`${7*s}px sans-serif`;ctx.textAlign='center';
        ctx.fillStyle=`rgba(200,80,255,${Math.min(0.8,(drug-PHASE_SWITCH)*2.5)})`;
        ctx.fillText('⊗',n.x,n.y+2*s);
      }
    });

    // Spawn logic
    if(t%55===0)spawnGHB();
    if(dosePhase==='high'&&t%85===0)spawnDirectInhibit();
    daTimer++;
    const pulseInterval=Math.max(30,82-(drug<PHASE_SWITCH?Math.round(drug*80):0));
    if(dosePhase==='low'&&drug>0.38&&daTimer>pulseInterval){
      daTimer=0;for(let i=0;i<3;i++)setTimeout(()=>spawnDA(),i*80);
    }

    // Particle update
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      if(p.arriving){
        p.x+=(p.tx-p.x)*0.055;p.y+=(p.ty-p.y)*0.055;
        if(Math.hypot(p.x-p.tx,p.y-p.ty)<5*s){
          p.arriving=false;
          if(p.type==='ghb'||p.type==='ghb_direct'){p.bound=true;p.bTimer=0;}
        }
      } else if(p.bound){p.bTimer++;if(p.bTimer>140)p.alpha-=0.028;}
      else if(p.life!==undefined){p.life--;p.alpha=p.life/60;p.x+=(p.tx-p.x)*0.032;p.y+=(p.ty-p.y)*0.032;}
      if(p.alpha<=0){particles.splice(i,1);continue;}
      glow(`rgb(${p.col})`,p.sz*2);
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col},${p.alpha})`;ctx.fill();
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*0.35,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.alpha*0.50})`;ctx.fill();noGlow();
    }

    // Drug level bar + dose label
    const bW=W*0.48,bX=W*0.26,bY=H-46*s;
    ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(bX,bY,bW,4*s);
    // Low dose segment — fioletowy
    const lowSegW=bW*Math.min(drug,PHASE_SWITCH)/1.0;
    ctx.fillStyle='rgba(136,102,255,0.45)';ctx.fillRect(bX,bY,lowSegW,4*s);
    // High dose segment — purpurowy
    if(drug>PHASE_SWITCH){
      ctx.fillStyle='rgba(200,80,255,0.55)';
      ctx.fillRect(bX+bW*PHASE_SWITCH,bY,bW*(drug-PHASE_SWITCH),4*s);
    }
    // Linia podziału low/high
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1*s;
    ctx.beginPath();ctx.moveTo(bX+bW*PHASE_SWITCH,bY-3*s);ctx.lineTo(bX+bW*PHASE_SWITCH,bY+7*s);ctx.stroke();
    ctx.font=`${5.2*s}px Space Mono`;ctx.textAlign='center';
    ctx.fillStyle='rgba(136,102,255,0.30)';ctx.fillText('GHB — EFEKT BIFAZOWY',W/2,bY-6*s);
    ctx.font=`${4.5*s}px Space Mono`;ctx.textAlign='left';
    ctx.fillStyle='rgba(136,102,255,0.38)';ctx.fillText('niska',bX,bY+11*s);
    ctx.fillStyle='rgba(200,80,255,0.38)';ctx.fillText('wysoka dawka',bX+bW*PHASE_SWITCH+2*s,bY+11*s);

    // Legenda
    ctx.font=`${5.8*s}px Space Mono`;ctx.textAlign='left';
    ctx.fillStyle='rgba(136,102,255,0.65)';ctx.fillText('● GHB (niskie)',8*s,H-8*s);
    ctx.fillStyle='rgba(200,80,255,0.60)';ctx.fillText('● GHB (wysokie)',W*0.35,H-8*s);
    ctx.fillStyle='rgba(0,255,170,0.55)';ctx.fillText('● DA',W*0.70,H-8*s);
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

// ── BRAIN MAP ─────────────────────────────────────────────────────────────────
function drawBrainMap(canvas, fromRegions, toRegions) {
  const s=window.devicePixelRatio;
  const W=canvas.width=canvas.offsetWidth*s;
  const H=canvas.height=175*s;canvas.style.height='175px';
  const ctx=canvas.getContext('2d');
  function glow(c,b){ctx.shadowBlur=b;ctx.shadowColor=c;}
  function noGlow(){ctx.shadowBlur=0;}

  // Ease function — smooth in/out
  function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}
  const LERP_FRAMES=90; // ~1.5s @ 60fps
  let lerpT=0;

  // Build lookup maps
  const fromMap={};
  (fromRegions||[]).forEach(({r,i,nt})=>{fromMap[r]={i,nt};});
  const toMap={};
  (toRegions||[]).forEach(({r,i,nt})=>{toMap[r]={i,nt};});

  // Union of all valid region keys
  const allKeys=[...new Set([
    ...(fromRegions||[]).map(r=>r.r),
    ...(toRegions||[]).map(r=>r.r)
  ])].filter(k=>BRAIN_R[k]);

  // Build regionData once — fixed spatial/visual properties, lerped intensity each frame
  const regionData=allKeys.map(k=>{
    const br=BRAIN_R[k];
    const to=toMap[k]||{i:0,nt:(fromMap[k]||{}).nt||'da'};
    const from=fromMap[k]||{i:0,nt:to.nt};
    // Dominant NT: prefer toMap if it has a positive target
    const nt=to.i>0?to.nt:from.nt;
    return {
      r:k,label:br.label,
      px:br.x*W,py:br.y*H,
      ph:Math.random()*Math.PI*2,
      fromI:from.i,toI:to.i,
      nt,col:NT_COL[nt]||'150,150,255'
    };
  });

  // Pre-compute fixed bezier offsets per region-pair — stable across frames
  const connOffsets={};
  for(let a=0;a<regionData.length;a++){
    for(let b=a+1;b<regionData.length;b++){
      const A=regionData[a],B=regionData[b];
      const k=`${A.r}:${B.r}`;
      connOffsets[k]={
        mx:(A.px+B.px)/2+(Math.random()-0.5)*18*s,
        my:(A.py+B.py)/2+(Math.random()-0.5)*10*s,
        off:Math.random()*100,
        sameNt:A.nt===B.nt
      };
    }
  }

  let t=0,raf;

  function traceBrain(){
    ctx.beginPath();
    ctx.moveTo(W*0.19,H*0.50);
    ctx.bezierCurveTo(W*0.15,H*0.18,W*0.50,H*0.04,W*0.78,H*0.14);
    ctx.bezierCurveTo(W*0.93,H*0.21,W*0.96,H*0.40,W*0.94,H*0.57);
    ctx.bezierCurveTo(W*0.91,H*0.67,W*0.87,H*0.77,W*0.79,H*0.81);
    ctx.bezierCurveTo(W*0.75,H*0.88,W*0.67,H*0.90,W*0.61,H*0.83);
    ctx.bezierCurveTo(W*0.55,H*0.78,W*0.53,H*0.86,W*0.50,H*0.89);
    ctx.bezierCurveTo(W*0.41,H*0.91,W*0.30,H*0.85,W*0.26,H*0.74);
    ctx.bezierCurveTo(W*0.17,H*0.64,W*0.16,H*0.54,W*0.19,H*0.50);
    ctx.closePath();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    // Lerp progress — clamp, ease
    const ease=easeInOut(Math.min(1,lerpT/LERP_FRAMES));
    lerpT++;

    // Compute interpolated intensities this frame
    const active=regionData.map(rd=>({
      ...rd,
      i:rd.fromI+(rd.toI-rd.fromI)*ease
    })).filter(rd=>rd.i>0.04); // hide near-zero

    // Build connections from strong active regions
    const strong=active.filter(r=>r.i>0.28);
    const conns=[];
    for(let a=0;a<strong.length;a++){
      for(let b=a+1;b<strong.length;b++){
        const A=strong[a],B=strong[b];
        const co=connOffsets[`${A.r}:${B.r}`]||connOffsets[`${B.r}:${A.r}`];
        if(!co)continue;
        conns.push({
          A,B,mx:co.mx,my:co.my,off:co.off,
          col:co.sameNt?A.col:'120,120,170',
          str:Math.min(A.i,B.i)
        });
      }
    }

    // Brain outline
    traceBrain();
    const bg=ctx.createRadialGradient(W*0.46,H*0.44,0,W*0.46,H*0.44,W*0.44);
    bg.addColorStop(0,'rgba(16,20,32,0.97)');bg.addColorStop(1,'rgba(6,8,14,0.99)');
    ctx.fillStyle=bg;ctx.fill();
    ctx.strokeStyle='rgba(45,65,105,0.28)';ctx.lineWidth=1*s;ctx.stroke();

    // Gyri
    ctx.strokeStyle='rgba(22,32,52,0.55)';ctx.lineWidth=0.5*s;
    [[W*0.34,H*0.13,W*0.54,H*0.09,W*0.70,H*0.16],
     [W*0.26,H*0.26,W*0.46,H*0.19,W*0.64,H*0.26],
     [W*0.21,H*0.40,W*0.40,H*0.32,W*0.58,H*0.34]
    ].forEach(([x1,y1,x2,y2,x3,y3])=>{
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(x2,y2,x3,y3);ctx.stroke();
    });

    // Connections
    conns.forEach(({A,B,mx,my,col,str,off})=>{
      ctx.strokeStyle=`rgba(${col},${str*0.18})`;ctx.lineWidth=0.9*s*str;
      ctx.setLineDash([3*s,5*s]);
      ctx.beginPath();ctx.moveTo(A.px,A.py);ctx.quadraticCurveTo(mx,my,B.px,B.py);ctx.stroke();
      ctx.setLineDash([]);
      const tt=((t*0.35+off)%100)/100;
      const sx=(1-tt)*(1-tt)*A.px+2*(1-tt)*tt*mx+tt*tt*B.px;
      const sy=(1-tt)*(1-tt)*A.py+2*(1-tt)*tt*my+tt*tt*B.py;
      ctx.beginPath();ctx.arc(sx,sy,1.6*s,0,Math.PI*2);
      ctx.fillStyle=`rgba(${col},${str*0.62})`;ctx.fill();
    });

    // Regions
    active.forEach(r=>{
      const pulse=r.i*(0.70+0.30*Math.sin(t*0.06+r.ph));
      const rad=(3+r.i*7)*s;
      glow(`rgb(${r.col})`,rad*2.5);
      ctx.beginPath();ctx.arc(r.px,r.py,rad,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r.col},${pulse*0.20})`;ctx.fill();
      ctx.shadowBlur=rad*0.8;
      ctx.beginPath();ctx.arc(r.px,r.py,rad*0.60,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r.col},${pulse*0.55})`;ctx.fill();
      ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(r.px,r.py,rad*0.24,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${pulse*0.80})`;ctx.fill();
      noGlow();
      ctx.font=`${5*s}px Space Mono`;ctx.textAlign='center';
      ctx.fillStyle=`rgba(${r.col},${0.45+r.i*0.42})`;
      ctx.fillText(r.label,r.px,r.py-rad-5*s);
    });

    // Legend
    const usedNts=[...new Set(active.map(r=>r.nt))];
    let legX=8*s;
    usedNts.forEach(nt=>{
      const col=NT_COL[nt]||'150,150,255';
      glow(`rgb(${col})`,3*s);
      ctx.beginPath();ctx.arc(legX+3*s,H-5.5*s,3*s,0,Math.PI*2);
      ctx.fillStyle=`rgba(${col},0.72)`;ctx.fill();noGlow();
      ctx.font=`${5.5*s}px Space Mono`;ctx.textAlign='left';
      ctx.fillStyle=`rgba(${col},0.50)`;ctx.fillText(nt.toUpperCase(),legX+9*s,H-2*s);
      legX+=44*s;
    });

    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}


let currentCleanup = null;
let currentCleanup2 = null;
let currentBrainCleanup = null;
let currentSubId = null;

function resetAnimation() {
  if (currentCleanup) { currentCleanup(); currentCleanup = null; }
  if (currentCleanup2) { currentCleanup2(); currentCleanup2 = null; }
  if (currentBrainCleanup) { currentBrainCleanup(); currentBrainCleanup = null; }
  if (window._brainCleanup) { window._brainCleanup(); window._brainCleanup = null; }
  window._lastBrainRegions = null;
  const brainPanel = document.getElementById('brainPanel');
  if (brainPanel) brainPanel.style.display = 'none';
  const canvas = document.getElementById('synapseCanvas');
  const canvas2 = document.getElementById('synapseCanvas2');
  if (canvas) setTimeout(() => { currentCleanup = drawSynapse(canvas, currentSubId); }, 30);
  if (canvas2) setTimeout(() => { currentCleanup2 = drawSynapse2(canvas2, currentSubId); }, 30);
}

function drawSynapse2(canvas, id) {
  if (id === 'psilocybin') return drawPsilocybinSynapse(canvas);
  if (id === 'lsd')        return drawLSDKinetics(canvas);
  if (id === 'thc')        return drawTHCDisinhibition(canvas);
  if (id === 'cbd')        return drawCBDAllosteric(canvas);
  // All stimulants
  const stimulants = ['mephedrone','3cmc','alpvp','mdma','cocaine','amphetamine','dxm'];
  if (stimulants.includes(id)) return drawReuptakeComparison(canvas, id);
  return null;
}

  document.getElementById('infoTab2').classList.toggle('active', n===2);
  document.getElementById('infoTab1').style.borderBottomColor = n===1 ? col : 'transparent';
  document.getElementById('infoTab2').style.borderBottomColor = n===2 ? col : 'transparent';
}

    id === 'dxm'            ? (LANG==='en'?'REUPTAKE — SERT INHIBITION DXM':'REUPTAKE — SERT INHIBICJA DXM') :

      <div class="mechanism-tag" style="background:${d.color}12;color:${d.color};border:1px solid ${d.color}30">${(window.appLang==="en"&&d.mechanism_en)?d.mechanism_en:d.mechanism}</div>

      </div>
      <div class="panel-body" style="padding:12px">
        <canvas id="synapseCanvas"></canvas>
      </div>
    </div>

    ${hasSecondViz ? `
    <div class="panel">
      <div class="panel-header-row">${secondPanelLabel}
        <button class="anim-reset-btn" onclick="resetAnimation()">${LANG==='en'?'↺ RESET':'↺ RESET'}</button>

      <div class="panel-body" id="timelinePanel"></div>

        <canvas id="brainCanvas"></canvas>
      </div>

        <button class="info-tab-btn" id="infoTab2" onclick="switchInfoTab(2,'${id}')">${LANG==='en'?'BRAIN REGIONS':'OBSZARY MÓZGU'}</button>
      </div>
      <div id="infoPane1" class="guide-content">${LANG==='en'?((SYN[id]||{}).guide_en||(SYN[id]||{}).guide||''):((SYN[id]||{}).guide||'')}</div>
      <div id="infoPane2" class="brain-content" style="display:none">${LANG==='en'?((SYN[id]||{}).brain_en||(SYN[id]||{}).brain||''):((SYN[id]||{}).brain||'')}</div>
    </div>

  const canvas = document.getElementById('synapseCanvas');

  if (currentCleanup2) { currentCleanup2(); currentCleanup2 = null; }
  setTimeout(() => {

    const canvas2 = document.getElementById('synapseCanvas2');
    if (canvas2) currentCleanup2 = drawSynapse2(canvas2, id);
  }, 50);

  // Timeline
  const totalD = d.phases.reduce((s, p) => s + p.d, 0);
  let activePhase = null;
  const tlPanel = document.getElementById('timelinePanel');

  function renderTimeline() {
    const phases = d.phases;
    let html = `<div class="timeline-wrap">`;
    phases.forEach((p, i) => {
      const w = (p.d / totalD) * 100;
      const selected = activePhase === i;
      html += `<div class="tl-phase" data-i="${i}" style="width:${w}%;background:${selected ? p.c+'44' : p.c+'18'};border:1px solid ${selected ? p.c : p.c+'30'}">
        <div class="tl-fill" style="height:${p.i}%;background:${p.c}18"></div>
        ${w > 7 ? `<div class="tl-label" style="color:${selected ? '#fff' : p.c}">${p.n.toUpperCase()}</div>` : ''}
      </div>`;
    });
    html += `</div>
    <div class="timeline-axis"><span>0 min</span><span>${totalH}h ${totalM}min</span></div>`;

    if (activePhase !== null) {
      const p = phases[activePhase];
      html += `<div class="phase-detail" style="background:${p.c}0a;border:1px solid ${p.c}22;color:#888;margin-top:8px">
        <span style="color:${p.c};font-family:'Space Mono',monospace;font-size:11px">${p.n.toUpperCase()}</span>
        <span style="color:#333"> // </span>
        <span>${p.d} min &nbsp;·&nbsp; ${window.appLang==="en"?"intensity":"intensywność"} ${p.i}%</span>
      </div>`;
    }

    tlPanel.innerHTML = html;
    tlPanel.querySelectorAll('.tl-phase').forEach(el => {
      el.addEventListener('click', () => {
        const i = parseInt(el.dataset.i);
        activePhase = activePhase === i ? null : i;
        renderTimeline();
        // Brain map
        const brainPanel = document.getElementById('brainPanel');
        const brainCanvas = document.getElementById('brainCanvas');
        if (window._brainCleanup) { window._brainCleanup(); window._brainCleanup = null; }
        if (activePhase !== null && d.brainMap && d.brainMap[activePhase]) {
          brainPanel.style.display = 'block';
          const fromRegions = window._lastBrainRegions || [];
          const toRegions   = d.brainMap[activePhase];
          window._lastBrainRegions = toRegions;
          setTimeout(() => {
            window._brainCleanup = drawBrainMap(brainCanvas, fromRegions, toRegions);
          }, 20);
        } else {
          brainPanel.style.display = 'none';
        }
      });
    });
  }
  renderTimeline();
}

function toggleLang() {
  LANG = LANG === 'pl' ? 'en' : 'pl';
  const label = LANG === 'en' ? 'PL' : 'EN';
  const logoText = LANG === 'en'
    ? 'PSYCHOPHARMACOLOGY ENGINE // SELECT A SUBSTANCE'
    : 'PSYCHOPHARMACOLOGY ENGINE // WYBIERZ SUBSTANCJĘ';
  const backText = LANG === 'en' ? '← BACK' : '← POWRÓT';
  
  document.querySelectorAll('#langToggleBtn,#langToggleBtn2').forEach(b => { if(b) b.textContent = label; });
  const logoSub = document.getElementById('logoSub');
  if(logoSub) logoSub.textContent = logoText;
  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.textContent = backText;
  
  // Re-render cards for name change
  if(document.getElementById('startScreen') && !document.getElementById('startScreen').classList.contains('hidden')) {
    const list = document.getElementById('substanceList');
    if(list) { buildStart(); }
  }
  // If we're in detail view, re-open to apply language
  if(currentSubId && !document.getElementById('detailScreen').classList.contains('hidden')) {
    openDetail(currentSubId);
  }
}

function goBack() {
  if (currentCleanup) { currentCleanup(); currentCleanup = null; }
  if (currentCleanup2) { currentCleanup2(); currentCleanup2 = null; }
  if (window._brainCleanup) { window._brainCleanup(); window._brainCleanup = null; }
  window._lastBrainRegions = null;
  currentSubId = null;
  document.getElementById('detailScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

buildStart();
</script>
