<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEUROSIM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #060608; color: #ccc; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #060608; }
::-webkit-scrollbar-thumb { background: #1c1c28; border-radius: 4px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes particleFall {
  /* NT dyfundują radialnie — canvas system używa vx/vy random; ten keyframe legacy */
  0%   { transform: translateY(-8px); opacity: 0; }
  20%  { opacity: 1; }
  80%  { opacity: 0.8; }
  100% { transform: translateY(42px); opacity: 0; }
}
@keyframes vesicleRelease {
  /* Biologicznie: dokowanie → fuzja z membraną → kolaps i recycling (nie bounce) */
  0%   { transform: translateY(0)    scale(1);    opacity: 1; }
  35%  { transform: translateY(3px)  scale(1.08); opacity: 1; }
  65%  { transform: translateY(7px)  scale(0.55); opacity: 0.6; }
  100% { transform: translateY(10px) scale(0.12); opacity: 0; }
}
@keyframes receptorGlow {
  0%, 100% { filter: brightness(1); }
  50%       { filter: brightness(1.8); }
}
@keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
@keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }

.screen { position: absolute; inset: 0; overflow-y: auto; animation: fadeIn 0.3s ease; }
.screen.hidden { display: none !important; }
#detailScreen { display: flex; flex-direction: column; }

/* START SCREEN */
.start-header { position: relative;
  padding: 32px 40px 24px;
  border-bottom: 1px solid #0f0f18;
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: #fff; letter-spacing: -0.03em; }
.logo-sub { font-family: 'Space Mono', monospace; font-size: 9px; color: #555; letter-spacing: 0.22em; margin-top: 3px; }

.category-section { padding: 28px 40px 0; }
.category-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.25em;
  margin-bottom: 12px;
  padding-left: 2px;
}
.substance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px; margin-bottom: 8px; }

.substance-card {
  padding: 14px 16px;
  background: #09090e;
  border: 1px solid #111118;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}
.substance-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}
.substance-card:hover {
  background: #0d0d15;
  transform: translateY(-2px);
}
.substance-card:hover::after {
  content: '→';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  opacity: 0.3;
}
.card-name { font-size: 13px; font-weight: 500; color: #e0e0e0; margin-bottom: 3px; }
.card-class { font-family: 'Space Mono', monospace; font-size: 9px; color: #666; letter-spacing: 0.08em; }

/* DETAIL SCREEN */
.detail-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 32px;
  border-bottom: 1px solid #0f0f18;
  background: #060608;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}
.back-btn {
  background: none;
  border: 1px solid #1a1a26;
  color: #555;
  padding: 6px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.back-btn:hover { border-color: #333; color: #999; }

.detail-scroll { flex: 1; overflow-y: auto; padding: 28px 32px 48px; }
.detail-content { max-width: 700px; }

.substance-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 24px;
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 6px;
}
.substance-meta {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: #666;
  letter-spacing: 0.15em;
  margin-bottom: 4px;
}
.mechanism-tag {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 3px;
  margin-top: 6px;
}

/* PANELS */
.panel {
  background: #09090e;
  border: 1px solid #111118;
  border-radius: 6px;
  margin-bottom: 10px;
  overflow: hidden;
}
.panel-header {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.22em;
  color: #555;
  padding: 12px 16px;
  border-bottom: 1px solid #0f0f18;
}
.panel-body { padding: 16px; }

/* SYNAPSE CANVAS */
#synapseCanvas, #synapseCanvas2 { display: block; width: 100%; }

/* NT BARS */
.nt-bar-wrap { margin-bottom: 10px; }
.nt-bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
.nt-bar-label span:first-child { font-family: 'Space Mono', monospace; font-size: 10px; color: #777; }
.nt-bar-label span:last-child { font-family: 'Space Mono', monospace; font-size: 10px; }
.nt-track { height: 5px; background: #0d0d18; border-radius: 3px; overflow: hidden; }
.nt-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }

/* TIMELINE */
.timeline-wrap { display: flex; height: 52px; gap: 3px; border-radius: 4px; overflow: hidden; }
.tl-phase {
  display: flex; flex-direction: column; justify-content: flex-end;
  padding-bottom: 7px; align-items: center;
  cursor: pointer; position: relative; overflow: hidden;
  transition: filter 0.15s;
}
.tl-phase:hover { filter: brightness(1.3); }
.tl-label { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: 0.04em; position: relative; z-index: 1; }
.tl-fill { position: absolute; bottom: 0; left: 0; width: 100%; transition: height 0.4s; }
.timeline-axis { display: flex; justify-content: space-between; margin-top: 5px; }
.timeline-axis span { font-family: 'Space Mono', monospace; font-size: 8px; color: #555; }
.phase-detail {
  margin-top: 8px; padding: 10px 14px;
  border-radius: 4px;
  font-size: 12px; line-height: 1.5;
  animation: slideIn 0.2s ease;
}

/* INFO TABS */
.tabs { display: flex; border-bottom: 1px solid #0f0f18; }
.tab-btn {
  flex: 1; padding: 10px 8px;
  background: none; border: none;
  font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: 0.15em;
  cursor: pointer; transition: all 0.15s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tab-content { padding: 18px; font-size: 13px; line-height: 1.8; color: #aaa; animation: fadeIn 0.2s ease; }
.tab-content b { color: #e0e0e0; font-weight: 500; }

/* COMPARISON GRID */
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.compare-item { padding: 10px 12px; background: #0d0d15; border-radius: 4px; border: 1px solid #1a1a26; }
.compare-item-title { font-family: 'Space Mono', monospace; font-size: 9px; color: #666; margin-bottom: 4px; }
.compare-item-val { font-size: 12px; color: #bbb; line-height: 1.5; }

/* GUIDE SECTION */
.guide-content { padding: 18px 20px; font-size: 13px; line-height: 1.8; color: #aaa; }
.guide-content p { margin-bottom: 12px; }
.guide-content p:last-child { margin-bottom: 0; }
.guide-content b { color: #ddd; font-weight: 500; }
.guide-content i { color: #888; font-style: italic; }
.guide-legend { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; padding: 12px 14px; background: #0a0a12; border-radius: 5px; border: 1px solid #131320; }
.gl-row { display: flex; align-items: center; gap: 9px; font-size: 12px; }
.gl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }

/* BRAIN TAB */
.brain-content { padding: 18px 20px; font-size: 13px; line-height: 1.8; color: #aaa; }
.brain-content p { margin-bottom: 12px; }
.brain-content p:last-child { margin-bottom: 0; }
.brain-content b { color: #ddd; font-weight: 500; }
.brain-content i { color: #888; font-style: italic; }
.brain-region-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 7px; padding: 7px 12px; background: #0a0a12; border-radius: 4px; border-left: 2px solid #1a1a2e; }
.brain-region-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.brain-region-name { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; min-width: 80px; flex-shrink: 0; }
.brain-region-desc { font-size: 12px; color: #999; line-height: 1.5; }
.info-panel-tab { display: flex; border-bottom: 1px solid #0f0f18; background: #07070e; border-radius: 5px 5px 0 0; }
.info-tab-btn { flex: 1; padding: 10px 8px; background: none; border: none; font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.12em; color: #444; cursor: pointer; transition: all 0.15s; border-bottom: 2px solid transparent; margin-bottom: -1px; border-radius: 0; }
.info-tab-btn:hover { color: #888; }
.info-tab-btn.active { color: #ccc; }

.footer-space { height: 40px; }

.anim-reset-btn {
  background: none; border: 1px solid #1a1a2e; color: #444;
  padding: 3px 10px; font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: 0.12em; cursor: pointer;
  border-radius: 3px; transition: all 0.15s; margin-left: auto;
}
.anim-reset-btn:hover { border-color: #444; color: #aaa; }
.panel-header-row {
  display: flex; align-items: center;
  font-family: 'Space Mono', monospace; font-size: 8px;
  letter-spacing: 0.22em; color: #555;
  padding: 12px 16px; border-bottom: 1px solid #0f0f18;
}
</style>

    receptor: `Kodeina sama w sobie ma <b>słabe powinowactwo do receptorów μ-opioidowych</b>. Jej efekt zależy od biotransformacji przez enzym CYP2D6 w wątrobie — około 5–10% dawki przekształcane jest do <b>morfiny</b>, która jest właściwą substancją aktywną.\n\nMorfina aktywuje μ-OR (receptor sprzężony z białkiem Gi/o): inhibicja cyklazy adenylanowej (↓cAMP), otwarcie kanałów K⁺ GIRK (hyperpolaryzacja), zamknięcie kanałów Ca²⁺ (inhibicja wyrzutu NT). <b>Mechanizm μ-OR jest niezależny od GABA</b> — w wizualizacji brainMap kolor „opioid" oznacza bezpośrednie działanie na μ-OR, nie przez układ GABAergiczny.\n\nDopaminowy efekt jest <b>pośredni i słaby</b>: μ-OR w VTA aktywuje interneurony GABA-ergiczne, które normalnie hamują neurony DA — aktywacja μ-OR na tych interneuronach zdejmuje hamowanie, zwiększając firing neuronów DA (deinhibicja). Wzrost DA w NAc jest skromny (~30% vs ~300% dla kokainy).\n\n<b>Polimorfizm CYP2D6</b> — ogromna zmienność osobnicza. Ultra-szybcy metabolizerzy: efekt silniejszy, ryzyko wyższe (zgony opisane). Słabi metabolizerzy (7–10% populacji europejskiej): kodeina praktycznie nieaktywna.`,
    tolerance: `<b>μ-OR down-regulacja:</b> Regularne użycie prowadzi do internalizacji i desensytyzacji receptorów opioidowych. Potrzeba wyższych dawek dla tego samego efektu.\n\n<b>Opioid rebound:</b> Po odstawieniu up-regulacja μ-OR — receptory wracają "głodne" liganda. To mechanizm anhedonii po odstawieniu: hedonic baseline obniżony przez receptory które wymagają stymulacji opioidowej.\n\n<b>Praktyczne:</b> Wskaźnik fizycznego resetu — powrót naturalnego wypróżnienia jest dobrym markerem biochemicznym powrotu do baseline motoryki jelit (μ-OR w splocie Auerbacha). Tydzień między sesjami jako minimalne okno.\n\n<b>Zależność fizyczna</b> różni się od uzależnienia psychologicznego. Można być fizycznie zależnym bez kompulsywnego używania.`,

    receptor: `Ketamina działa jako <b>niekompetytywny antagonista NMDA</b> — wchodzi do kanału receptorowego gdy jest otwarty i blokuje go od środka (mechanizm "open channel block" lub "use-dependent").\n\nNMDA receptor to jonotropowy receptor glutaminianu, kluczowy dla <b>LTP (long-term potentiation)</b> — mechanizmu uczenia się i pamięci. Blokada NMDA dezorganizuje normalne przetwarzanie informacji w korze i hipokampie → dysocjacja od zwykłego doświadczenia poznawczego.\n\n<b>Sigma-1 receptor:</b> Ketamina ma dodatkowe powinowactwo do σ-1 — białka chaperonowego w retikulum endoplazmatycznym, związanego z plastycznością synaptyczną i modulacją świadomości. To może częściowo tłumaczyć "jakość" dysocjacji ketaminowej vs innych NMDA antagonistów.\n\nPośrednio: NMDA blokada w interneuronach GABA-ergicznych → disinhibicja neuronów glutaminianowych i dopaminowych → euforyczny komponent.`,
    tolerance: `<b>Tolerancja NMDA:</b> Szybka przy codziennym użyciu. Up-regulacja receptorów NMDA jako kompensacja — może tłumaczyć zwiększoną pobudliwość i dysfunkcję po odstawieniu przy chronicznym użyciu.\n\n<b>Uropatia ketaminowa:</b> Uszkodzenia urotelium pęcherza moczowego przy przewlekłym nadużyciu — jeden z niewielu specyficznych i poważnych efektów ubocznych ketaminy. Mechanizm: bezpośrednie działanie cytotoksyczne lub przez metabolity. Odwracalne we wczesnym stadium po abstynencji.\n\n<b>Psychologiczne:</b> Ryzyko uzależnienia psychologicznego przez dysocjatywny "reset" — używana jako ucieczka. Fizyczna zależność mniejsza niż przy opioidach czy benzodwuazepinach.`,

    receptor: `Psylocybina → psylocyna przez alkaliczną fosfatazę (jelito, wątroba). Psylocyna: <b>częściowy agonista 5-HT2A</b> w korze (głównie dendryty apikalne neuronów piramidalnych warstwy V, z wiązaniem w warstwach I, III i V — Jakab & Goldman-Rakic 1998).\n\n<b>Default Mode Network (DMN):</b> 5-HT2A aktywacja zaburza funkcjonowanie DMN — sieci odpowiedzialnej za "narrację własnego ja", myślenie autobiograficzne, ruminacje. DMN disruption koreluje z intensywnością subiektywnego doświadczenia i z efektem terapeutycznym przy depresji.\n\n<b>Mechanizm plastyczności:</b> 5-HT2A aktywacja zwiększa wydzielanie glutaminianu w PFC → aktywacja receptorów AMPA → szybka plastyczność synaptyczna (spinogeneza w ciągu godzin). To biologiczne podłoże "reset" który opisują użytkownicy.\n\n<b>Brak dopaminy:</b> Psylocybina praktycznie nie aktywuje układu nagrody dopaminowej — stąd brak euforii i brak klasycznego uzależnienia.`,

    receptor: `LSD posiada <b>wyjątkowo wysokie powinowactwo do 5-HT2A</b> — i co kluczowe, po związaniu z receptorem jest "przykryte" przez pętlę receptorową niczym wieczko, co tłumaczy bardzo długi czas działania (8-12h) mimo niskiej dawki (μg).\n\n<b>Najszersza sieć receptorowa</b> ze wszystkich psychedelików: 5-HT2A (percepcja, synestezja), 5-HT1A (komponent anksjolityczny i empatogenny), D2 (stymulujący komponent, myśli racingowe), α-adrenergiczne (rozszerzone źrenice, wzrost HR, tachykardia).\n\nLSD należy do ergolinów — pochodnych alkaloidów sporyszu (Claviceps purpurea). Synteza przez Alberta Hofmanna w 1938 w Sandoz, efekty odkryte przypadkowo 1943 przez absorpcję skórną (Bicycle Day, 19 IV 1943).\n\n<b>Doza aktywna w mikrogramach</b> — przy 100-200μg dostarcza do receptorów mniej cząsteczek niż wiele suplementów diety, a efekt trwa 12h.`,

    receptor: `THC działa jako <b>partial agonista CB1</b> — receptora kannabinoidowego sprzężonego z białkiem Gi/o. CB1 jest najgęściej rozmieszczonym receptorem GPCR w mózgu, obecnym głównie na aksonyh presynaptycznych. To kluczowy szczegół: THC działa <b>retrograde</b> — neuroprzekaźnik idzie "pod prąd".\n\nNorma: neuron postsynaptyczny produkuje endokannabinoidy (anandamid, 2-AG) jako sygnał zwrotny do neuronu presynaptycznego. THC imituje ten sygnał, ale nie jest metabolizowany tak szybko jak endogenne ligandy — efekt trwa znacznie dłużej.\n\nAktywacja CB1 → inhibicja adenylyl cyklazy (↓cAMP) → zamknięcie kanałów Ca²⁺ (↓wyrzutu NT) + otwarcie kanałów K⁺ (hyperpolaryzacja). Wynik: <b>tłumienie wyrzutu neuroprzekaźników</b> w połączeniach gdzie CB1 jest aktywowany.\n\nEuforia przez pośrednie działanie na DA: CB1 w VTA tłumi GABA-ergiczne interneurony → odhamowanie neuronów DA → wzrost DA w NAc. Mechanizm podobny do opioidów — deinhibicja, nie bezpośredni agonizm DA.`,

    receptor: `CBD to substancja o wyjątkowo szerokim i złożonym profilu — działa na wiele systemów jednocześnie, ale <b>bez klasycznego agonizmu receptorowego CB1</b>. Nie jest psychoaktywna ponieważ nie aktywuje CB1 bezpośrednio.\n\n<b>Negatywna modulacja allosteryczna CB1 (NAM):</b> CBD wiąże się w miejscu innym niż THC i endokannabinoidy — zmienia kształt receptora, obniżając jego powinowactwo do agonistów. Mechanizm działania „entourage effect" — CBD łagodzi niepożądane efekty THC (lęk, paranoja, tachykardia).\n\n<b>5-HT1A partial agonista:</b> Kluczowy mechanizm działania anksjolitycznego i antydepresyjnego, m.in. w ciele migdałowatym i hipokampie. Podobny target co buspiron. Aktywacja 5-HT1A w jądrze grzbietowym szwu może wtórnie zmniejszać aktywność noradrenergiczną LC.\n\n<b>TRPV1 — agonista z desensytyzacją:</b> CBD aktywuje kanał TRPV1 (kapsaicynowy), wywołując napływ Ca²⁺ i wtórną <b>desensytyzację</b> kanału. Efekt końcowy — zmniejszona odpowiedź na bodźce bólowe i zapalne — wynika z desensytyzacji, nie z klasycznej antagonizacji. Błędem jest nazywanie CBD „antagonistą TRPV1".\n\n<b>FAAH inhibitor:</b> CBD umiarkowanie hamuje enzym degradujący anandamid (IC₅₀ ≈ 8–10 µM). Wzrost anandamidu = pośrednie wzmocnienie sygnalizacji CB1 bez bezpośredniej aktywacji.\n\n<b>GPR55 antagonista:</b> GPR55 (dawniej „trzeci receptor kannabinoidowy") — CBD blokuje ten receptor, co może przyczyniać się do działania przeciwbólowego i antyproliferacyjnego.`,
    tolerance: `<b>Tolerancja minimalna:</b> W przeciwieństwie do THC, CBD nie powoduje down-regulacji receptorów przy przewlekłym użyciu. Brak klasycznej tolerancji farmakodynamicznej na efekty kliniczne.\n\n<b>Paradoks dawkowania:</b> CBD ma odwrócony kształt krzywej dawka-odpowiedź dla anksjolizacji — zbyt niska i zbyt wysoka dawka mogą być mniej skuteczne niż optymalna "środkowa" dawka. Złożona farmakokinetyka przez interakcje z P450.\n\n<b>Interakcje lekowe:</b> Silny inhibitor CYP3A4 i CYP2D6 — może znacząco zwiększać stężenia innych leków (klopidogrel, warfaryna, niektóre antydepresanty). Klinicznie istotne przy wyższych dawkach terapeutycznych.`,

    receptor: `DXM to polimechanizm w jednej cząsteczce — lek przeciwkaszlowy od 1958 roku, który przy wysokich dawkach staje się silnym dysocjantem.\n\n<b>Antagonizm NMDA:</b> Open channel block jak ketamina. Główny aktywny metabolit DXO (dekstrorfan) jest silniejszym antagonistą NMDA niż DXM.\n\n<b>Inhibicja SERT:</b> DXM hamuje transporter serotoninowy — stąd wyraźna aktywność serotoniny. To odróżnia DXM od ketaminy i tworzy serotonergiczno-dysocjacyjny profil.\n\n<b>CYP2D6 polimorfizm:</b> Słabi metabolizerzy czują głównie DXM, szybcy — głównie DXO (silniejsza NMDA blokada). Ogromna wariancja osobnicza.`,
    tolerance: `<b>Tolerancja NMDA:</b> Szybka przy częstym użyciu. Up-regulacja NMDA prowadzi do hiperpobudliwości przy odstawieniu.\n\n<b>Serotonin syndrome risk:</b> Inhibicja SERT + inne serotonergiczne substancje = ryzyko. Z MAO inhibitorami — potencjalnie śmiertelne.\n\n<b>Hepatotoksyczność:</b> Przy regularnym, wysokodawkowym użyciu. Inne OTC składniki (acetaminofen) w preparatach złożonych stanowią dodatkowe ryzyko.`,
    compare: [
      { t: "vs Ketamina", v: "Oba NMDA antagoniści, ale DXM dodatkowo SERT inhibitor. Ketamina czystszy dysocjant, DXM bardziej serotonergiczny. DXM doustny, ketamina IM/IV." },
      { t: "vs MXE", v: "MXE był podobny profilowo — NMDA + SERT. Zakazany przez toksyczność. DXM dostępny jako OTC." },

      { t: "Dostępność", v: "Legalnie dostępny jako składnik leków przeciwkaszlowych. Preparaty OTC zawierają inne substancje aktywne — izolowany DXM HBr jest zdrowszą opcją." },

    receptor: `GHB to endogenny neuroprzekaźnik — produkowany naturalnie z GABA i działający na własny receptor. Unikalny: <b>jest zarówno lekiem jak i substancją endogenną</b>.\n\n<b>GABA-B agonizm:</b> Receptor Gi-coupled. Aktywacja → inhibicja cAMP, otwarcie kanałów GIRK (K+, hyperpolaryzacja), zamknięcie Cav. Efekt: długotrwała inhibicja neuronalna.\n\n<b>Pulsatile DA release:</b> GABA-B na interneuronach VTA → zmniejszenie GABA inhibicji → odhamowanie neuronów DA. Niska dawka: DA wzrost. Wysoka dawka: postsynaptyczne GABA-B na neuronach DA → inhibicja. Biphasic effect.\n\n<b>GBL:</b> Gamma-butyrolakton jest <b>prolekiem GHB</b> — nie odwrotnie. GBL jest biologicznie nieaktywny i szybko konwertowany do GHB przez laktonazę surowicy (paraoksonaza). Szybszy onset GBL wynika z lepszego wchłaniania doustnego i szybszej konwersji enzymatycznej.`,

(function(){
var S=window.SYN;if(!S)return;
S.mephedrone.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">Dopamine (DA)</b> — euphoria and drive</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff44ff\"></span><b style=\"color:#aaa\">Serotonin (5-HT)</b> — warmth, empathy, mood</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffaa44\"></span><b style=\"color:#aaa\">Noradrenaline (NE)</b> — arousal, alertness</div></div><p>Mephedrone is a releasing agent with a reuptake-inhibition component. Vesicles pulse and expel particles — active efflux. Most particles, instead of returning via the transporters (∩), remain trapped in the cleft.</p><p>SERT:DAT ratio is ~1:1 in vitro. Slight prevalence of pink particles over green reflects the serotonergic character that gives mephedrone its warmth.</p><p><b>Transporters (∩):</b> lit with a particle inside = blocked. Active ones (↑ arrow) are reabsorbing. Mephedrone blocks most but not all.</p><p><b>Postsynaptic receptors (rectangles at bottom):</b> when a particle arrives, the receptor lights up. Frequent here due to large efflux and long dwell time.</p><p><b>Animation 2 — Reuptake comparison.</b> Left: normal. Right: mephedrone has blocked transporters. SERT ~70%, DAT ~60%.</p>";
S.mephedrone.brain_en="<p>Mephedrone shows a <b>mixed DA/5-HT profile</b> — VTA/NAc activation (green = DA) with strong Raphe involvement (pink = 5-HT). Cortex and amygdala serotonin explains the empathogenic character.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">VTA</div><div class=\"brain-region-desc\">Dopamine source (i:0.40→0.90). DA release via reversed DAT projecting to NAc.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Raphe</div><div class=\"brain-region-desc\">Serotonin nuclei (i:0.40→0.88). Origin of the empathogenic warmth — 5-HT projected to cortex, amygdala, and hippocampus.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">NAc</div><div class=\"brain-region-desc\">Nucleus accumbens — primary reward hub. Peaks at i:0.95. High DA + 5-HT produces the hedonic component.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Amygdala</div><div class=\"brain-region-desc\">5-HT activation (i:0.70). Reduced fear response, increased social comfort.</div></div>";
S["3cmc"].guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">Dopamine (DA)</b> — primary target</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff44ff\"></span><b style=\"color:#aaa\">Serotonin (5-HT)</b> — weak activity</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffaa44\"></span><b style=\"color:#aaa\">Noradrenaline (NE)</b> — second primary target</div></div><p>3-CMC is primarily a reuptake inhibitor — blocks DAT and NET but releases far fewer particles than a releasing agent. Vesicles are darker, less active. The few particles that appear linger in the cleft instead of being reabsorbed.</p><p>No wave of efflux — particles appear singly. Low serotonin (few pink particles) = clean stimulatory profile without warmth.</p><p><b>Animation 2.</b> DAT blocked 82%, NET 78%.</p>";
S["3cmc"].brain_en="<p>3-CMC shows a <b>DA/NE-dominant profile</b> — VTA, NAc, LC, and PFC activation. Weak Raphe confirms the clean stimulant character.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffaa44;box-shadow:0 0 5px #ffaa44\"></div><div class=\"brain-region-name\">LC</div><div class=\"brain-region-desc\">Locus coeruleus — strong NE activation (i:0.30→0.80). Focus, alertness, arousal.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffaa44;box-shadow:0 0 5px #ffaa44\"></div><div class=\"brain-region-name\">PFC</div><div class=\"brain-region-desc\">NE-dominant prefrontal activation (i:0.55→0.78). Improved working memory via α2A receptors.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Raphe</div><div class=\"brain-region-desc\">Low serotonin signal (i:0.28→0.42). Present but insufficient for empathogenic effects.</div></div>";
S.alpvp.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">Dopamine (DA)</b> — near-total reuptake block</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff44ff\"></span><b style=\"color:#aaa\">Serotonin (5-HT)</b> — absent</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffaa44\"></span><b style=\"color:#aaa\">Noradrenaline (NE)</b> — strong blockade</div></div><p>α-PVP is the most potent known DAT inhibitor. No pink particles — serotonin is completely absent. Only DA (green) and NE (orange). Zero SERT activity means no serotonergic brake on dopamine via 5-HT2C receptors.</p><p>DAT transporters (∩) are almost entirely blocked. SEEKING loop without a saturation point: dopamine rises continuously, but the absence of serotonin means no \"enough\" signal.</p><p><b>Why this is dangerous:</b> without the 5-HT2C brake, dopamine is completely unmodulated — the pharmacological definition of compulsion.</p><p><b>Animation 2.</b> DAT blockade 95% — highest of any common cathinone.</p>";
S.alpvp.brain_en="<p>α-PVP shows a <b>pure DA/NE profile with absent serotonin</b> — intense VTA/NAc activation (green) with no Raphe signal.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">NAc</div><div class=\"brain-region-desc\">Peaks at maximum (i:1.0). Pure DA accumulation with no 5-HT2C brake — unmodulated mesolimbic activation.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">VTA</div><div class=\"brain-region-desc\">Maximum DA (i:0.55→1.0). Rapidly escalating firing with crash to 0.15.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffaa44;box-shadow:0 0 5px #ffaa44\"></div><div class=\"brain-region-name\">LC</div><div class=\"brain-region-desc\">Noradrenaline (i:0.40→0.90). NET blockade produces hyperarousal.</div></div>";
S.mdma.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">Dopamine (DA)</b> — strong efflux</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff44ff\"></span><b style=\"color:#aaa\">Serotonin (5-HT)</b> — dominant efflux (~×3–10 vs DA)</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffaa44\"></span><b style=\"color:#aaa\">Noradrenaline (NE)</b> — significant efflux</div></div><p>MDMA is a massive releasing agent with a SERT:DAT ratio of ~3–10:1 (2–4:1 on human transporters in vitro). Many more pink particles (5-HT) than green (DA). Vesicles pulse intensely — reversed transport via SERT and DAT simultaneously.</p><p><b>Built-in brake:</b> massive 5-HT activates 5-HT2C, which inhibits DA neurons in NAc. Despite high DA, the cleft does not accumulate it as chaotically as with α-PVP — what distinguishes MDMA from pure DA stimulants.</p><p><b>Animation 2.</b> SERT blockade 80%, DAT 54%.</p>";
S.mdma.brain_en="<p>MDMA's activation is <b>serotonin-dominant</b> — Raphe, amygdala, and cortex lit in pink (5-HT). VTA shows significant DA, but 5-HT overwhelms it.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Raphe</div><div class=\"brain-region-desc\">Peak serotonin source (i:0.50→0.96). Reversed SERT floods the entire 5-HT projection system.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Amygdala</div><div class=\"brain-region-desc\">5-HT dominant (i:0.65→0.82). Reduced fear response, increased prosocial drive — the empathogenic mechanism.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">VTA</div><div class=\"brain-region-desc\">DA (i:0.40→0.80). Significant but secondary to 5-HT. The 5-HT2C brake prevents this from becoming as intense as cocaine or α-PVP.</div></div>";
S.cocaine.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">Dopamine (DA)</b> — primary reuptake blockade</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff44ff\"></span><b style=\"color:#aaa\">Serotonin (5-HT)</b> — moderate blockade (~52%)</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffaa44\"></span><b style=\"color:#aaa\">Noradrenaline (NE)</b> — strong blockade</div></div><p>Cocaine is a pure reuptake inhibitor — it only blocks the transporter binding pocket from outside. Vesicles are quiet (minimal efflux), but naturally-appearing particles get trapped in the cleft by the blocked transporters (∩).</p><p><b>Key property:</b> cocaine's effect depends on current neuronal activity. The more natural DA firing — the stronger the blockade effect.</p><p>Pink particles (SERT) are least common — serotonin blocked at only 52% vs 88% for DAT.</p><p><b>Animation 2.</b> Three transporters: DAT 88%, NET 80%, SERT 52%.</p>";
S.cocaine.brain_en="<p>Cocaine shows a <b>DA/NE-dominant profile</b>. Rapid onset and quick crash are visible in the steep VTA/NAc activation curves.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">NAc</div><div class=\"brain-region-desc\">Peak DA accumulation (i:0.95). Blocked DAT concentrates all naturally-released DA in the reward circuit.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffaa44;box-shadow:0 0 5px #ffaa44\"></div><div class=\"brain-region-name\">LC</div><div class=\"brain-region-desc\">Noradrenaline (i:0.60→0.85). NET blockade — tachycardia, vasoconstriction.</div></div>";
S.amphetamine.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">Dopamine (DA)</b> — massive efflux</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff44ff\"></span><b style=\"color:#aaa\">Serotonin (5-HT)</b> — trace activity</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffaa44\"></span><b style=\"color:#aaa\">Noradrenaline (NE)</b> — dominant efflux</div></div><p>Amphetamine is a releasing agent with a unique VMAT2 mechanism. It blocks the vesicular transporter that normally packages DA into vesicles — DA floods the cytosol and is expelled via reversed DAT regardless of neuronal firing. Intense, continuous pulse of vesicles with a dense stream of DA (green) and NE (orange).</p><p>NE numerically dominates — giving amphetamine its \"working\" character (focus, endurance, fatigue suppression) rather than pure euphoria. Minimal 5-HT = no empathogenic effect.</p><p><b>Depleting stores:</b> unlike cocaine, amphetamine physically empties DA vesicles. The crash is proportional to session length.</p><p><b>Animation 2.</b> DAT 62%, NET 66%.</p>";
S.amphetamine.brain_en="<p>Amphetamine shows a <b>NE-dominant profile</b> with strong PFC activation — the basis of its use in ADHD treatment.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffaa44;box-shadow:0 0 5px #ffaa44\"></div><div class=\"brain-region-name\">PFC</div><div class=\"brain-region-desc\">Strong NE activation (i:0.88). NE in PFC improves working memory and executive function via α2A receptors — the mechanism of amphetamine's therapeutic effect in ADHD.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">VTA / NAc</div><div class=\"brain-region-desc\">Strong DA (i:0.75→0.95). VMAT2 inhibition empties vesicles into the mesolimbic circuit regardless of natural neuronal firing rate.</div></div>";
S.codeine.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#9933ff\"></span><b style=\"color:#aaa\">μOR neuron</b> — opioid receptor; codeine/morphine binds here</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff4466\"></span><b style=\"color:#aaa\">GABA interneuron</b> — normally inhibits DA neurons; silenced here</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">DA neuron</b> — dopaminergic; disinhibited when GABA is silent</div></div><p>The animation shows a disinhibition circuit — three neurons in the nucleus accumbens. Normally the GABAergic interneuron (red) actively inhibits the DA neuron (green) — the natural brake on the reward system.</p><p>When codeine (converted to morphine by CYP2D6) binds to μOR on the GABA interneuron: the interneuron goes quiet (dims, pulse fades). Without the GABA brake — the DA neuron fires freely. DA rise from removal of inhibition, not from direct release.</p><p>Key mechanistic difference from cathinones: codeine doesn't touch DAT or vesicles — the response is slower and more modulated.</p>";
S.codeine.brain_en="<p>Codeine shows a <b>diffuse opioid profile</b> (purple = μOR) with indirect DA in NAc/VTA.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#9933ff;box-shadow:0 0 5px #9933ff\"></div><div class=\"brain-region-name\">VTA</div><div class=\"brain-region-desc\">μOR activation on GABA interneurons (i:0.35→0.80). Disinhibition — μOR silences GABA → DA neurons fire more freely. Moderate effect (~30% DA increase vs ~300% for cocaine).</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">NAc</div><div class=\"brain-region-desc\">Indirect DA (i:0.25→0.70). Result of VTA disinhibition. Explains why opioid euphoria feels qualitatively different from stimulant euphoria.</div></div>";
S.ketamine.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffee00\"></span><b style=\"color:#aaa\">Glutamate</b> — ligand opening the NMDA channel</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#aaaaaa\"></span><b style=\"color:#aaa\">Mg²⁺</b> — voltage-dependent block inside the channel (physiologically normal)</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ccff\"></span><b style=\"color:#aaa\">Ca²⁺ / Na⁺</b> — ions flowing through the open channel</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#0099ff\"></span><b style=\"color:#aaa\">Ketamine</b> — molecule entering the open channel and blocking it</div></div><p>A single NMDA receptor in cross-section through the membrane. NMDA requires simultaneously glutamate binding AND membrane depolarization (Mg²⁺ block removal). A \"coincidence detector\" — critical for LTP and synaptic plasticity.</p><p><b>Ketamine: open channel block</b> — the molecule enters only when the channel is open. Inside, it blocks Ca²⁺ and Na⁺ flow. \"Use-dependent\" — the more active the neuron, the stronger the block.</p><p>Watch: Mg²⁺ ejected by depolarization → channel opens → ions flow → ketamine enters → channel blocked even with glutamate still bound.</p>";
S.ketamine.brain_en="<p>Ketamine shows a <b>glutamatergic/dissociative profile</b> — cortical and thalamic disruption (yellow = Glu) with secondary DA via disinhibition. Disrupted thalamo-cortical relay explains the dissociative state.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffdc32;box-shadow:0 0 5px #ffdc32\"></div><div class=\"brain-region-name\">PFC</div><div class=\"brain-region-desc\">Primary NMDA disruption (i:0.40→0.90). Ketamine blocks NMDA on GABAergic interneurons → paradoxical glutamate burst — the dissociative state.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffdc32;box-shadow:0 0 5px #ffdc32\"></div><div class=\"brain-region-name\">Thalamus</div><div class=\"brain-region-desc\">NMDA disruption (i:0.35→0.80). Thalamo-cortical disconnection — the mechanistic core of dissociation.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">VTA / NAc</div><div class=\"brain-region-desc\">Indirect DA (i:0.30→0.75). Contributes to ketamine's euphoric and antidepressant components.</div></div>";
S.psilocybin.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#cc44ff\"></span><b style=\"color:#aaa\">DMN nodes</b> — Default Mode Network: mPFC, PCC, AG-L, AG-R</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#aaaaaa\"></span><b style=\"color:#aaa\">External networks</b> — visual (VIS), auditory (AUD), somatosensory (SOM), frontoparietal (FPN)</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#44ee66\"></span><b style=\"color:#aaa\">Green lines</b> — connections within DMN (thickness = connectivity strength)</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#9944ff\"></span><b style=\"color:#aaa\">Purple lines</b> — new cross-network connections appearing under psilocybin</div></div><p><b>Animation 1 — Functional network (DMN).</b> Psilocybin activates 5-HT2A receptors primarily on apical dendrites of layer-V pyramidal neurons in DMN nodes — the network responsible for self-narrative, autobiographical thinking, and rumination. At baseline DMN is strongly connected internally. As psilocybin ramps up: DMN connections weaken (green lines thin), while new purple edges appear between normally non-communicating networks. This is \"brain entropy.\" Cycle repeats every ~8 seconds.</p><p><b>Animation 2 — 5-HT2A synaptic mechanism.</b> Large purple particles are psilocin (active metabolite) — entering the serotonergic synapse and displacing natural 5-HT (smaller pink) from 5-HT2A receptors. Psilocin is a partial agonist — binds more strongly than 5-HT but produces different intracellular signaling. When ≥2 receptors are occupied, the Gq → PLC → IP3 → Ca²⁺ cascade activates.</p>";
S.psilocybin.brain_en="<p>Psilocybin shows <b>serotonin-dominant cortical activation</b> — especially PFC and Hippocampus. VTA is largely untouched, explaining the very low addiction potential.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Raphe</div><div class=\"brain-region-desc\">Autoreceptors 5-HT1A (i:0.75 peak) — negative feedback reducing Raphe firing, partially limiting 5-HT release.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">PFC</div><div class=\"brain-region-desc\">Prefrontal 5-HT2A activation (i:0.65→0.90). The primary site of the psychedelic effect — layer-V pyramidal neuron disruption drives the DMN disruption seen in fMRI.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Hippocampus</div><div class=\"brain-region-desc\">5-HT2A (i:0.60→0.88). Contributes to altered memory and emotional processing. Proposed mechanism for the antidepressant effect.</div></div>";
S.lsd.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff44ff\"></span><b style=\"color:#aaa\">5-HT2A / 5-HT1A</b> — serotonergic; primary psychedelic and anxiolytic target</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">D2 / D1</b> — dopaminergic; stimulant, mentally sharpening component vs psilocybin</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffaa44\"></span><b style=\"color:#aaa\">α1B / α2A</b> — adrenergic; dilated pupils, tachycardia, blood pressure increase</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#66aaff\"></span><b style=\"color:#aaa\">H1</b> — histaminergic; sedative, antiemetic component</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#aa77ff\"></span><b style=\"color:#aaa\">σ1</b> — sigma-1; dissociative, oneiric component at higher doses</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffffff\"></span><b style=\"color:#aaa\">Arc ⬡ locked</b> — lid closure: the receptor loop has closed over the LSD molecule</div></div><p><b>Animation 1 — Affinity map.</b> LSD molecules fly into each receptor class. LSD has an exceptionally broad receptor network — 9 classes simultaneously — distinguishing it from psilocybin (dominantly 5-HT2A). When a receptor reaches lid closure (glowing arc), it displays ⬡ locked. The small bar under each name = relative affinity (Ki).</p><p><b>Animation 2 — Binding kinetics.</b> Each row compares two curves: dashed grey = natural serotonin oscillates and dissociates quickly. Solid colored = LSD — the receptor stays occupied for hours. \"Kinetic trapping\" — the receptor's extracellular loop physically closes over the molecule, explaining the 8–12h duration at μg doses.</p>";
S.lsd.brain_en="<p>LSD shows <b>the broadest receptor profile of any psychedelic</b> — visual cortex maximally saturated, plus a unique dopaminergic component (D2) visible in NAc/VTA.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">VCtx</div><div class=\"brain-region-desc\">Visual cortex (i:0.72→0.95). Highest activation of any region — the basis of LSD's intense visual phenomena.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Cortex</div><div class=\"brain-region-desc\">Broad cortical 5-HT2A engagement (i:0.65→0.88). Global cortical hyperconnectivity — measurably stronger with LSD than psilocybin.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">NAc</div><div class=\"brain-region-desc\">DA via D2 agonism (i:0.35→0.65). Unique to LSD among classic psychedelics — explains the more stimulant-like, mentally acute quality.</div></div><p><b>LSD vs Psilocybin:</b> Psilocybin — pink only. LSD — pink + orange + green. The color variety visualizes the broader receptor profile.</p>";
S.thc.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#50e890\"></span><b style=\"color:#aaa\">THC</b> — mimics endocannabinoids, enters synapse from outside</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#80d4a8\"></span><b style=\"color:#aaa\">Endocannabinoids (AEA/2-AG)</b> — produced by POST neuron, travel upward (retrograde)</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffcc44\"></span><b style=\"color:#aaa\">Neurotransmitter (Glu/GABA)</b> — normal direction: pre→post</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#50e890\"></span><b style=\"color:#aaa\">CB1 (on PRE)</b> — cannabinoid receptor; activation inhibits NT release</div></div><p><b>Animation 1 — Retrograde signaling.</b> The signal travels backward. Grey NT particles flow normally (pre→post). When the postsynaptic neuron is sufficiently active, it produces endocannabinoids (small green, flowing upward) which activate CB1 on the presynaptic axon. CB1 activation → Ca²⁺ channel closure → less NT release. This is DSI/DSE — depolarization-induced suppression.</p><p>THC (large bright-green particles) mimics this signal but is not metabolized as quickly as endogenous ligands — the effect lasts far longer.</p><p><b>Animation 2 — VTA disinhibition circuit.</b> CB1 on GABAergic interneurons in VTA → GABA drops → DA neurons disinhibit → indirect DA increase in NAc. THC is not a stimulant — DA is indirect.</p>";
S.thc.brain_en="<p>THC's brainMap uses two color channels — bright green (cb1: direct CB1 activation) and dark green (da: indirect dopamine via VTA disinhibition).</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#50d080;box-shadow:0 0 5px #50d080\"></div><div class=\"brain-region-name\">Hippocampus</div><div class=\"brain-region-desc\">High CB1 density (i:0.65→0.88). THC disrupts hippocampal encoding of new memories — the mechanism of short-term memory impairment.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">NAc</div><div class=\"brain-region-desc\">Indirect DA (i:0.30→0.72). Via VTA disinhibition — same mechanism as opioids and GHB. Explains euphoria without the compulsive profile of direct DA agonists.</div></div><p><b>cb1 vs da in this map:</b> Bright green (cb1) = direct CB1 activation. Dark green (da) = dopamine via disinhibition. THC is not a stimulant.</p>";
S.cbd.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#50e890\"></span><b style=\"color:#aaa\">CBD</b> — bluish particle, no classical CB1 agonism</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#50e890\"></span><b style=\"color:#aaa\">CB1 (allosteric)</b> — CBD binds but does not activate; alters receptor conformation</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff44ff\"></span><b style=\"color:#aaa\">5-HT1A</b> — partial agonist; key mechanism for anxiolysis</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff8844\"></span><b style=\"color:#aaa\">TRPV1</b> — capsaicin channel; CBD activates then desensitizes</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffaa00\"></span><b style=\"color:#aaa\">FAAH</b> — enzyme degrading anandamide; inhibition → increased AEA</div></div><p><b>Animation 1 — Multi-target map.</b> CBD has no single dominant mechanism — it acts on multiple targets simultaneously with moderate affinity. CB1 is marked differently: CBD binds (particle lands) but the receptor does not glow — allosteric modulation, not activation. Compare with LSD where every bound receptor glows intensely.</p><p>5-HT1A is the only target where CBD produces clear activation (partial agonism). This is the primary mechanistic explanation for CBD's anxiolytic effect — the same receptor as buspirone.</p><p><b>Animation 2 — CB1 allosteric modulation.</b> CBD vs THC: THC activates CB1 (receptor glows); CBD docks but doesn't activate (receptor dim). The \"entourage effect\" — CBD can attenuate THC's adverse effects.</p>";
S.cbd.brain_en="<p>CBD's activation is <b>modest and diffuse</b> — primarily serotonergic via 5-HT1A in Raphe and limbic regions. No DA signal. No addiction potential.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Raphe</div><div class=\"brain-region-desc\">5-HT1A partial agonism (i:0.50 peak). Similar mechanism to buspirone. Net anxiolytic effect.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Amygdala</div><div class=\"brain-region-desc\">Serotonergic modulation (i:0.45→0.60). Reduced fear circuit reactivity — the basis of CBD's anxiolytic effect in social anxiety and PTSD.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#50d080;box-shadow:0 0 5px #50d080\"></div><div class=\"brain-region-name\">Hippocampus</div><div class=\"brain-region-desc\">CB1 allosteric modulation + FAAH inhibition (i:0.30→0.55). Increased anandamide via FAAH inhibition. Anti-inflammatory and neuroprotective effects.</div></div>";
S.dmt.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff88ff\"></span><b style=\"color:#aaa\">DMT</b> — magenta particles; massive 5-HT2A saturation within seconds</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ff88ff\"></span><b style=\"color:#aaa\">5-HT2A</b> — postsynaptic receptors; light up upon binding</div></div><p>DMT acts like a shockwave — full 5-HT2A saturation in under 2 minutes. Compare with psilocybin: the same target receptor network, but psilocin binds gradually over 30–60 minutes. The absence of any adaptation time explains the extreme intensity of the DMT experience.</p><p><b>Sigma-1:</b> Concurrent activation may explain the specific quality of the DMT space — described as contact with separate entities. Sigma-1 modulates ER stress response and neuronal plasticity.</p>";
S.dmt.brain_en="<p>DMT shares psilocybin's serotonergic footprint but the timeline is compressed — saturation in minutes. Rapid cortical 5-HT2A flooding.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">VCtx</div><div class=\"brain-region-desc\">Visual cortex 5-HT2A flood (i:0.55→0.95). The most intense visual hallucinations of any natural compound.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">PFC / Cortex</div><div class=\"brain-region-desc\">Rapid cortical 5-HT2A (i:0.60→0.88). The \"entity contact\" quality may relate to sigma-1 activation combined with sudden DMN disruption.</div></div>";
S.diazepam.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#5088ff\"></span><b style=\"color:#aaa\">GABA</b> — endogenous NT; opens Cl⁻ channel by binding at the α/β interface</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#44aaff\"></span><b style=\"color:#aaa\">Diazepam (BZD)</b> — binds allosterically between α-γ; increases opening frequency</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#88ccff\"></span><b style=\"color:#aaa\">Cl⁻</b> — flows through the open channel; hyperpolarizes the neuron</div></div><p>Pentameric GABA-A channel: 2α-2β-γ. GABA binds at the α/β interface (a pocket formed by residues from both subunits), the channel opens, Cl⁻ enters — the neuron becomes harder to excite.</p><p><b>BZD mechanism:</b> Diazepam binds between α and γ — not where GABA binds. It increases the <b>frequency</b> of channel opening without replacing GABA. Hence \"positive allosteric modulation,\" not direct activation. Key distinction vs barbiturates: the latter can open the channel directly — the wider safety margin of BZDs comes from dependence on endogenous GABA.</p><p>Phase 1 — GABA occasionally opens the channel. Phase 2 — Diazepam approaches the BZD site. Phase 3 — with BZD bound, same GABA concentration triggers far more frequent openings → more Cl⁻ influx → deeper hyperpolarization.</p>";
S.diazepam.brain_en="<p>Diazepam presents a <b>diffuse GABAergic profile</b> — blue regions distributed throughout the brain, reflecting the ubiquity of GABA-A receptors. No DA/5-HT signal.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#5090ff;box-shadow:0 0 5px #5090ff\"></div><div class=\"brain-region-name\">Amygdala</div><div class=\"brain-region-desc\">High GABA-A density (i:0.50→0.88). GABA enhancement in the amygdala is the primary substrate of anxiolysis.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#5090ff;box-shadow:0 0 5px #5090ff\"></div><div class=\"brain-region-name\">Cortex</div><div class=\"brain-region-desc\">Widespread cortical inhibition (i:0.45→0.82). Sedation and anticonvulsant effect.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#5090ff;box-shadow:0 0 5px #5090ff\"></div><div class=\"brain-region-name\">Thalamus</div><div class=\"brain-region-desc\">GABA-A modulation (i:0.35→0.72). Thalamic GABA enhancement reduces sensory relay amplification.</div></div>";
S.dxm.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#ffee00\"></span><b style=\"color:#aaa\">Glutamate</b> — opens the NMDA channel; DXM/DXO enters when the channel is open</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#0099ff\"></span><b style=\"color:#aaa\">DXM / DXO</b> — blocks the channel pore from inside (use-dependent)</div></div><p>DXM acts on the NMDA channel like ketamine — identical open channel block mechanism. The main metabolite DXO (dextrorphan) is a stronger NMDA antagonist than DXM itself. CYP2D6 polymorphism determines the DXM:DXO ratio — hence the enormous individual variability.</p><p><b>Dual mechanism:</b> Concurrent SERT inhibition creates a serotonergic-dissociative profile unique among dissociatives. Animation 2 shows the SERT component — a single pink column (SERT 58%) with no DAT/NET, correctly distinguishing DXM from cocaine and cathinones.</p>";
S.dxm.brain_en="<p>DXM shows a <b>mixed dissociative/serotonergic profile</b> — NMDA blockade in cortex/thalamus (yellow = Glu) combined with moderate 5-HT signal (pink) from SERT inhibition.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffdc32;box-shadow:0 0 5px #ffdc32\"></div><div class=\"brain-region-name\">PFC</div><div class=\"brain-region-desc\">NMDA disruption (i:0.40→0.85). Same mechanism as ketamine — disinhibited glutamate burst contributing to dissociation and dose-dependent plateaus.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ff44ff;box-shadow:0 0 5px #ff44ff\"></div><div class=\"brain-region-name\">Raphe</div><div class=\"brain-region-desc\"><b>Note:</b> Low value (i:0.32). SERT blockade increases 5-HT at projection terminals, but 5-HT1A autoreceptors in Raphe inhibit firing. Low Raphe = source inhibited, not absence of 5-HT effect.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#ffdc32;box-shadow:0 0 5px #ffdc32\"></div><div class=\"brain-region-name\">Thalamus</div><div class=\"brain-region-desc\">NMDA disruption (i:0.30→0.75). Thalamo-cortical disconnection — the mechanism of the \"robotripping\" dissociation at plateau 2+.</div></div>";
S.ghb.guide_en="<div class=\"guide-legend\"><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#8866ff\"></span><b style=\"color:#aaa\">GHB</b> — purple particles; endogenous GABA-B and GHB receptor ligand</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#80aaff\"></span><b style=\"color:#aaa\">GABA</b> — suppressed by GHB on interneurons → DA disinhibition</div><div class=\"gl-row\"><span class=\"gl-dot\" style=\"background:#00ffaa\"></span><b style=\"color:#aaa\">Dopamine</b> — pulsatile release via disinhibition in VTA at low dose</div></div><p>GHB activates GABA-B receptors on interneurons in the VTA → their activity drops → DA neurons disinhibited → pulsatile DA increase in the NAc. Mechanism identical to opioids and THC — disinhibition, not direct DA agonism.</p><p><b>Biphasic effect:</b> Low dose = presynaptic GABA-B → DA rise (euphoria). High dose = postsynaptic GABA-B on DA neurons themselves → DA fall (sedation, loss of consciousness). This explains the dangerously narrow window between euphoric and sedating doses.</p>";
S.ghb.brain_en="<p>GHB shows a <b>GABAergic + indirect DA profile</b> — blue (GABA) dominates at onset with progressive DA (green) emerging in VTA/NAc as interneurons are silenced.</p><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#5090ff;box-shadow:0 0 5px #5090ff\"></div><div class=\"brain-region-name\">VTA (onset)</div><div class=\"brain-region-desc\">GABA-B activation on interneurons (i:0.28). Inhibition paradoxically leads to DA neuron disinhibition — the mechanism of pulsatile DA release.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#00ffaa;box-shadow:0 0 5px #00ffaa\"></div><div class=\"brain-region-name\">NAc</div><div class=\"brain-region-desc\">Indirect DA at low dose (i:0.40→0.70). The reward/euphoria component. At high doses this reverses as postsynaptic GABA-B on DA neurons overrides the disinhibition.</div></div><div class=\"brain-region-row\"><div class=\"brain-region-dot\" style=\"background:#5090ff;box-shadow:0 0 5px #5090ff\"></div><div class=\"brain-region-name\">Cortex / Thalamus</div><div class=\"brain-region-desc\">Broad GABA-B inhibition at high doses — the mechanism of blackout and respiratory depression risk.</div></div>";
})();
// Build start screen
function buildStart() {
  const list = document.getElementById('substanceList');
  list.innerHTML = '';
  const grouped = {};
  Object.entries(DATA).forEach(([id, d]) => {
    if (!grouped[d.category]) grouped[d.category] = [];
    grouped[d.category].push({ id, ...d });
  });
  Object.entries(CATS).forEach(([cat, catInfo]) => {
    if (!grouped[cat]) return;

      card.innerHTML = `
        <div class="card-name">${LANG==='en'?(sub.name_en||sub.name):sub.name}</div>

        card.style.boxShadow = 'none';
      });
      card.addEventListener('click', () => openDetail(sub.id));
      grid.appendChild(card);
    });
    list.appendChild(sec);

<div class="brain-content">
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">VTA</div><div class="brain-region-desc">Peaks at maximum (i:1.0) — highest intensity in the app. Strong DAT blockade via α-PVP's pyrrolidine ring, higher affinity than cocaine.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">NAc</div><div class="brain-region-desc">Full saturation (i:1.0). No 5-HT2C modulation (which normally brakes DA) = dopamine rises without a ceiling. Neurobiology of compulsion — SEEKING system activated with no satiation point.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ffaa44;box-shadow:0 0 5px #ffaa44"></div><div class="brain-region-name">LC</div><div class="brain-region-desc">Strong NE activation (i:0.90) — severe tachycardia, hypertension. The cardiovascular danger of α-PVP is visible here.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ffaa44;box-shadow:0 0 5px #ffaa44"></div><div class="brain-region-name">PFC</div><div class="brain-region-desc">NE/DA in PFC (i:0.85). Extreme agitation, paranoid ideation. The cortical component of stimulant psychosis.</div></div>
</div>`,
    guide_en:`<div class="guide-legend">
  <div class="guide-row"><span class="guide-dot" style="background:#00ffaa"></span>Dopamine (DA) — near-complete blockade</div>
  <div class="guide-row" style="opacity:0.4"><span class="guide-dot" style="background:#ff44ff"></span>Serotonin (5-HT) — absent</div>
  <div class="guide-row"><span class="guide-dot" style="background:#ffaa44"></span>Noradrenaline (NE) — strong blockade</div>
</div>
<p>α-PVP is the <b>most potent known DAT inhibitor</b>. No pink particles — serotonin is absent. Only DA (green) and NE (orange). This isn't aesthetic: the absence of SERT activity means no serotonergic brake on dopamine via the 5-HT2C receptor.</p>
<p>DA transporters (∩) are nearly all blocked — the cleft fills with green particles that have nowhere to go. This visualises a SEEKING loop without a satiation point: dopamine rises, receptors are permanently activated, but without serotonin there is no "enough" signal.</p>
<p><b>Why this is dangerous:</b> normally 5-HT via 5-HT2C inhibits dopaminergic neurons in nucleus accumbens. Without that brake, the compulsion signal escalates unchecked. Rebound psychosis and compulsive redosing are pharmacologically predictable consequences of this profile.</p>
<p><b>Animation 2 — Reuptake comparison.</b> DAT near-saturated (95%), NET (88%). No SERT column — absent in this molecule.</p>`
  },
  mdma: {
    type:'releaser', label:'MASYWNY WYRZUT 5-HT / DA',
    da:{spawn:0.055,block:0.54}, ht:{spawn:0.088,block:0.80}, ne:{spawn:0.060,block:0.60},
    guide:`
<div class="guide-legend">
  <div class="gl-row"><span class="gl-dot" style="background:#00ffaa"></span><b style="color:#aaa">Dopamina (DA)</b> — silny wyrzut</div>
  <div class="gl-row"><span class="gl-dot" style="background:#ff44ff"></span><b style="color:#aaa">Serotonina (5-HT)</b> — dominujący wyrzut (≈ x10 vs DA)</div>
  <div class="gl-row"><span class="gl-dot" style="background:#ffaa44"></span><b style="color:#aaa">Noradrenalina (NE)</b> — znaczący wyrzut</div>
</div>
<p>MDMA to <b>masywny releasing agent</b> ze stosunkiem SERT:DAT <b>~3–10:1</b> w zależności od układu testowego (~2–4:1 na transporterach ludzkich). W animacji widać to natychmiast: różowych cząsteczek (5-HT) jest znacznie więcej niż zielonych (DA). Pęcherzyki w górnym terminalu pulsują intensywnie — to aktywny, odwrócony transport przez SERT i DAT.</p>
<p><b>Wbudowany hamulec:</b> masywna 5-HT aktywuje receptor 5-HT2C, który hamuje neurony dopaminowe w NAc. W animacji to widać pośrednio — mimo że DA jest dużo, szczelina nie akumuluje jej tak chaotycznie jak przy α-PVP. Jest równowaga. To właśnie odróżnia MDMA od czystych stymulantów DA.</p>
<p>Transportery (∩) są w większości zablokowane — cząsteczki długo pozostają w szczelinie. Po intensywnym wyrzucie magazyny 5-HT wyczerpują się (to mechanizm "Suicide Tuesday" — potrzeba 1-5 dni na resyntezę serotoniny).</p>
<p><b>Animacja 2 — Porównanie reuptake.</b> SERT zablokowany silniej niż DAT — na prawej stronie dominuje różowa akumulacja 5-HT. Stosunek SERT:DAT wynosi ~3–10:1 zależnie od układu testowego; in vivo przewaga 5-HT jest wyraźna. Normalny reuptake (lewa) pokazuje jak szybko 5-HT naturalnie znika — MDMA wydłuża ten czas wielokrotnie.</p>`,
    brain:`<p>MDMA wykazuje <b>najszerszą serotoninową sieć aktywacji</b> spośród wszystkich substancji w aplikacji. Na peaku praktycznie każdy region jest różowy. To wizualizacja dlaczego MDMA jest empatogenem, a nie stymulantem.</p>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div><div class="brain-region-name">Raphe</div><div class="brain-region-desc">Jądra szwu na pełnej aktywacji (i:0.96) — masywny wyrzut przez odwrócony SERT. Raphe to epicentrum — stąd 5-HT rozlewa się do każdego obszaru mózgu.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div><div class="brain-region-name">Amy</div><div class="brain-region-desc">Ciało migdałowate silnie serotoninowe (i:0.82). 5-HT przez 5-HT1A dramatycznie obniża reaktywność lękową — biologiczny substrat "MDMA love" i otwarcia emocjonalnego.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div><div class="brain-region-name">NAc</div><div class="brain-region-desc">Nucleus accumbens dominowany przez 5-HT (i:0.88), z DA jako drugim komponentem. Kombinacja 5-HT + DA tworzy unikalny profil — hedoniści z empatią.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">VTA</div><div class="brain-region-desc">Komponent dopaminowy (i:0.80). MDMA uwalnia DA przez DAT reversal, ale w stosunku znacznie mniejszym niż 5-HT. DA napędza euforię i energię fizyczną.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div><div class="brain-region-name">Hipp</div><div class="brain-region-desc">Hipokamp — 5-HT gęsto (i:0.70). Aktywacja 5-HT1A w hipokampie powiązana z plastycznością i efektem terapeutycznym MDMA w PTSD — kluczowy obszar dla przetwarzania wspomnień emocjonalnych.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div><div class="brain-region-name">PFC</div><div class="brain-region-desc">Kora przedczołowa serotoninowa (i:0.78). Integracja emocjonalna, zmniejszona "narracja krytyczna" — efekt otwartości i autentyczności komunikacji charakterystyczny dla MDMA.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ffaa44;box-shadow:0 0 5px #ffaa44"></div><div class="brain-region-name">LC</div><div class="brain-region-desc">Locus coeruleus — NET reversal (i:0.72). Noradrenalina odpowiada za fizyczne komponenty: przyspieszone tętno, rozszerzone źrenice, podwyższona temperatura ciała.</div></div>
<p><b>Wzorzec serotoninowy:</b> Porównaj z α-PVP (tylko zielony i pomarańczowy) albo DMT (różowy tylko w korze). MDMA to jedyna substancja z tak szeroką dystrybucją 5-HT obejmującą równocześnie Amy, NAc, Hipp i PFC.</p>`,
    brain_en:`<p>MDMA shows the widest serotonergic activation network of any substance in the app. At peak, virtually every region is pink. This visualises why MDMA is an entactogen, not a stimulant.</p>
<div class="brain-content">
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div><div class="brain-region-name">Raphe</div><div class="brain-region-desc">Raphe nuclei at full activation (i:0.96) — massive efflux via reversed SERT. This is the epicentre — 5-HT floods every brain region from here.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div><div class="brain-region-name">Amy</div><div class="brain-region-desc">Amygdala strongly serotonergic (i:0.82). 5-HT via 5-HT1A dramatically reduces fear reactivity — the biological substrate of "MDMA love" and emotional openness.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ff44ff;box-shadow:0 0 5px #ff44ff"></div><div class="brain-region-name">NAc</div><div class="brain-region-desc">Dominated by 5-HT (i:0.88), with DA as secondary. The euphoria is serotonergic, not purely dopaminergic — a key difference from cocaine.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">VTA</div><div class="brain-region-desc">DA component (i:0.72) — the stimulant "push." Secondary to 5-HT but creates the energetic drive.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ffaa44;box-shadow:0 0 5px #ffaa44"></div><div class="brain-region-name">LC</div><div class="brain-region-desc">NE efflux — tachycardia, hyperthermia risk, blood pressure elevation. The physiologically dangerous component.</div></div>
</div>`,
    guide_en:`<div class="guide-legend">
  <div class="guide-row"><span class="guide-dot" style="background:#ff44ff"></span>Dopamine (DA) — strong efflux</div>
  <div class="guide-row"><span class="guide-dot" style="background:#ff44ff"></span>Serotonin (5-HT) — dominant efflux (≈ ×10 vs DA)</div>
  <div class="guide-row"><span class="guide-dot" style="background:#ffaa44"></span>Noradrenaline (NE) — significant efflux</div>
</div>
<p>MDMA is a <b>massive releasing agent</b> with a SERT:DAT ratio of ~3–10:1 depending on the assay system (~2–4:1 on human transporters). In the animation you immediately see far more pink particles (5-HT) than green (DA). Vesicles pulse intensely — this is active, reversed transport through SERT and DAT.</p>
<p><b>Built-in brake:</b> massive 5-HT activates the 5-HT2C receptor, which inhibits dopaminergic neurons in NAc. Visible indirectly in the animation — despite high DA, the cleft doesn't accumulate chaotically like α-PVP. There is balance. This is what separates MDMA from pure DA stimulants.</p>
<p><b>Transporters (∩):</b> mostly blocked — particles linger in the cleft. SERT more blocked than DAT, reflecting the higher 5-HT selectivity.</p>
<p><b>Animation 2 — Reuptake comparison.</b> Pink particles dominant (SERT 80%), green visible (DAT 54%). The ratio is the MDMA fingerprint.</p>`
  },
  cocaine: {
    type:'inhibitor', label:'BLOKADA DAT / SERT / NET',
    da:{spawn:0.018,block:0.88}, ht:{spawn:0.009,block:0.52}, ne:{spawn:0.015,block:0.80},
    guide:`
<div class="guide-legend">
  <div class="gl-row"><span class="gl-dot" style="background:#00ffaa"></span><b style="color:#aaa">Dopamina (DA)</b> — główna blokada reuptake</div>
  <div class="gl-row"><span class="gl-dot" style="background:#ff44ff"></span><b style="color:#aaa">Serotonina (5-HT)</b> — umiarkowana blokada</div>
  <div class="gl-row"><span class="gl-dot" style="background:#ffaa44"></span><b style="color:#aaa">Noradrenalina (NE)</b> — silna blokada</div>
</div>
<p>Kokaina to <b>czysty inhibitor reuptake</b> — nie wchodzi do neuronu i nie odwraca transporterów, tylko blokuje ich kieszeń wiążącą od zewnątrz. Dlatego w animacji pęcherzyki są spokojne (mały wyrzut), ale cząsteczki które naturalnie się pojawiają zostają uwięzione w szczelinie przez zablokowane transportery (∩).</p>
<p>Kluczowa właściwość: efekt kokainy zależy od <i>aktywności neuronów w danej chwili</i>. Im więcej naturalnego wyrzutu DA — tym silniejszy efekt blokady. Animacja pokazuje stan przy typowej aktywności. W kontekstach silnej naturalnej aktywacji (stres, ćwiczenia, seks) efekt byłby proporcjonalnie intensywniejszy.</p>
<p><b>Krótki czas działania</b> wynika z szybkiego metabolizmu przez esterazy w osoczu, nie przez transportery. Stąd gwałtowny crash i silny craving — cząsteczki znikają z szczeliny nagle gdy metabolizm usuwa lek, a receptory "czekają" na DA której nie ma.</p>
<p><b>Animacja 2 — Porównanie reuptake.</b> Trzy transportery: DAT 88%, NET 80%, SERT 52%. Prawa strona pokazuje jak przy tak wysokiej blokadzie szczelina akumuluje DA i NE — efekt use-dependent: im więcej naturalnej aktywności neuronów, tym więcej NT zostaje "złapanych" przez blokadę. Kokaina nie zmienia wyrzutu — tylko wydłuża czas obecności tego co już jest.</p>`,
    brain:`<p>Kokaina to <b>czysty profil mezolimbiczny DA/NE</b> — intensywny, krótki, skoncentrowany na szlaku nagrody. Faza Craving jest tak samo informatywna jak Peak — neurobiologia głodu kokainy jest dosłownie widoczna na mapie.</p>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">NAc</div><div class="brain-region-desc">Nucleus accumbens — centrum kokainowej euforii (i:0.97 na peaku, najwyższe DA w całej aplikacji). Blokada DAT na terminalach NAc = masywna akumulacja DA. Szybkość onset wynika z wysokiej gęstości DAT właśnie tutaj.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">VTA</div><div class="brain-region-desc">Aktywacja (i:0.55) — kokaina działa głównie na terminale, nie na ciała komórek VTA. Stąd VTA świeci słabiej niż NAc, co odzwierciedla lokalizację DAT w terminalach projekcyjnych.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ffaa44;box-shadow:0 0 5px #ffaa44"></div><div class="brain-region-name">LC</div><div class="brain-region-desc">Silna aktywacja NE (i:0.88) — NET blokada. Odpowiada za somatyczne efekty: tachykardia, wzrost ciśnienia, zwężenie naczyń. Przy IV/donosowym podaniu: fizyczny "rush".</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">PFC</div><div class="brain-region-desc">Aktywacja DA (i:0.65) przez projekcje mezokortykalne — grandioza, pewność siebie, przyspieszone myślenie. Przy kokainie PFC jest dopaminowe, nie noradrenergiczne jak przy amfetaminie.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">Amy (Craving)</div><div class="brain-region-desc">Ciało migdałowate wybucha przy Craving (i:0.78) — neurobiologiczny substrat głodu, drażliwości i paranoi po crashu. Amy jest aktywna gdy NAc jest wyczerpane — mózg "chce" bez możliwości zaspokojenia.</div></div>
<p><b>Faza Craving — kluczowa obserwacja:</b> Po crashu NAc(i:0.65) i Amy(i:0.78) ponownie aktywne. To klasyczna dysregulacja systemu nagrody: DA-seeking bez nasycenia. Substrat neurobiologiczny syndromu uzależnienia.</p>`,
    brain_en:`<p>Cocaine is a clean mesolimbic DA/NE profile — intense, short, concentrated on the reward pathway. The Craving phase is as informative as Peak — the neurobiology of cocaine craving is literally visible on the map.</p>
<div class="brain-content">
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">NAc</div><div class="brain-region-desc">Nucleus accumbens — centre of cocaine euphoria (i:0.97 at peak, highest DA in the app). DAT blockade at NAc terminals = massive DA accumulation. Fast onset from high DAT density in terminals.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#00ffaa;box-shadow:0 0 5px #00ffaa"></div><div class="brain-region-name">VTA</div><div class="brain-region-desc">Activation (i:0.55) — cocaine acts mainly on terminals, not VTA cell bodies. VTA glows less than NAc, reflecting DAT localisation in terminal fields.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ffaa44;box-shadow:0 0 5px #ffaa44"></div><div class="brain-region-name">LC</div><div class="brain-region-desc">Strong NE (i:0.80) — tachycardia, vasoconstriction, hypertension. The cardiovascular risk visible in the brain map.</div></div>
<div class="brain-region-row"><div class="brain-region-dot" style="background:#ffaa44;box-shadow:0 0 5px #ffaa44"></div><div class="brain-region-name">PFC</div><div class="brain-region-desc">NE/DA in PFC (i:0.72). Cognitive sharpening — the "clarity" of cocaine. But at higher doses disrupts prefrontal inhibitory control.</div></div>
</div>`,
    guide_en:`<div class="guide-legend">
  <div class="guide-row"><span class="guide-dot" style="background:#00ffaa"></span>Dopamine (DA) — primary reuptake block</div>
  <div class="guide-row"><span class="guide-dot" style="background:#ff44ff"></span>Serotonin (5-HT) — moderate blockade</div>
  <div class="guide-row"><span class="guide-dot" style="background:#ffaa44"></span>Noradrenaline (NE) — strong blockade</div>
</div>
<p>Cocaine is a <b>pure reuptake inhibitor</b> — it doesn't enter the neuron or reverse transporters, only blocks their binding pocket from outside. So in the animation the vesicles are calm (minimal efflux), but particles that naturally appear get trapped in the cleft by blocked transporters (∩).</p>
<p><b>Key property:</b> cocaine's effect depends on neuronal firing at that moment. The more natural DA release — the stronger the blockade effect. The animation shows a typical activity state. In contexts of high natural activation (stress, exercise, sex), the effect would be proportionally more intense.</p>
<p><b>Short duration</b> from rapid ester hydrolysis by plasma cholinesterases — t½ ≈ 45–90 min. Crack cocaine's faster onset (inhaled vs nasal) creates stronger reinforcement — the speed of onset matters more than the peak level for addiction potential.</p>
<p><b>Animation 2 — Reuptake comparison.</b> Three blocked transporter columns: DAT (88%), NET (80%), SERT (52%). The DA/NE ratio creates the stimulant + cardiovascular profile.</p>`
  },
  amphetamine: {
    type:'releaser', label:'MASYWNY WYRZUT (VMAT2 + DAT)',
    da:{spawn:0.080,block:0.62}, ht:{spawn:0.008,block:0.24}, ne:{spawn:0.082,block:0.66},
    guide:`
<div class="guide-legend">
  <div class="gl-row"><span class="gl-dot" style="background:#00ffaa"></span><b style="color:#aaa">Dopamina (DA)</b> — masywny wyrzut</div>
  <div class="gl-row"><span class="gl-dot" style="background:#ff44ff"></span><b style="color:#aaa">Serotonina (5-HT)</b> — śladowa aktywność</div>
  <div class="gl-row"><span class="gl-dot" style="background:#ffaa44"></span><b style="color:#aaa">Noradrenalina (NE)</b> — dominujący wyrzut</div>
</div>
<p>Amfetamina to <b>releasing agent z unikalnym mechanizmem VMAT2</b>. Blokuje transporter pęcherzykowy który normalnie pakuje DA do pęcherzyków — DA zalewa cytozol i jest wyrzucana przez odwrócony DAT niezależnie od aktywności neuronów. W animacji widać to jako intensywny, ciągły puls pęcherzyków i gęsty strumień cząsteczek DA (zielone) i NE (pomarańczowe).</p>
<p>NE dominuje numerycznie — to właśnie nadaje amfetaminie "roboczy" charakter (fokus, wytrzymałość, supresja zmęczenia) zamiast czystej euforii. Minimalna aktywność 5-HT (prawie brak różowych) = brak empatogennego efektu.</p>
<p><b>Wyczerpywanie magazynów:</b> w odróżnieniu od kokainy, amfetamina faktycznie fizycznie opróżnia pęcherzyki DA. Crash po binge ma komponent fizyczny — nie tylko blokada zdjęta, ale naprawdę brak neuroprzekaźnika do wyrzutu.</p>
<p><b>Animacja 2 — Porównanie reuptake.</b> DAT 62%, NET 66% — blokada umiarkowana w porównaniu do kokainy czy α-PVP, ale i tak wyraźna. Różnica: tu cząsteczki pojawiają się przez aktywny wyrzut (VMAT2), nie tylko bazalną aktywność. W połączeniu z blokadą reuptake efekt sumuje się — i to tłumaczy wyczerpywanie magazynów przy binge: wyrzucasz więcej i wolniej odbieras.</p>`,
